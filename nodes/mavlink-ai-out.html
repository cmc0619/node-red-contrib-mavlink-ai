<script type="text/html" data-help-name="mavlink-ai-out">
  <p>Sends normalized MAVLink messages or raw packets through a shared MAVLink AI Connection.</p>
  <p>This node has no outputs, so send failures are reported via <code>done(err)</code> — handle them with a <b>Catch</b> node.</p>
  <p><b>Priority (advanced):</b> <code>msg.priority</code> picks the outbound queue band — <code>0</code> critical (arm/mode/emergency), <code>1</code> elevated (control streams), <code>2</code> normal (the default), <code>3</code> background. Values are clamped to that range; a missing or non-numeric value uses the default. The command node stamps this automatically on critical commands (arm/disarm, mode change, flight termination, parachute).</p>
  <p>A transport that is passively waiting for the other side to appear — a <b>UDP peer</b> connection that hasn't learned a peer, or a <b>TCP server</b> with no client connected yet — is a normal transient state, not a failure. The node shows a yellow <b>waiting for link</b> badge and logs a one-time warning instead of raising an error on every send, so an as-yet-unseen peer doesn't spam Catch nodes. Sends made while waiting are dropped (there is nowhere to deliver them); once the link is ready, sending resumes automatically. A link that may never come back on its own — a TCP client or serial port that is disconnected with <b>Reconnect</b> off, or a transport that failed to start — still surfaces as an error for a Catch node.</p>
</script>
