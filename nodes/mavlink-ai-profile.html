<script type="text/javascript">
  RED.nodes.registerType('mavlink-ai-profile', {
    category: 'config',
    defaults: {
      name: { value: '' },
      profileType: { value: 'gcs', required: true },
      firmware: { value: 'generic', required: true },
      dialect: { value: 'ardupilotmega', required: true },
      dialectSource: { value: 'bundled' },
      customDialectPath: {
        value: '',
        // Require a path when the dialect source is a local/mounted XML file, so
        // an empty path is caught in the editor instead of only at deploy time.
        validate: function (v) {
          const src = $('#node-config-input-dialectSource').val() || this.dialectSource;
          if (src && src !== 'bundled') {
            return !!(v && String(v).trim());
          }
          return true;
        }
      },
      mavlinkVersion: { value: 'auto', required: true },
      sourceSystemId: { value: 255, required: true, validate: RED.validators.number() },
      sourceComponentId: { value: 190, required: true, validate: RED.validators.number() },
      defaultTargetSystem: { value: 1, required: true, validate: RED.validators.number() },
      defaultTargetComponent: { value: 1, required: true, validate: RED.validators.number() },
      preferredMissionItemType: { value: 'MISSION_ITEM_INT', required: true },
      defaultMissionType: { value: 'mission', required: true },
      heartbeatType: { value: '' },
      heartbeatAutopilot: { value: 'MAV_AUTOPILOT_INVALID' },
      debugProtocol: { value: false },
      // MAVLink 2 signing (issue #15). The passphrase is a credential (below).
      signOutbound: { value: false },
      verifyInbound: { value: false },
      requireSignature: { value: false },
      signingLinkId: { value: 0, validate: RED.validators.number() }
    },
    credentials: {
      signingPassphrase: { type: 'password' }
    },
    label: function () {
      return this.name || 'MAVLink AI Profile';
    },
    oneditprepare: function () {
      const node = this;
      const $source = $('#node-config-input-dialectSource');
      const $bundled = $('#mav-bundled-dialect');
      const $dialect = $('#node-config-input-dialect'); // hidden, persisted value
      const $path = $('#node-config-input-customDialectPath');
      const FALLBACK = ['ardupilotmega', 'common', 'minimal'];

      // Keep the persisted `dialect` in sync with the visible controls: a bundled
      // source stores the chosen dialect name; a path source stores 'custom' and
      // the loader compiles customDialectPath at runtime (#2).
      // When the dropdown hasn't populated yet (the dialect list is fetched
      // asynchronously), fall back to the node's saved dialect — never a
      // hard-coded default, or a fast save would silently rewrite the dialect.
      function bundledSelection() {
        return (
          $bundled.val() ||
          (node.dialect && node.dialect !== 'custom' ? node.dialect : 'ardupilotmega')
        );
      }
      function syncDialect() {
        $dialect.val($source.val() === 'bundled' ? bundledSelection() : 'custom');
      }
      function toggleRows() {
        const bundled = $source.val() === 'bundled';
        $('.mav-dialect-bundled').toggle(bundled);
        $('.mav-dialect-path').toggle(!bundled);
        syncDialect();
      }

      // Discover bundled dialects from the loader instead of a hard-coded list.
      function populateBundled(list) {
        $bundled.empty();
        (list && list.length ? list : FALLBACK).forEach(function (d) {
          $('<option></option>').val(d).text(d).appendTo($bundled);
        });
        const saved = node.dialect && node.dialect !== 'custom' ? node.dialect : 'ardupilotmega';
        if ($bundled.find('option').filter(function () { return this.value === saved; }).length === 0) {
          $('<option></option>').val(saved).text(saved).appendTo($bundled);
        }
        $bundled.val(saved);
      }

      // Restore the source. The UI now offers only Bundled and Custom (#60):
      // legacy configs saved with 'local' or 'mounted' were never separate
      // runtime modes (both persist dialect 'custom' + customDialectPath), so
      // they collapse to 'custom' here. Configs predating the field infer from
      // the saved dialect.
      function normalizeSource(saved, dialect) {
        if (saved === 'local' || saved === 'mounted' || saved === 'custom') {
          return 'custom';
        }
        if (saved === 'bundled') {
          return 'bundled';
        }
        return dialect === 'custom' ? 'custom' : 'bundled';
      }
      $source.val(normalizeSource(node.dialectSource, node.dialect));

      $.getJSON('mavlink-ai/dialects')
        .done(function (data) { populateBundled(data && data.dialects); toggleRows(); })
        .fail(function () { populateBundled(null); toggleRows(); });

      $source.on('change', toggleRows);
      $bundled.on('change', syncDialect);

      // MAVLink 2 signing (issue #15): the detail rows (passphrase, link id,
      // require-signature) are only meaningful once signing or verification is
      // enabled, so show them together.
      function toggleSigningRows() {
        const on = $('#node-config-input-signOutbound').is(':checked') ||
          $('#node-config-input-verifyInbound').is(':checked');
        $('.mav-signing-detail').toggle(on);
        // require-signature only applies while verifying inbound.
        $('.mav-signing-require').toggle($('#node-config-input-verifyInbound').is(':checked'));
      }
      $('#node-config-input-signOutbound').on('change', toggleSigningRows);
      $('#node-config-input-verifyInbound').on('change', toggleSigningRows);
      toggleSigningRows();
    },
    oneditsave: function () {
      // Re-derive the persisted dialect at save time so it is always correct
      // regardless of change-event ordering. If the async dialect fetch hasn't
      // populated the dropdown yet, keep the node's saved dialect instead of
      // silently rewriting it to a default.
      const source = $('#node-config-input-dialectSource').val();
      const picked =
        $('#mav-bundled-dialect').val() ||
        (this.dialect && this.dialect !== 'custom' ? this.dialect : 'ardupilotmega');
      $('#node-config-input-dialect').val(source === 'bundled' ? picked : 'custom');
    }
  });
</script>

<script type="text/html" data-template-name="mavlink-ai-profile">
  <div class="form-row">
    <label for="node-config-input-name"><i class="fa fa-tag"></i> Name</label>
    <input type="text" id="node-config-input-name" placeholder="Copter Profile">
  </div>
  <div class="form-row">
    <label for="node-config-input-profileType">Profile</label>
    <select id="node-config-input-profileType">
      <option value="gcs">GCS</option>
      <option value="generic">Generic</option>
      <option value="copter">Copter</option>
      <option value="plane">Plane</option>
      <option value="rover">Rover</option>
      <option value="boat">Boat</option>
      <option value="sub">Sub</option>
      <option value="antenna-tracker">Antenna Tracker</option>
    </select>
  </div>
  <div class="form-row">
    <label for="node-config-input-firmware">Firmware</label>
    <select id="node-config-input-firmware">
      <option value="generic">Generic</option>
      <option value="ardupilot">ArduPilot</option>
      <option value="px4">PX4</option>
      <option value="custom">Custom</option>
    </select>
  </div>
  <div class="form-row">
    <label for="node-config-input-dialectSource">Dialect source</label>
    <select id="node-config-input-dialectSource">
      <option value="bundled">Bundled</option>
      <option value="custom">Custom</option>
    </select>
  </div>
  <div class="form-row mav-dialect-bundled">
    <label for="mav-bundled-dialect">Bundled dialect</label>
    <select id="mav-bundled-dialect" style="width:60%;"></select>
  </div>
  <div class="form-row mav-dialect-path">
    <label for="node-config-input-customDialectPath">XML path</label>
    <input type="text" id="node-config-input-customDialectPath" placeholder="/path/to/custom.xml">
  </div>
  <div class="form-tips mav-dialect-path">
    A custom dialect is a MAVLink XML file readable by the Node-RED process (local or mounted). Its <code>&lt;include&gt;</code> graph is resolved and compiled at runtime.
  </div>
  <input type="hidden" id="node-config-input-dialect">
  <div class="form-row">
    <label for="node-config-input-mavlinkVersion">Version</label>
    <select id="node-config-input-mavlinkVersion">
      <option value="auto">auto (match inbound peer, v2 until detected)</option>
      <option value="v1">v1</option>
      <option value="v2">v2</option>
    </select>
  </div>
  <div class="form-row">
    <label for="node-config-input-sourceSystemId">Source SysID</label>
    <input type="number" id="node-config-input-sourceSystemId">
  </div>
  <div class="form-row">
    <label for="node-config-input-sourceComponentId">Source CompID</label>
    <input type="number" id="node-config-input-sourceComponentId">
  </div>
  <div class="form-row">
    <label for="node-config-input-defaultTargetSystem">Target SysID</label>
    <input type="number" id="node-config-input-defaultTargetSystem">
  </div>
  <div class="form-row">
    <label for="node-config-input-defaultTargetComponent">Target CompID</label>
    <input type="number" id="node-config-input-defaultTargetComponent">
  </div>
  <div class="form-row">
    <label for="node-config-input-preferredMissionItemType">Mission Item</label>
    <select id="node-config-input-preferredMissionItemType">
      <option value="MISSION_ITEM_INT">MISSION_ITEM_INT</option>
      <option value="MISSION_ITEM">MISSION_ITEM</option>
    </select>
  </div>
  <div class="form-row">
    <label for="node-config-input-defaultMissionType">Mission Type</label>
    <select id="node-config-input-defaultMissionType">
      <option value="mission">mission</option>
      <option value="fence">fence</option>
      <option value="rally">rally</option>
      <option value="all">all</option>
    </select>
  </div>
  <div class="form-row">
    <label for="node-config-input-heartbeatType">HB Type</label>
    <input type="text" id="node-config-input-heartbeatType" placeholder="auto from profile (e.g. MAV_TYPE_GCS)">
  </div>
  <div class="form-row">
    <label for="node-config-input-heartbeatAutopilot">HB Autopilot</label>
    <input type="text" id="node-config-input-heartbeatAutopilot" placeholder="MAV_AUTOPILOT_INVALID">
  </div>
  <div class="form-row">
    <label for="node-config-input-debugProtocol">Debug</label>
    <input type="checkbox" id="node-config-input-debugProtocol" style="display: inline-block; width: auto; vertical-align: top;">
  </div>

  <hr>
  <h4 style="margin:6px 0;">MAVLink 2 Signing</h4>
  <div class="form-row">
    <label for="node-config-input-signOutbound">Sign outbound</label>
    <input type="checkbox" id="node-config-input-signOutbound" style="display: inline-block; width: auto; vertical-align: top;">
    <span style="color:#888;">sign packets we send (forces MAVLink 2)</span>
  </div>
  <div class="form-row">
    <label for="node-config-input-verifyInbound">Verify inbound</label>
    <input type="checkbox" id="node-config-input-verifyInbound" style="display: inline-block; width: auto; vertical-align: top;">
    <span style="color:#888;">check signatures on packets we receive</span>
  </div>
  <div class="form-row mav-signing-require">
    <label for="node-config-input-requireSignature">Require signature</label>
    <input type="checkbox" id="node-config-input-requireSignature" style="display: inline-block; width: auto; vertical-align: top;">
    <span style="color:#888;">reject unsigned inbound packets</span>
  </div>
  <div class="form-row mav-signing-detail">
    <label for="node-config-input-signingPassphrase">Passphrase</label>
    <input type="password" id="node-config-input-signingPassphrase" placeholder="shared secret (stored as a credential)">
  </div>
  <div class="form-row mav-signing-detail">
    <label for="node-config-input-signingLinkId">Link ID</label>
    <input type="number" id="node-config-input-signingLinkId" min="0" max="255" placeholder="0">
  </div>
  <div class="form-tips mav-signing-detail">
    The passphrase is the shared signing key (SHA-256 derived, matching Mission Planner / QGroundControl). It is stored as an encrypted Node-RED credential, not in exported flow JSON. Signing applies to encoded messages; raw <code>sendRaw</code> buffers pass through unsigned.
  </div>
</script>

<script type="text/html" data-help-name="mavlink-ai-profile">
  <p>Shared MAVLink vehicle/protocol profile. This owns dialect, MAVLink identity defaults, and vehicle-type defaults. It does not own a transport.</p>
  <h3>Dialect source</h3>
  <ul>
    <li><b>Bundled</b> — pick from the dialects the loader can serve (discovered dynamically, not hard-coded).</li>
    <li><b>Custom</b> — a single <b>XML path</b> to a MAVLink dialect file the Node-RED process can read (local or mounted; they are not separate modes). Its <code>&lt;include&gt;</code> graph is resolved and the dialect is compiled at runtime. Invalid XML or a missing/circular include fails loudly (the profile marks itself invalid) rather than falling back.</li>
  </ul>
  <h3>MAVLink 2 signing</h3>
  <p>Minimal support built on the protocol library's signing primitives. A shared <b>passphrase</b> is the signing key (SHA-256 derived, the same as Mission Planner / QGroundControl); it is stored as an encrypted credential, never in exported flows.</p>
  <ul>
    <li><b>Sign outbound</b> — append a valid signature to every encoded packet. This forces MAVLink 2 framing (signed frames are v2-only), even if the version is set to auto/v1.</li>
    <li><b>Verify inbound</b> — check the signature on received signed packets; a bad signature is rejected (surfaced on the In node's errors output as <code>mavlink/rejected</code> with reason <code>signature-invalid</code>).</li>
    <li><b>Require signature</b> — with verify on, also reject <em>unsigned</em> inbound packets (reason <code>signature-required</code>).</li>
    <li><b>Link ID</b> — the link id (0–255) written into outbound signatures.</li>
  </ul>
  <p>The signature timestamp uses the protocol library's default (wall clock, in the MAVLink 10-µs-since-2015 units). Raw <code>sendRaw</code> buffers are sent as-is and are not signed.</p>
</script>
