<script type="text/javascript">
  // MAVLink target ids are uint8s on the wire (#90): accept only integers in
  // [min, 255]. Blank is allowed (the runtime applies the documented default).
  function mavUint8Validator(min) {
    return function (v) {
      if (v === undefined || v === null || v === '') {
        return true;
      }
      const n = Number(v);
      if (!Number.isInteger(n) || n < min || n > 255) {
        return 'must be an integer between ' + min + ' and 255';
      }
      return true;
    };
  }

  RED.nodes.registerType('mavlink-ai-vehicle', {
    category: 'config',
    defaults: {
      name: { value: '' },
      // Target vehicle family, used for mode tables and parameter metadata.
      // This is about the vehicle being addressed — the local identity lives
      // on the mavlink-ai-local-identity config node (#228).
      vehicleFamily: { value: 'generic', required: true },
      firmware: { value: 'generic', required: true },
      dialect: { value: 'ardupilotmega', required: true },
      dialectSource: { value: 'bundled' },
      customDialectPath: {
        value: '',
        // Require a path when the dialect source is a local/mounted XML file, so
        // an empty path is caught in the editor instead of only at deploy time.
        validate: function (v) {
          const src = $('#node-config-input-dialectSource').val() || this.dialectSource;
          if (src && src !== 'bundled') {
            return !!(v && String(v).trim());
          }
          return true;
        }
      },
      mavlinkVersion: { value: 'auto', required: true },
      defaultTargetSystem: { value: 1, required: true, validate: mavUint8Validator(0) },
      defaultTargetComponent: { value: 1, required: true, validate: mavUint8Validator(0) },
      preferredMissionItemType: { value: 'MISSION_ITEM_INT', required: true },
      debugProtocol: { value: false }
    },
    label: function () {
      return this.name || 'MAVLink Vehicle Profile';
    },
    oneditprepare: function () {
      const node = this;
      const $source = $('#node-config-input-dialectSource');
      const $bundled = $('#mav-bundled-dialect');
      const $dialect = $('#node-config-input-dialect'); // hidden, persisted value
      const $path = $('#node-config-input-customDialectPath');
      const FALLBACK = ['ardupilotmega', 'common', 'minimal'];

      // Keep the persisted `dialect` in sync with the visible controls: a bundled
      // source stores the chosen dialect name; a path source stores 'custom' and
      // the loader compiles customDialectPath at runtime (#2).
      // When the dropdown hasn't populated yet (the dialect list is fetched
      // asynchronously), fall back to the node's saved dialect — never a
      // hard-coded default, or a fast save would silently rewrite the dialect.
      function bundledSelection() {
        return (
          $bundled.val() ||
          (node.dialect && node.dialect !== 'custom' ? node.dialect : 'ardupilotmega')
        );
      }
      function syncDialect() {
        $dialect.val($source.val() === 'bundled' ? bundledSelection() : 'custom');
      }
      function toggleRows() {
        const bundled = $source.val() === 'bundled';
        $('.mav-dialect-bundled').toggle(bundled);
        $('.mav-dialect-path').toggle(!bundled);
        syncDialect();
      }

      // Discover bundled dialects from the loader instead of a hard-coded list.
      function populateBundled(list) {
        $bundled.empty();
        (list && list.length ? list : FALLBACK).forEach(function (d) {
          $('<option></option>').val(d).text(d).appendTo($bundled);
        });
        const saved = node.dialect && node.dialect !== 'custom' ? node.dialect : 'ardupilotmega';
        if ($bundled.find('option').filter(function () { return this.value === saved; }).length === 0) {
          $('<option></option>').val(saved).text(saved).appendTo($bundled);
        }
        $bundled.val(saved);
      }

      $source.val(node.dialectSource === 'custom' ? 'custom' : 'bundled');

      $.getJSON('mavlink-ai/dialects')
        .done(function (data) { populateBundled(data && data.dialects); toggleRows(); })
        .fail(function () { populateBundled(null); toggleRows(); });

      $source.on('change', toggleRows);
      $bundled.on('change', syncDialect);

      // --- downloadable XML catalog picker (#61) --------------------------
      // Downloaded XMLs are managed *Custom* paths: picking one fills the XML
      // path field. This is not a third dialect source.
      const $catalog = $('#mav-catalog-pick');
      const $catalogStatus = $('#mav-catalog-status');

      function loadCatalog() {
        $.getJSON('mavlink-ai/xml-catalog')
          .done(function (data) {
            $catalog.empty();
            $('<option></option>').val('').text('-- downloaded XML (optional) --').appendTo($catalog);
            const snapshots = (data && data.snapshots) || [];
            let count = 0;
            snapshots.forEach(function (snap) {
              (snap.files || []).forEach(function (f) {
                const when = snap.downloadedAt ? new Date(snap.downloadedAt).toISOString().slice(0, 10) : '';
                const label = f.name + '  [' + snap.repo + '@' + snap.ref + ' ' + when + ']' +
                  (f.bundledExists ? ' (bundled exists)' : ' (not bundled)');
                $('<option></option>').val(f.path).text(label)
                  .attr('data-file', f.name)
                  .attr('data-snapshot', snap.snapshotId)
                  .appendTo($catalog);
                count += 1;
              });
            });
            $catalogStatus.text(count ? '' : 'No downloaded XML yet — use "Update catalog".');
          })
          .fail(function () {
            $catalogStatus.text('Catalog unavailable.');
          });
      }

      $catalog.on('change', function () {
        const p = $(this).val();
        if (p) {
          $path.val(p);
        }
      });

      $('#mav-catalog-update').on('click', function (e) {
        e.preventDefault();
        $catalogStatus.text('Downloading MAVLink XML from mavlink/mavlink...');
        $.ajax({
          url: 'mavlink-ai/xml-catalog/update',
          method: 'POST',
          contentType: 'application/json',
          data: JSON.stringify({})
        })
          .done(function () {
            $catalogStatus.text('Downloaded. Pick a file below.');
            loadCatalog();
          })
          .fail(function (xhr) {
            const msg = (xhr && xhr.responseJSON && xhr.responseJSON.error) || 'download failed';
            $catalogStatus.text('Update failed: ' + msg);
          });
      });

      $('#mav-catalog-compare').on('click', function (e) {
        e.preventDefault();
        const opt = $catalog.find('option:selected');
        const file = opt.attr('data-file');
        const snapshot = opt.attr('data-snapshot');
        if (!file) {
          $catalogStatus.text('Pick a downloaded XML to compare.');
          return;
        }
        $catalogStatus.text('Comparing ' + file + ' with the bundled dialect...');
        $.getJSON('mavlink-ai/xml-catalog/compare', snapshot ? { file: file, snapshot: snapshot } : { file: file })
          .done(function (data) {
            const c = data && data.comparison;
            if (!c) {
              $catalogStatus.text('No comparison available.');
              return;
            }
            if (!c.bundledExists) {
              $catalogStatus.text(file + ': not present in the bundled dialects (new dialect).');
              return;
            }
            if (!c.comparable || !c.diff) {
              $catalogStatus.text(file + ': a bundled dialect exists (deeper diff unavailable).');
              return;
            }
            const d = c.diff;
            $catalogStatus.text(
              file + ' vs bundled — messages: +' + d.addedMessages.length + ' / -' + d.removedMessages.length +
              ' / changed ' + d.changedMessages.length + '; enums: +' + d.addedEnums.length + ' / -' + d.removedEnums.length + '.'
            );
          })
          .fail(function () {
            $catalogStatus.text('Comparison failed.');
          });
      });

      loadCatalog();

      /**
       * Advanced disclosure: version preference, mission-item wire type, and
       * per-profile protocol debug are rarely changed (auto / INT / off suit
       * almost everyone), so tuck them behind a toggle. Auto-expand when any is
       * set to a non-default so an existing override is never hidden.
       */
      function toggleAdvanced(show) {
        $('.mav-advanced').toggle(show);
        $('#node-mav-advanced-toggle i').toggleClass('fa-caret-right', !show).toggleClass('fa-caret-down', show);
      }
      $('#node-mav-advanced-toggle').on('click', function (e) {
        e.preventDefault();
        toggleAdvanced(!$('.mav-advanced').is(':visible'));
      });
      const advancedActive =
        (node.mavlinkVersion && node.mavlinkVersion !== 'auto') ||
        (node.preferredMissionItemType && node.preferredMissionItemType !== 'MISSION_ITEM_INT') ||
        node.debugProtocol === true;
      toggleAdvanced(!!advancedActive);
    },
    oneditsave: function () {
      // Re-derive the persisted dialect at save time so it is always correct
      // regardless of change-event ordering. If the async dialect fetch hasn't
      // populated the dropdown yet, keep the node's saved dialect instead of
      // silently rewriting it to a default.
      const source = $('#node-config-input-dialectSource').val();
      const picked =
        $('#mav-bundled-dialect').val() ||
        (this.dialect && this.dialect !== 'custom' ? this.dialect : 'ardupilotmega');
      $('#node-config-input-dialect').val(source === 'bundled' ? picked : 'custom');
    }
  });
</script>

<script type="text/html" data-template-name="mavlink-ai-vehicle">
  <div class="form-row">
    <label for="node-config-input-name"><i class="fa fa-tag"></i> Name</label>
    <input type="text" id="node-config-input-name" placeholder="SITL Copter">
  </div>
  <div class="form-tips" style="margin-bottom: 8px;">
    A <b>Vehicle Profile</b> describes the vehicle being addressed: dialect, firmware, target ids,
    and vehicle family for modes/parameters. Who <em>this Node-RED runtime</em> is on the wire —
    source SysID/CompID, heartbeat identity, signing — is a
    <b>Local Identity</b> config node, selected on the Connection.
  </div>
  <div class="form-row">
    <label for="node-config-input-vehicleFamily">Vehicle</label>
    <select id="node-config-input-vehicleFamily">
      <option value="generic">Generic / unknown</option>
      <option value="copter">Copter</option>
      <option value="plane">Plane</option>
      <option value="rover">Rover</option>
      <option value="boat">Boat</option>
      <option value="sub">Sub</option>
      <option value="antenna-tracker">Antenna Tracker</option>
    </select>
  </div>
  <div class="form-row">
    <label for="node-config-input-firmware">Firmware</label>
    <select id="node-config-input-firmware">
      <option value="generic">Generic</option>
      <option value="ardupilot">ArduPilot</option>
      <option value="px4">PX4</option>
    </select>
  </div>
  <div class="form-row">
    <label for="node-config-input-dialectSource">Dialect source</label>
    <select id="node-config-input-dialectSource">
      <option value="bundled">Bundled</option>
      <option value="custom">Custom</option>
    </select>
  </div>
  <div class="form-row mav-dialect-bundled">
    <label for="mav-bundled-dialect">Bundled dialect</label>
    <select id="mav-bundled-dialect" style="width:60%;"></select>
  </div>
  <div class="form-row mav-dialect-path">
    <label for="node-config-input-customDialectPath">XML path</label>
    <input type="text" id="node-config-input-customDialectPath" placeholder="/path/to/custom.xml">
  </div>
  <div class="form-tips mav-dialect-path">
    A custom dialect is a MAVLink XML file readable by the Node-RED process (local or mounted). Its <code>&lt;include&gt;</code> graph is resolved and compiled at runtime.
  </div>
  <div class="form-row mav-dialect-path">
    <label for="mav-catalog-pick">Downloaded XML</label>
    <select id="mav-catalog-pick" style="width:60%;"></select>
  </div>
  <div class="form-row mav-dialect-path" style="margin-left:104px;">
    <button id="mav-catalog-update" class="red-ui-button">Update catalog</button>
    <button id="mav-catalog-compare" class="red-ui-button">Compare with bundled</button>
  </div>
  <div class="form-tips mav-dialect-path" id="mav-catalog-status" style="min-height:1em;"></div>
  <div class="form-tips mav-dialect-path">
    Optionally download official MAVLink XML dialects into a local catalog and pick one here — it just fills the XML path above (a managed Custom path, not a replacement for bundled dialects).
  </div>
  <input type="hidden" id="node-config-input-dialect">
  <div class="form-row">
    <label for="node-config-input-defaultTargetSystem">Outbound target SysID</label>
    <input type="number" id="node-config-input-defaultTargetSystem">
  </div>
  <div class="form-row">
    <label for="node-config-input-defaultTargetComponent">Outbound target CompID</label>
    <input type="number" id="node-config-input-defaultTargetComponent">
  </div>
  <div class="form-row" style="margin-bottom: 4px;">
    <a href="#" id="node-mav-advanced-toggle" style="color: inherit;"><i class="fa fa-caret-right"></i> Advanced</a>
  </div>
  <div class="mav-advanced">
    <div class="form-row">
      <label for="node-config-input-mavlinkVersion">Version</label>
      <select id="node-config-input-mavlinkVersion">
        <option value="auto">auto (match inbound peer, v2 until detected)</option>
        <option value="v1">v1</option>
        <option value="v2">v2</option>
      </select>
    </div>
    <div class="form-row">
      <label for="node-config-input-preferredMissionItemType">Mission Item</label>
      <select id="node-config-input-preferredMissionItemType">
        <option value="MISSION_ITEM_INT">MISSION_ITEM_INT</option>
        <option value="MISSION_ITEM">MISSION_ITEM</option>
      </select>
    </div>
    <div class="form-tips" style="margin-bottom: 8px;">
      Leave on <b>MISSION_ITEM_INT</b> unless you have an old MAVLink-1 autopilot that only speaks the
      legacy float format. This only sets the <em>initial download request</em> — downloads auto-downgrade
      to the float <code>MISSION_ITEM</code> if the vehicle doesn't answer INT, and uploads always match
      the vehicle's own request.
    </div>
    <div class="form-row">
      <label for="node-config-input-debugProtocol">Debug</label>
      <input type="checkbox" id="node-config-input-debugProtocol" style="display: inline-block; width: auto; vertical-align: top;">
    </div>
    <div class="form-tips">
      Logs a one-line summary of every message decoded as, or sent under, this profile to the Node-RED
      log. A troubleshooting aid — verbose on high-rate telemetry, so leave it off in normal use.
    </div>
  </div>
</script>

<script type="text/html" data-help-name="mavlink-ai-vehicle">
  <p>Shared MAVLink <b>Vehicle Profile</b>: the target-facing half of the configuration. It owns the
  dialect, firmware, MAVLink version preference, default target ids, vehicle family (for mode tables
  and parameter metadata), and mission preferences. It does not own a transport.</p>
  <p>It deliberately owns <b>nothing about the local side</b>: no source SysID/CompID, no local
  heartbeat identity, no signing. Those belong to the <b>Local Identity</b> config node
  (<code>mavlink-ai-local-identity</code>), which the Connection references — so selecting a Vehicle
  Profile can never change who this Node-RED runtime is on the wire. A GCS talking to a Copter gets
  Copter modes and parameters <em>and</em> a truthful <code>MAV_TYPE_GCS</code> heartbeat.</p>
  <h3>Vehicle family</h3>
  <p><b>Copter / Plane / Rover / Boat / Sub / Antenna Tracker</b> select the ArduPilot mode tables and
  parameter metadata for that vehicle; <b>Generic</b> applies no vehicle-specific metadata.</p>
  <p><b>Outbound target SysID/CompID</b> (commonly <code>1</code>/<code>1</code> for the autopilot) are
  the <em>default destination for messages you send</em> with this profile — an outbound default, not an
  inbound identity. Which incoming packets are matched to this profile is decided by the
  <b>Connection's route table</b>, not by this field, so on a routed multi-vehicle Connection the
  route's SysID is authoritative and this stays purely an outbound default.</p>
  <h3>Dialect source</h3>
  <ul>
    <li><b>Bundled</b> — pick from the dialects the loader can serve (discovered dynamically, not hard-coded).</li>
    <li><b>Custom</b> — a single <b>XML path</b> to a MAVLink dialect file the Node-RED process can read (local or mounted; they are not separate modes). Its <code>&lt;include&gt;</code> graph is resolved and the dialect is compiled at runtime. Invalid XML or a missing/circular include fails loudly (the profile marks itself invalid) rather than falling back.</li>
  </ul>
  <h3>Advanced</h3>
  <p><b>Version</b> — MAVLink 1/2 framing. <code>auto</code> (recommended) sends v2 until it hears a peer
  speak v1, then matches it; force <code>v1</code>/<code>v2</code> only for a stack that requires it.</p>
  <p><b>Mission Item</b> — the mission-item wire message used for downloads. <code>MISSION_ITEM_INT</code>
  (int32 degE7, precise) suits modern ArduPilot/PX4. It is only the initial download request: downloads
  auto-downgrade to the legacy float <code>MISSION_ITEM</code> if a pre-INT MAVLink-1 vehicle doesn't
  answer, and uploads always answer with the type the vehicle requests — so you rarely change this.</p>
  <p><b>Debug</b> — when enabled, logs a one-line summary of every message decoded as, or sent under,
  this profile to the Node-RED log. A per-vehicle troubleshooting aid; verbose on live telemetry, so
  leave it off in normal operation.</p>
</script>
