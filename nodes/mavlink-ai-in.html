<script type="text/javascript">
  RED.nodes.registerType('mavlink-ai-in', {
    category: 'MAVLink AI',
    color: '#C7E9C0',
    defaults: {
      name: { value: '' },
      connection: { value: '', type: 'mavlink-ai-connection', required: true },
      messageNames: { value: '' },
      messageIds: { value: '' },
      sysid: { value: '' },
      compid: { value: '' },
      profileFilter: { value: '' },
      rateLimitHz: { value: 0 },
      changedOnly: { value: false },
      outputRaw: { value: false },
      outputErrors: { value: false },
      outputs: { value: 1 }
    },
    inputs: 0,
    outputs: 1,
    icon: 'bridge.svg',
    paletteLabel: 'MAVLink In',
    label: function () {
      return this.name || 'mavlink ai in';
    },
    outputLabels: function (index) {
      // Output layout mirrors the runtime: decoded always first, then raw
      // (when enabled), then errors (when enabled) — optional outputs keep
      // their relative order, so the errors port index depends on outputRaw.
      const labels = ['decoded'];
      if (this.outputRaw) {
        labels.push('raw');
      }
      if (this.outputErrors) {
        labels.push('errors');
      }
      return labels[index];
    },
    oneditprepare: function () {
      function syncOutputs() {
        const n = 1 + ($('#node-input-outputRaw').is(':checked') ? 1 : 0) + ($('#node-input-outputErrors').is(':checked') ? 1 : 0);
        $('#node-input-outputs').val(n);
      }
      $('#node-input-outputRaw').on('change', syncOutputs);
      $('#node-input-outputErrors').on('change', syncOutputs);
      syncOutputs();
    },
    oneditsave: function () {
      const n = 1 + ($('#node-input-outputRaw').is(':checked') ? 1 : 0) + ($('#node-input-outputErrors').is(':checked') ? 1 : 0);
      $('#node-input-outputs').val(n);
    }
  });
</script>

<script type="text/html" data-template-name="mavlink-ai-in">
  <div class="form-row">
    <label for="node-input-name"><i class="fa fa-tag"></i> Name</label>
    <input type="text" id="node-input-name" placeholder="MAVLink In">
  </div>
  <div class="form-row">
    <label for="node-input-connection">Connection</label>
    <input type="text" id="node-input-connection">
  </div>
  <div class="form-tips" style="margin: -6px 0 8px 105px; width: 70%;">
    This node does <b>not</b> open a link — it's a filtered <b>subscription</b> to messages the selected <b>Connection</b> already decodes. Many In nodes can share one connection (across flow tabs); the connection decodes each packet once and distributes it.
  </div>
  <div class="form-row">
    <label for="node-input-messageNames">Messages</label>
    <input type="text" id="node-input-messageNames" placeholder="HEARTBEAT,GLOBAL_POSITION_INT (blank = all)">
  </div>
  <div class="form-row">
    <label for="node-input-messageIds">Message IDs</label>
    <input type="text" id="node-input-messageIds" placeholder="0,33 (blank = all)">
  </div>
  <div class="form-row">
    <label for="node-input-sysid">SysID</label>
    <input type="text" id="node-input-sysid" placeholder="any">
  </div>
  <div class="form-row">
    <label for="node-input-compid">CompID</label>
    <input type="text" id="node-input-compid" placeholder="any">
  </div>
  <div class="form-row">
    <label for="node-input-profileFilter">Profile</label>
    <input type="text" id="node-input-profileFilter" placeholder="any">
  </div>
  <div class="form-row">
    <label for="node-input-rateLimitHz">Rate limit Hz</label>
    <input type="number" id="node-input-rateLimitHz" min="0" placeholder="0 = unlimited">
  </div>
  <div class="form-row">
    <label for="node-input-changedOnly">Changed only</label>
    <input type="checkbox" id="node-input-changedOnly" style="display: inline-block; width: auto; vertical-align: top;">
  </div>
  <div class="form-row">
    <label for="node-input-outputRaw">Raw output</label>
    <input type="checkbox" id="node-input-outputRaw" style="display: inline-block; width: auto; vertical-align: top;">
  </div>
  <div class="form-row">
    <label for="node-input-outputErrors">Errors output</label>
    <input type="checkbox" id="node-input-outputErrors" style="display: inline-block; width: auto; vertical-align: top;">
  </div>
  <input type="hidden" id="node-input-outputs">
</script>

<script type="text/html" data-help-name="mavlink-ai-in">
  <p>A filtered <b>subscription</b> to decoded MAVLink messages from a shared <b>MAVLink AI Connection</b>. It is an ordinary flow node — it does <b>not</b> open a link, define an identity, or decode the byte stream itself.</p>
  <h3>How it fits together</h3>
  <p>Three distinct pieces, easy to confuse:</p>
  <ul>
    <li><b>Vehicle Profile</b> (config node) — the target vehicle's dialect, MAVLink version preference, and defaults. Who Node-RED transmits as lives on the Connection's Local Identity, not here.</li>
    <li><b>Connection</b> (config node) — the serial/UDP/TCP link. It owns the socket, decodes the incoming stream <b>once</b>, and distributes decoded messages to all subscribers.</li>
    <li><b>MAVLink In</b> (this node) — a subscriber that receives that decoded stream and applies its own filters. It creates no transport of its own.</li>
  </ul>
  <p>The selected connection is <b>shared</b>: many In nodes — on the same tab or across different flow tabs — can subscribe to one connection at once. Adding In nodes does not open extra ports or re-decode the same bytes; each just gets its own filtered view.</p>
  <pre>Flight controller
  → shared Connection (decodes once)
     → MAVLink In: HEARTBEAT             → status flow
     → MAVLink In: GLOBAL_POSITION_INT   → navigation flow
     → MAVLink In: COMMAND_ACK           → command-result flow</pre>
  <h3>Outputs</h3>
  <p>The node only shows the outputs you enable, in this fixed order (disabled outputs are skipped, so the port numbers shift):</p>
  <ul>
    <li><b>decoded</b> — always the first output. Decoded messages (<code>mavlink/&lt;NAME&gt;</code>).</li>
    <li><b>raw</b> — present only when <b>Raw output</b> is enabled; always directly after <i>decoded</i>. Raw packet buffers.</li>
    <li><b>errors</b> — present only when <b>Errors output</b> is enabled; always the last output (output 2 when raw is disabled, output 3 when raw is enabled). Connection diagnostics: <code>mavlink/error</code> for packets the matched dialect could not decode (with raw hex), and <code>mavlink/rejected</code> for packets dropped by routing/accept filters. Both include the sender endpoint (<code>remoteAddress</code>/<code>remotePort</code>, plus <code>clientId</code> on tcp-server) where the transport provides one, so you can tell which endpoint sent the offending traffic.</li>
  </ul>
  <p>So the possible layouts are: <code>decoded</code> · <code>decoded, raw</code> · <code>decoded, errors</code> · <code>decoded, raw, errors</code>. Hover a port in the editor to see its label.</p>
  <p>Use the filters to subscribe to specific messages, systems, components, or a routed profile, and rate-limit high-rate telemetry.</p>
</script>
