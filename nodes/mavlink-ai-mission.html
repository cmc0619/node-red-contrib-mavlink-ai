<script type="text/javascript">
  RED.nodes.registerType('mavlink-ai-mission', {
    category: 'MAVLink AI',
    paletteLabel: 'MAVLink Mission',
    color: '#FFE6B3',
    defaults: {
      name: { value: '' },
      connection: { value: '', type: 'mavlink-ai-connection', required: true },
      profile: { value: '', type: 'mavlink-ai-vehicle', required: false },
      action: { value: 'download', required: true },
      missionType: { value: 'mission', required: true },
      timeoutMs: { value: 10000, validate: RED.validators.number() },
      maxRetries: { value: 3, validate: RED.validators.number() }
    },
    inputs: 1,
    outputs: 3,
    outputLabels: ['mission', 'progress', 'error'],
    icon: 'font-awesome/fa-map',
    label: function () {
      return this.name || 'mavlink ai mission';
    },
    oneditprepare: function () {
      /**
       * Fold the optional Profile override under an Advanced disclosure so the
       * common case (the Connection carries a default profile) stays uncluttered
       * (#127). Expand it automatically when a profile is already set, so an
       * existing override is never hidden.
       *
       * The section is NOT hidden in the markup: Node-RED builds the config-node
       * picker (replacing the Profile input with a select) before oneditprepare,
       * sizing it from the input's width — inside a display:none parent that
       * width is 0 and the picker renders unusably narrow. So it starts visible
       * and this initial call hides it after the picker is built (#127).
       */
      function toggleAdvanced(show) {
        $('.mav-advanced').toggle(show);
        $('#node-mav-advanced-toggle i').toggleClass('fa-caret-right', !show).toggleClass('fa-caret-down', show);
      }
      $('#node-mav-advanced-toggle').on('click', function (e) {
        e.preventDefault();
        toggleAdvanced(!$('.mav-advanced').is(':visible'));
      });
      toggleAdvanced(!!$('#node-input-profile').val());
    }
  });
</script>

<script type="text/html" data-template-name="mavlink-ai-mission">
  <div class="form-row">
    <label for="node-input-name"><i class="fa fa-tag"></i> Name</label>
    <input type="text" id="node-input-name" placeholder="MAVLink Mission">
  </div>
  <div class="form-row">
    <label for="node-input-connection">Connection</label>
    <input type="text" id="node-input-connection">
  </div>
  <div class="form-row">
    <a href="#" id="node-mav-advanced-toggle" style="color: inherit;"><i class="fa fa-caret-right"></i> Advanced</a>
  </div>
  <div class="mav-advanced">
    <div class="form-row">
      <label for="node-input-profile">Profile</label>
      <input type="text" id="node-input-profile">
    </div>
    <div class="form-tips" style="margin: -6px 0 8px 105px; width: 70%;">
      Optional — pins the workflow to a specific profile, overriding the connection's routed/default profile. Leave blank for the usual case.
    </div>
  </div>
  <div class="form-row">
    <label for="node-input-action">Action</label>
    <select id="node-input-action">
      <option value="download">Download</option>
      <option value="upload">Upload</option>
      <option value="clear">Clear</option>
    </select>
  </div>
  <div class="form-row">
    <label for="node-input-missionType">Mission Type</label>
    <select id="node-input-missionType">
      <option value="mission">mission</option>
      <option value="fence">fence</option>
      <option value="rally">rally</option>
      <option value="all">all</option>
    </select>
  </div>
  <div class="form-row">
    <label for="node-input-timeoutMs">Timeout ms</label>
    <input type="number" id="node-input-timeoutMs" placeholder="10000">
  </div>
  <div class="form-row">
    <label for="node-input-maxRetries">Retries</label>
    <input type="number" id="node-input-maxRetries" placeholder="3">
  </div>
  <div class="form-tips">
    Timeout is per protocol step (each count/item/ack), not the whole transfer; on expiry the step is retransmitted up to <b>Retries</b> times before failing. Default <b>10000 ms</b> suits real radio/serial links — lower it (e.g. 2000–3000) for SITL or fast local links, raise it for slow/lossy links.
  </div>
</script>

<script type="text/html" data-help-name="mavlink-ai-mission">
  <p>Runs the MAVLink mission protocol against the vehicle on a shared <b>MAVLink AI Connection</b>. Only one workflow runs per connection/profile/mission-type at a time (it is locked); a second concurrent request fails clearly.</p>
  <h3>Actions</h3>
  <ul>
    <li><b>Download</b> — request the mission and assemble all items.</li>
    <li><b>Upload</b> — send <code>msg.payload.items</code> (or <code>waypoints</code>) to the vehicle.</li>
    <li><b>Clear</b> — clear the mission of the selected type.</li>
  </ul>
  <p>The action is resolved in priority order: <code>msg.action</code>, <code>msg.payload.action</code>, an Aigen-style topic (<code>upload_mission</code> / <code>download_mission</code> / <code>clear_mission</code>), then the node config default.</p>
  <h3>Profile</h3>
  <p><b>Profile</b> (optional) pins the workflow to a specific profile: its dialect, source identity, signing, and target defaults are used, and every outbound message is encoded with it. Left empty, the target system/component is resolved through the connection's route table (the same resolution inbound packets get) and falls back to the connection's default profile. <code>msg.payload.profile</code> overrides per message. On routed connections with component-specific routes, set an explicit profile — target defaults can make route resolution ambiguous.</p>
  <h3>Inputs</h3>
  <p><b>Mission Type</b> selects which MAVLink list this node works on — <code>mission</code> (waypoints), <code>fence</code>, <code>rally</code>, or <code>all</code> (clear-only). It lives on this node, not the Vehicle Profile, because it is a per-operation choice: back several Mission nodes with one profile to handle different lists. <code>msg.payload.mission_type</code> overrides it per message.</p>

  <p><code>msg.payload</code> may set <code>target_system</code>, <code>target_component</code>, <code>mission_type</code> (mission/fence/rally/all), <code>profile</code>, and for upload an <code>items</code> array.</p>
  <h3>Upload items</h3>
  <p><code>payload.waypoints</code> is accepted as a friendly alias for <code>payload.items</code>. A simple entry with just <code>lat</code>/<code>lon</code>/<code>alt</code> and no <code>command</code> defaults to <code>MAV_CMD_NAV_WAYPOINT</code>. Explicit <code>command</code>/params/raw <code>x</code>-<code>y</code>/frame still work and take precedence. The vehicle's request type controls the item wire message: a <code>MISSION_REQUEST_INT</code> is answered with <code>MISSION_ITEM_INT</code> (degE7), a plain <code>MISSION_REQUEST</code> with <code>MISSION_ITEM</code> (float degrees).</p>
  <p>Each item's fields are validated against their MAVLink wire type before the transfer starts — a missing or unknown <code>command</code>, an unknown <code>frame</code>, an out-of-range <code>lat</code>/<code>lon</code>, or non-numeric garbage in a param/coordinate/flag fails with a structured error rather than being silently uploaded as a defaulted <code>0</code>. Explicit <code>NaN</code> (or the string <code>"NaN"</code>/<code>null</code>) is preserved only on the float <code>param1</code>–<code>param4</code> fields as the "keep current / use default" sentinel; raw <code>x</code>/<code>y</code> coordinates require a finite value (they are int32 on the <code>MISSION_ITEM_INT</code> path).</p>
  <p><b>Empty upload is not an implicit clear.</b> An upload whose <code>items</code>/<code>waypoints</code> is missing or not an array fails (a wiring typo must never erase the mission), and an explicitly empty array is refused unless you confirm with <code>msg.allow_empty</code> / <code>msg.payload.allow_empty</code> set to <code>true</code>. To erase the on-vehicle mission, use the dedicated <b>Clear</b> action.</p>
  <h3>Clear</h3>
  <p>Clear is best-effort by default: it resolves once <code>MISSION_CLEAR_ALL</code> is sent (some stacks do not ack clearing an already-empty mission). Set <code>msg.wait_ack</code> or <code>msg.payload.wait_ack</code> to <code>true</code> to instead wait for a <code>MISSION_ACK</code> — resolving on accepted (with numeric <code>result</code> and readable <code>result_name</code>) or failing on rejection/timeout. An optional <code>timeout_ms</code> overrides the node timeout for the wait. The result's <code>acked</code> flag says whether it was acknowledged.</p>
  <h3>Coordinates</h3>
  <p>For upload items, give <code>lat</code>/<code>lon</code> in plain <b>float degrees</b> (plus <code>z</code> or <code>alt</code> in meters) — they are converted to the wire scaling automatically (degE7 int32 for <code>MISSION_ITEM_INT</code>). Explicit <code>x</code>/<code>y</code> are treated as raw wire values and win over <code>lat</code>/<code>lon</code>.</p>
  <p>Downloaded items keep raw <code>x</code>/<code>y</code> and add <code>lat</code>/<code>lon</code> in float degrees for global frames, plus <code>wire_message</code> naming the message type they arrived as.</p>
  <h3>Timeout &amp; retries</h3>
  <p><b>Timeout ms</b> applies to each protocol step (waiting for a count, an item, or an ack), not the whole transfer. On expiry the last message is retransmitted, up to <b>Retries</b> times, before the workflow fails with <code>MISSION_TIMEOUT</code>. The default is <b>10000 ms</b> (matching the legacy driver and safe for real radio/serial links) — lower it to ~2000–3000 ms on SITL or fast local links, raise it for slow/lossy links.</p>
  <h3>Outputs</h3>
  <ol class="node-ports">
    <li>Completed mission object.</li>
    <li>Progress events.</li>
    <li>Errors / timeouts.</li>
  </ol>
  <p>Failures are delivered once, on output 3 — they do not also trigger <b>Catch</b> nodes. Wire output 3 to handle errors.</p>
</script>
