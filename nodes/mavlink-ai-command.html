<script type="text/javascript">
  RED.nodes.registerType('mavlink-ai-command', {
    category: 'MAVLink AI',
    color: '#FFE6B3',
    defaults: {
      name: { value: '' },
      profile: { value: '', type: 'mavlink-ai-profile', required: true },
      connection: { value: '', type: 'mavlink-ai-connection', required: false },
      command: { value: 'arm', required: true },
      sendAs: { value: 'long' },
      awaitAck: { value: false },
      timeoutMs: { value: 3000, validate: RED.validators.number() },
      maxRetries: { value: 3, validate: RED.validators.number() },
      fields: { value: '' },
      // Friendly preset parameters (#49), stored separately from the raw
      // paramN fields so preset/raw switches can't corrupt saved values.
      // Reboot requires an explicit confirmation once the dialog has been
      // edited; pre-existing flows (no presetFields yet) stay valid.
      presetFields: {
        value: '',
        validate: function (v) {
          if (this.command !== 'reboot' || !v) {
            return true;
          }
          try {
            return JSON.parse(v).confirm === true;
          } catch (e) {
            return false;
          }
        }
      }
    },
    inputs: 1,
    outputs: 1,
    icon: 'font-awesome/fa-bolt',
    label: function () {
      return this.name || (this.command ? 'cmd ' + this.command : 'mavlink ai command');
    },
    oneditprepare: function () {
      const node = this;
      // Friendly presets grouped by workflow (#50). Raw MAV_CMD_* is NOT a
      // preset — it is the advanced escape hatch and gets its own optgroup.
      const PRESET_GROUPS = [
        ['Basic Flight', [
          ['arm', 'Arm'],
          ['disarm', 'Disarm'],
          ['set_mode', 'Set Mode'],
          ['takeoff', 'Takeoff'],
          ['land', 'Land'],
          ['rtl', 'RTL']
        ]],
        ['Guided / Autonomy', [
          ['goto', 'Go To / Reposition'],
          ['change_speed', 'Change Speed'],
          ['condition_yaw', 'Condition Yaw'],
          ['spin', 'Spin / Rotate']
        ]],
        ['Mission', [
          ['mission_start', 'Mission Start'],
          ['pause_mission', 'Pause Mission'],
          ['resume_mission', 'Resume Mission']
        ]],
        ['Camera', [
          ['take_photo', 'Take Photo'],
          ['start_video', 'Start Video Recording'],
          ['stop_video', 'Stop Video Recording']
        ]],
        ['Telemetry / System', [
          ['request_message', 'Request Message'],
          ['set_message_interval', 'Set Message Interval'],
          ['stop_message_interval', 'Stop Message Interval'],
          ['reboot', 'Reboot Autopilot']
        ]]
      ];

      // Friendly per-preset parameter forms (#49). Field types:
      //   number | checkbox | select (static options) |
      //   mode (profile-aware flight modes) | message (dialect message picker)
      const PRESET_FORMS = {
        arm: {
          fields: [{ key: 'force', type: 'checkbox', label: 'Force arm', tip: 'Bypasses pre-arm safety checks (magic value 21196). Usually leave off.' }]
        },
        disarm: {
          fields: [{ key: 'force', type: 'checkbox', label: 'Force disarm', tip: 'Bypasses safety checks — can disarm in flight. Usually leave off.' }]
        },
        set_mode: {
          tip: 'The mode list comes from the profile firmware + vehicle type. Numeric base_mode/custom_mode via msg.payload keep working; raw custom-mode numbers are firmware/vehicle-specific (GUIDED is 4 on ArduCopter but 15 on ArduPlane).',
          fields: [{ key: 'mode', type: 'mode', label: 'Flight mode' }]
        },
        takeoff: {
          fields: [{ key: 'altitude', type: 'number', label: 'Altitude (m)', placeholder: '10' }]
        },
        land: { tip: 'No parameters — lands at the current position.' },
        rtl: { tip: 'No parameters — returns to the launch point.' },
        goto: {
          tip: 'Sends MAV_CMD_DO_REPOSITION as COMMAND_INT (lat/lon converted to degE7 automatically). msg.payload.lat/lon/alt override the static values.',
          fields: [
            { key: 'lat', type: 'number', label: 'Latitude (deg)' },
            { key: 'lon', type: 'number', label: 'Longitude (deg)' },
            { key: 'alt', type: 'number', label: 'Altitude (m)' },
            { key: 'speed', type: 'number', label: 'Speed (m/s)', placeholder: '-1 = default' }
          ]
        },
        change_speed: {
          fields: [
            {
              key: 'speed_type',
              type: 'select',
              label: 'Speed type',
              options: [['groundspeed', 'Ground speed'], ['airspeed', 'Airspeed'], ['climb', 'Climb speed'], ['descent', 'Descent speed']]
            },
            { key: 'speed', type: 'number', label: 'Speed (m/s)' },
            { key: 'throttle', type: 'number', label: 'Throttle (%)', placeholder: '-1 = no change', advanced: true }
          ]
        },
        condition_yaw: {
          fields: [
            { key: 'angle', type: 'number', label: 'Yaw angle (deg)' },
            { key: 'rate', type: 'number', label: 'Yaw rate (deg/s)', placeholder: '0 = default' },
            {
              key: 'direction',
              type: 'select',
              label: 'Direction',
              options: [['shortest', 'Shortest'], ['clockwise', 'Clockwise'], ['counter-clockwise', 'Counter-clockwise']]
            },
            { key: 'relative', type: 'checkbox', label: 'Relative', tip: 'Turn relative to the current heading instead of to an absolute heading.' }
          ]
        },
        spin: {
          tip: 'A relative turn via MAV_CMD_CONDITION_YAW. Any angle works (90, 180, 720, ...); 360 is the classic demo spin.',
          fields: [
            { key: 'angle', type: 'number', label: 'Spin angle (deg)', placeholder: '360' },
            { key: 'rate', type: 'number', label: 'Yaw rate (deg/s)', placeholder: '0 = default' },
            {
              key: 'direction',
              type: 'select',
              label: 'Direction',
              options: [['clockwise', 'Clockwise'], ['counter-clockwise', 'Counter-clockwise']]
            }
          ]
        },
        mission_start: {
          fields: [
            { key: 'first_item', type: 'number', label: 'First item', placeholder: '0' },
            { key: 'last_item', type: 'number', label: 'Last item', placeholder: '0 = end' }
          ]
        },
        pause_mission: { tip: 'MAV_CMD_DO_PAUSE_CONTINUE (pause). Needs firmware support — recent ArduPilot and PX4 accept it; the ACK tells you if yours does not.' },
        resume_mission: { tip: 'MAV_CMD_DO_PAUSE_CONTINUE (continue). Needs firmware support — the ACK tells you if yours does not.' },
        take_photo: {
          tip: 'Cameras are often separate MAVLink components — set target_component (e.g. 100) in msg.payload when the camera is not the autopilot.',
          fields: [
            { key: 'count', type: 'number', label: 'Count', placeholder: '1' },
            { key: 'interval', type: 'number', label: 'Interval (s)', placeholder: '0 = single', advanced: true }
          ]
        },
        start_video: {
          tip: 'Cameras are often separate MAVLink components — set target_component in msg.payload when needed.',
          fields: [{ key: 'stream_id', type: 'number', label: 'Stream ID', placeholder: '0 = all' }]
        },
        stop_video: {
          fields: [{ key: 'stream_id', type: 'number', label: 'Stream ID', placeholder: '0 = all' }]
        },
        reboot: {
          warning: 'Reboots the autopilot. Never send this to a flying vehicle — motors stop and the vehicle falls. The runtime refuses to build this command unless confirmed here (or msg.payload.confirm = true).',
          fields: [{ key: 'confirm', type: 'checkbox', label: 'Confirm reboot' }]
        },
        request_message: {
          fields: [{ key: 'message_id', type: 'message', label: 'Message' }]
        },
        set_message_interval: {
          fields: [
            { key: 'message_id', type: 'message', label: 'Message' },
            { key: 'rate_hz', type: 'number', label: 'Rate (Hz)', tip: 'Converted to interval microseconds on send (param2 = 1e6 / rate). msg.payload.interval_us overrides.' }
          ]
        },
        stop_message_interval: {
          fields: [{ key: 'message_id', type: 'message', label: 'Message' }]
        }
      };

      const $command = $('#node-input-command');
      const $params = $('#mav-cmd-params');
      const $preset = $('#mav-preset-params');
      const $cmdDesc = $('#mav-cmd-desc');
      let commands = {}; // MAV_CMD_NAME -> { description, params:[{index,name,description,units,enum,bitmask,boolean,control,resolver,profileAware,componentAware,min,max,increment}] }
      let mavCmdByName = {}; // MAV_CMD_NAME -> { value, description } (enum table)
      let enumsByName = {}; // ENUM_PREFIX -> [{ name, value, description }] (dialect enum tables, #97)
      let messageList = []; // [{name, id}] for the message pickers
      // Reload closures for the profile/component-aware controls currently
      // rendered, so a profile or target-component change refreshes their
      // choices without wiping unsaved edits to other params (#97).
      let resolverControls = [];
      // Editor-only context for component-addressed params (not persisted as a
      // command field): which component type the raw command targets.
      let rawComponentType = 'autopilot';

      let savedParams = {};
      try {
        savedParams = node.fields ? JSON.parse(node.fields) : {};
      } catch (e) {
        savedParams = {};
      }
      let savedPreset = {};
      try {
        savedPreset = node.presetFields ? JSON.parse(node.presetFields) : {};
      } catch (e) {
        savedPreset = {};
      }

      // Metadata query for the selected profile; a custom-XML profile forwards
      // its path so the runtime-compiled dialect's metadata is served too.
      function currentDialect() {
        const p = RED.nodes.node($('#node-input-profile').val());
        const query = { dialect: (p && p.dialect) || 'ardupilotmega' };
        if (query.dialect === 'custom' && p && p.customDialectPath) {
          query.customDialectPath = p.customDialectPath;
        }
        return query;
      }

      function isRaw(value) {
        return /^MAV_CMD_/.test(value);
      }

      function tipsBox(text) {
        return $('<div class="form-tips" style="margin:2px 0 6px 140px; width:55%; box-sizing:border-box;"></div>').text(text);
      }

      // ---- friendly preset forms (#49) -----------------------------------

      /** One preset field row; the input carries data-preset=<key>. */
      function presetRow(field, $host) {
        const $row = $('<div class="form-row" style="margin-bottom:4px;"></div>');
        $('<label></label>').css({ width: '140px' }).text(field.label).appendTo($row);
        const saved = savedPreset[field.key];
        let $input;
        if (field.type === 'checkbox') {
          $input = $('<input type="checkbox">')
            .css({ width: 'auto', 'vertical-align': 'middle' })
            .prop('checked', saved === true);
        } else if (field.type === 'select') {
          $input = $('<select></select>').css({ width: '55%' });
          field.options.forEach(function (o) {
            $('<option></option>').val(o[0]).text(o[1]).appendTo($input);
          });
          if (saved !== undefined) {
            $input.val(String(saved));
          }
        } else if (field.type === 'message') {
          $input = $('<select></select>').css({ width: '55%' }).addClass('mav-preset-message');
          $('<option></option>').val('').text('(set via msg.payload)').appendTo($input);
          messageList.forEach(function (m) {
            $('<option></option>').val(m.id).text(m.name + ' (' + m.id + ')').appendTo($input);
          });
          if (saved !== undefined) {
            $input.val(String(saved));
            if ($input.val() !== String(saved)) {
              // keep an id the current dialect doesn't list
              $('<option></option>').val(String(saved)).text(String(saved)).appendTo($input);
              $input.val(String(saved));
            }
          }
        } else if (field.type === 'mode') {
          $input = $('<select></select>').css({ width: '55%' }).addClass('mav-preset-mode');
          $('<option></option>').val('').text('Loading modes...').appendTo($input);
        } else {
          $input = $('<input type="number" step="any">')
            .css({ width: '55%' })
            .attr('placeholder', field.placeholder || '')
            .val(saved !== undefined ? saved : '');
        }
        $input.attr('data-preset', field.key).attr('data-preset-type', field.type).appendTo($row);
        if (field.tip) {
          tipsBox(field.tip).appendTo($row);
        }
        $row.appendTo($host);
      }

      // Populate the Set Mode dropdown from the profile firmware/type (#49).
      let modesRequestId = 0;
      function loadModes($select) {
        const p = RED.nodes.node($('#node-input-profile').val());
        const firmware = (p && p.firmware) || 'generic';
        const vehicleType = (p && p.profileType) || '';
        const requestId = ++modesRequestId;
        $.getJSON('mavlink-ai/modes', { firmware: firmware, vehicleType: vehicleType })
          .done(function (data) {
            if (requestId !== modesRequestId || !$select.closest('body').length) {
              return;
            }
            $select.empty();
            const modes = (data && data.modes) || [];
            if (!modes.length) {
              // No mode-name table for this firmware: fall back to numerics.
              $select.replaceWith(
                $('<input type="number" step="1">')
                  .attr('data-preset', 'custom_mode')
                  .attr('data-preset-type', 'number')
                  .attr('placeholder', 'custom_mode (firmware-specific)')
                  .css({ width: '55%' })
                  .val(savedPreset.custom_mode !== undefined ? savedPreset.custom_mode : '')
              );
              return;
            }
            $('<option></option>').val('').text('(set via msg.payload)').appendTo($select);
            modes.forEach(function (m) {
              $('<option></option>').val(m).text(m).appendTo($select);
            });
            if (savedPreset.mode !== undefined) {
              $select.val(String(savedPreset.mode));
              if ($select.val() !== String(savedPreset.mode)) {
                $('<option></option>').val(String(savedPreset.mode)).text(String(savedPreset.mode)).appendTo($select);
                $select.val(String(savedPreset.mode));
              }
            }
          })
          .fail(function () {
            if (requestId !== modesRequestId) {
              return;
            }
            $select.empty();
            $('<option></option>').val('').text('(modes unavailable — set via msg.payload)').appendTo($select);
          });
      }

      function renderPresetForm(selected) {
        $preset.empty();
        if (isRaw(selected)) {
          return;
        }
        const form = PRESET_FORMS[selected];
        if (!form) {
          return;
        }
        if (form.warning) {
          $('<div class="form-tips" style="margin:4px 0; border-color:#b00; color:#b00;"></div>')
            .text(form.warning)
            .appendTo($preset);
        }
        if (form.tip) {
          $('<div class="form-tips" style="margin:4px 0;"></div>').text(form.tip).appendTo($preset);
        }
        (form.fields || []).forEach(function (field) {
          presetRow(field, $preset);
        });
        $preset.find('.mav-preset-mode').each(function () {
          loadModes($(this));
        });
      }

      // ---- raw MAV_CMD param rows (#45, metadata-driven controls #97) ------

      // Strip an enum's screaming-snake prefix for a compact option label
      // (SPEED_TYPE_AIRSPEED -> AIRSPEED); keep the full name if it doesn't fit.
      function enumShort(name, prefix) {
        return prefix && name.indexOf(prefix + '_') === 0 ? name.slice(prefix.length + 1) : name;
      }

      function paramLabelText(p) {
        return p.name + (p.units ? ' (' + p.units + ')' : '');
      }

      function paramTipText(p) {
        const parts = ['param' + p.index];
        if (p.units) {
          parts.push('Units: ' + p.units);
        }
        if (p.description) {
          parts.push(p.description);
        }
        return parts.join(' | ');
      }

      // Small coloured badge showing whether a control's choices are generic
      // MAVLink metadata or firmware/profile/component-specific (#97 UX).
      function scopeBadge(text, generic) {
        return $('<span></span>')
          .text(text)
          .css({
            'margin-left': '6px',
            'font-size': '11px',
            padding: '0 5px',
            'border-radius': '3px',
            'vertical-align': 'middle',
            color: generic ? '#555' : '#8a4b00',
            background: generic ? '#eee' : '#ffe6b3'
          });
      }

      // Every param control writes its numeric wire value into a hidden input
      // carrying data-param=paramN, so _collectParams stays uniform regardless
      // of which control rendered and unknown imported values survive (#97).
      function makeSink(key, saved) {
        return $('<input type="hidden">')
          .attr('data-param', key)
          .val(saved !== undefined && saved !== null ? String(saved) : '');
      }

      function startRow(p) {
        const $row = $('<div class="form-row" style="margin-bottom:4px;"></div>');
        $('<label></label>').css({ width: '140px' }).text(paramLabelText(p)).attr('title', paramTipText(p)).appendTo($row);
        return $row;
      }

      // Plain / constrained numeric input (min/max/increment when supplied).
      function numericControl(p, $row, $sink) {
        const $num = $('<input type="number" step="any">')
          .css({ width: '55%' })
          .attr('placeholder', 'float')
          .val($sink.val());
        if (p.min !== undefined && p.min !== null) {
          $num.attr('min', p.min);
        }
        if (p.max !== undefined && p.max !== null) {
          $num.attr('max', p.max);
        }
        if (p.increment !== undefined && p.increment !== null) {
          $num.attr('step', p.increment);
        }
        $num.on('input change', function () {
          $sink.val($num.val());
        });
        $num.appendTo($row);
      }

      // Boolean -> checkbox (wire value 0/1).
      function booleanControl(p, $row, $sink) {
        const on = Number($sink.val()) === 1;
        const $cb = $('<input type="checkbox">').css({ width: 'auto', 'vertical-align': 'middle' }).prop('checked', on);
        $cb.on('change', function () {
          $sink.val($cb.is(':checked') ? '1' : '0');
        });
        $cb.appendTo($row);
        scopeBadge('MAVLink', true).appendTo($row);
      }

      // Ordinary enum -> dropdown, with an explicit "Custom value…" numeric
      // escape hatch. Persists the numeric wire value; shows the readable name.
      function enumControl(p, $row, $sink) {
        const members = enumsByName[p.enum] || [];
        const $sel = $('<select></select>').css({ width: '55%' });
        const $custom = $('<input type="number" step="any">')
          .css({ width: '55%', 'margin-top': '3px', display: 'none' })
          .attr('placeholder', 'custom numeric value');
        $('<option></option>').val('').text('(0 / unset)').appendTo($sel);
        members.forEach(function (m) {
          $('<option></option>').val(String(m.value)).text(enumShort(m.name, p.enum) + ' (' + m.value + ')').appendTo($sel);
        });
        $('<option></option>').val('__custom__').text('Custom value…').appendTo($sel);
        function sync() {
          if ($sel.val() === '__custom__') {
            $custom.show();
            $sink.val($custom.val());
          } else {
            $custom.hide();
            $sink.val($sel.val());
          }
        }
        $sel.on('change', sync);
        $custom.on('input change', function () {
          $sink.val($custom.val());
        });
        // Preselect: match a known enum value, else fall back to Custom with the
        // stored number preserved (unknown/new values are never discarded).
        const saved = $sink.val();
        if (saved !== '' && !members.some(function (m) { return String(m.value) === saved; })) {
          $sel.val('__custom__');
          $custom.val(saved).show();
        } else {
          $sel.val(saved);
        }
        $sel.appendTo($row);
        scopeBadge('MAVLink ' + p.enum, true).appendTo($row);
        $custom.appendTo($row);
      }

      // Bitmask enum -> a checklist of single-bit flags plus an "other bits"
      // numeric for values the flag list can't express; the combined OR is the
      // persisted wire value (#97).
      function bitmaskControl(p, $row, $sink) {
        const members = (enumsByName[p.bitmask] || []).filter(function (m) {
          return m.value > 0 && (m.value & (m.value - 1)) === 0; // single-bit flags only
        });
        const knownBits = members.reduce(function (acc, m) { return acc | m.value; }, 0);
        const saved = Number($sink.val()) || 0;
        const $box = $('<div style="width:55%; display:inline-block; vertical-align:top;"></div>');
        const $checks = [];
        function recompute() {
          let value = 0;
          $checks.forEach(function (c) {
            if (c.$el.is(':checked')) {
              value |= c.bit;
            }
          });
          const extra = parseInt($other.val(), 10);
          if (Number.isFinite(extra)) {
            value |= extra;
          }
          $sink.val(value ? String(value >>> 0) : '');
        }
        members.forEach(function (m) {
          const $line = $('<div style="margin:1px 0;"></div>');
          const $cb = $('<input type="checkbox">')
            .css({ width: 'auto', 'vertical-align': 'middle', 'margin-right': '4px' })
            .prop('checked', (saved & m.value) !== 0);
          $cb.on('change', recompute);
          $checks.push({ $el: $cb, bit: m.value });
          $cb.appendTo($line);
          $('<span></span>').text(enumShort(m.name, p.bitmask) + ' (' + m.value + ')').appendTo($line);
          $line.appendTo($box);
        });
        const $otherLine = $('<div style="margin-top:2px;"></div>');
        $('<span style="color:#888; margin-right:4px;">Other bits:</span>').appendTo($otherLine);
        const $other = $('<input type="number" step="1" min="0">')
          .css({ width: '40%' })
          .attr('placeholder', '0')
          .val(saved & ~knownBits ? String(saved & ~knownBits) : '');
        $other.on('input change', recompute);
        $other.appendTo($otherLine);
        $otherLine.appendTo($box);
        $box.appendTo($row);
        scopeBadge('MAVLink ' + p.bitmask, true).appendTo($row);
      }

      // Profile/target-context-aware dropdown (#97): populated asynchronously
      // from /mavlink-ai/param-choices for the current profile/component, with a
      // "Custom value…" numeric fallback for unsupported/new firmware values.
      function resolverControl(p, $row, $sink) {
        const $sel = $('<select></select>').css({ width: '55%' });
        const $custom = $('<input type="number" step="any">')
          .css({ width: '55%', 'margin-top': '3px', display: 'none' })
          .attr('placeholder', 'custom numeric value');
        const $badge = scopeBadge('resolving…', false);
        $sel.append($('<option></option>').val('').text('Loading…'));
        $sel.appendTo($row);
        $badge.appendTo($row);
        $custom.appendTo($row);

        function applyCustom(val) {
          $sel.val('__custom__');
          $custom.val(val).show();
          $sink.val(val);
        }
        function sync() {
          if ($sel.val() === '__custom__') {
            $custom.show();
            $sink.val($custom.val());
          } else {
            $custom.hide();
            $sink.val($sel.val());
          }
        }
        $sel.on('change', sync);
        $custom.on('input change', function () {
          $sink.val($custom.val());
        });

        let requestId = 0;
        function reload() {
          const prof = RED.nodes.node($('#node-input-profile').val());
          const query = {
            resolver: p.resolver,
            firmware: (prof && prof.firmware) || 'generic',
            vehicleType: (prof && prof.profileType) || '',
            dialect: currentDialect().dialect
          };
          if (currentDialect().customDialectPath) {
            query.customDialectPath = currentDialect().customDialectPath;
          }
          if (p.componentAware) {
            query.componentType = rawComponentType;
          }
          const rid = ++requestId;
          const saved = $sink.val();
          $.getJSON('mavlink-ai/param-choices', query)
            .done(function (data) {
              if (rid !== requestId || !$sel.closest('body').length) {
                return;
              }
              const choices = (data && data.choices) || [];
              $sel.empty();
              $('<option></option>').val('').text('(0 / unset)').appendTo($sel);
              choices.forEach(function (c) {
                $('<option></option>').val(String(c.value)).text(c.name + ' (' + c.value + ')').appendTo($sel);
              });
              $('<option></option>').val('__custom__').text('Custom value…').appendTo($sel);
              if (!choices.length) {
                // No trustworthy mapping for this context: numeric entry only.
                $badge.replaceWith(scopeBadge('numeric (no mapping)', false));
              } else {
                $badge.text(data.generic ? 'MAVLink' : (data.scope === 'component' ? 'component-specific' : 'firmware-specific'));
                $badge.css({ color: data.generic ? '#555' : '#8a4b00', background: data.generic ? '#eee' : '#ffe6b3' });
              }
              if (saved !== '' && !choices.some(function (c) { return String(c.value) === saved; })) {
                applyCustom(saved);
              } else {
                $sel.val(saved);
                sync();
              }
            })
            .fail(function () {
              if (rid !== requestId) {
                return;
              }
              $sel.empty();
              $('<option></option>').val('').text('(unavailable — enter numeric)').appendTo($sel);
              $('<option></option>').val('__custom__').text('Custom value…').appendTo($sel);
              if (saved !== '') {
                applyCustom(saved);
              }
            });
        }
        reload();
        resolverControls.push({ reload: reload, componentAware: !!p.componentAware });
      }

      function renderParamField(p) {
        const key = 'param' + p.index;
        const $row = startRow(p);
        const $sink = makeSink(key, savedParams[key]);
        $sink.appendTo($row);
        if (p.bitmask && (enumsByName[p.bitmask] || []).length) {
          bitmaskControl(p, $row, $sink);
        } else if (p.resolver) {
          resolverControl(p, $row, $sink);
        } else if (p.enum && (enumsByName[p.enum] || []).length) {
          enumControl(p, $row, $sink);
        } else if (p.boolean) {
          booleanControl(p, $row, $sink);
        } else {
          numericControl(p, $row, $sink);
        }
        if (p.description) {
          tipsBox(paramTipText(p)).appendTo($row);
        }
        return $row;
      }

      // Visible command-level description (metadata command doc, falling back
      // to the MAV_CMD enum entry's description).
      function renderCommandDescription(selected) {
        $cmdDesc.empty().hide();
        if (!isRaw(selected)) {
          return;
        }
        const def = commands[selected];
        const description = (def && def.description) || (mavCmdByName[selected] && mavCmdByName[selected].description);
        if (description) {
          $cmdDesc.text(description).show();
        }
      }

      // A target-component selector, shown only when a rendered param is
      // component-addressed; changing it refreshes those controls' choices.
      function renderComponentContext(params) {
        if (!params.some(function (p) { return p.componentAware; })) {
          return;
        }
        const $row = $('<div class="form-row" style="margin-bottom:4px;"></div>');
        $('<label></label>').css({ width: '140px' }).text('Target component').appendTo($row);
        const $sel = $('<select></select>').css({ width: '55%' });
        [['autopilot', 'Autopilot'], ['camera', 'Camera'], ['gimbal', 'Gimbal / Mount']].forEach(function (o) {
          $('<option></option>').val(o[0]).text(o[1]).appendTo($sel);
        });
        $sel.val(rawComponentType);
        $sel.on('change', function () {
          rawComponentType = $sel.val();
          resolverControls.forEach(function (c) {
            if (c.componentAware) {
              c.reload();
            }
          });
        });
        $sel.appendTo($row);
        tipsBox('Editor context only — which component this raw command targets. Set msg.payload.target_component at runtime.').appendTo($row);
        $row.appendTo($params);
      }

      function renderParams() {
        $params.empty();
        resolverControls = [];
        const selected = $command.val();
        renderCommandDescription(selected);
        renderPresetForm(selected);
        if (!isRaw(selected)) {
          return;
        }
        const def = commands[selected];
        if (def && def.params && def.params.length) {
          $('<div style="color:#888;margin:4px 0;">Parameters (leave blank for 0):</div>').appendTo($params);
          renderComponentContext(def.params);
          def.params.forEach(function (p) {
            renderParamField(p).appendTo($params);
          });
        } else {
          // Only fall back to raw param1..7 when the dialect metadata genuinely
          // has no named params for this command — and say so, so it's clear the
          // labels aren't just missing (#7).
          const reason = Object.keys(commands).length
            ? 'No parameter metadata for this command in the selected dialect'
            : 'Command metadata unavailable';
          $('<div style="color:#888;margin:4px 0;"></div>')
            .text(reason + ' — using raw param1–7 (leave blank for 0):')
            .appendTo($params);
          for (let i = 1; i <= 7; i += 1) {
            renderParamField({ index: i, name: 'param' + i }).appendTo($params);
          }
        }
      }

      function buildOptions(mavCmds) {
        mavCmdByName = {};
        (mavCmds || []).forEach(function (e) {
          mavCmdByName[e.name] = e;
        });
        // Preserve an in-progress selection across metadata reloads (e.g. a
        // profile change) instead of snapping back to the saved value.
        const selected = $command.val() || node.command || 'arm';
        $command.empty();
        PRESET_GROUPS.forEach(function (group) {
          const $g = $('<optgroup></optgroup>').attr('label', group[0]);
          group[1].forEach(function (p) {
            $('<option></option>').val(p[0]).text(p[1]).appendTo($g);
          });
          $g.appendTo($command);
        });
        if (mavCmds && mavCmds.length) {
          const $adv = $('<optgroup label="Advanced / Raw MAV_CMD (escape hatch)"></optgroup>');
          mavCmds.forEach(function (e) {
            $('<option></option>').val(e.name).text(e.name + ' (' + e.value + ')').appendTo($adv);
          });
          $adv.appendTo($command);
        }
        // Preserve the current value even if it's a MAV_CMD not in the list.
        if (
          selected &&
          $command.find('option').filter(function () { return this.value === selected; }).length === 0
        ) {
          $('<option></option>').val(selected).text(selected).appendTo($command);
        }
        $command.val(selected);
        renderParams();
      }

      let metadataRequestId = 0;
      function loadDialect() {
        const requestId = ++metadataRequestId;
        $.getJSON('mavlink-ai/metadata', currentDialect())
          .done(function (data) {
            if (requestId !== metadataRequestId) {
              return; // a newer request superseded this response
            }
            commands = (data && data.commands) || {};
            enumsByName = (data && data.enums) || {};
            messageList = [];
            const messages = (data && data.messages) || {};
            Object.keys(messages).sort().forEach(function (name) {
              messageList.push({ name: name, id: messages[name].id });
            });
            buildOptions((data && data.enums && data.enums.MAV_CMD) || []);
          })
          .fail(function () {
            if (requestId !== metadataRequestId) {
              return;
            }
            commands = {};
            enumsByName = {};
            messageList = [];
            buildOptions([]); // presets only if metadata unavailable
          });
      }

      $command.on('change', renderParams);
      $('#node-input-profile').on('change', loadDialect);
      loadDialect();

      // Await-ack needs a connection to send on; show the timing rows only
      // when it's enabled.
      function refreshAckRows() {
        const on = $('#node-input-awaitAck').is(':checked');
        $('.mav-cmd-ack').toggle(on);
      }
      $('#node-input-awaitAck').on('change', refreshAckRows);
      refreshAckRows();

      this._collectParams = function () {
        if (!isRaw($command.val())) {
          return '';
        }
        const out = {};
        $params.find('[data-param]').each(function () {
          const v = $(this).val();
          if (v !== '' && v !== null && v !== undefined && !isNaN(Number(v))) {
            out[$(this).attr('data-param')] = Number(v);
          }
        });
        return JSON.stringify(out);
      };

      this._collectPresetFields = function () {
        if (isRaw($command.val())) {
          // Keep the saved preset values so switching to raw and back does not
          // wipe them (#49).
          return node.presetFields || '';
        }
        const out = {};
        $preset.find('[data-preset]').each(function () {
          const key = $(this).attr('data-preset');
          const type = $(this).attr('data-preset-type');
          if (type === 'checkbox') {
            out[key] = $(this).is(':checked');
            return;
          }
          const v = $(this).val();
          if (v === '' || v === null || v === undefined) {
            return; // omit blanks so runtime/builder defaults apply
          }
          out[key] = isNaN(Number(v)) ? v : Number(v);
        });
        return Object.keys(out).length ? JSON.stringify(out) : '';
      };
    },
    oneditsave: function () {
      if (typeof this._collectParams === 'function') {
        $('#node-input-fields').val(this._collectParams());
      }
      if (typeof this._collectPresetFields === 'function') {
        $('#node-input-presetFields').val(this._collectPresetFields());
      }
    }
  });
</script>

<script type="text/html" data-template-name="mavlink-ai-command">
  <div class="form-row">
    <label for="node-input-name"><i class="fa fa-tag"></i> Name</label>
    <input type="text" id="node-input-name" placeholder="MAVLink Command">
  </div>
  <div class="form-row">
    <label for="node-input-profile">Profile</label>
    <input type="text" id="node-input-profile">
  </div>
  <div class="form-row">
    <label for="node-input-command">Command</label>
    <select id="node-input-command" style="width:70%;"></select>
  </div>
  <div id="mav-cmd-desc" class="form-tips" style="display:none; margin:4px 0;"></div>
  <div id="mav-preset-params"></div>
  <div class="form-row">
    <label for="node-input-sendAs">Send as</label>
    <select id="node-input-sendAs" style="width:70%;">
      <option value="long">COMMAND_LONG (default)</option>
      <option value="int">COMMAND_INT (position commands, x/y in degE7)</option>
    </select>
  </div>
  <div class="form-row">
    <label for="node-input-awaitAck">Await ack</label>
    <input type="checkbox" id="node-input-awaitAck" style="width:auto; vertical-align:middle;">
    <span style="color:#888;">send via the connection and wait for COMMAND_ACK</span>
  </div>
  <div class="form-row mav-cmd-ack">
    <label for="node-input-connection">Connection</label>
    <input type="text" id="node-input-connection">
  </div>
  <div class="form-row mav-cmd-ack">
    <label for="node-input-timeoutMs">Timeout ms</label>
    <input type="number" id="node-input-timeoutMs">
  </div>
  <div class="form-row mav-cmd-ack">
    <label for="node-input-maxRetries">Retries</label>
    <input type="number" id="node-input-maxRetries">
  </div>
  <div id="mav-cmd-params" style="border-top:1px solid #eee; padding-top:6px;"></div>
  <input type="hidden" id="node-input-fields">
  <input type="hidden" id="node-input-presetFields">
</script>

<script type="text/html" data-help-name="mavlink-ai-command">
  <p>Builds a MAVLink <code>COMMAND_LONG</code> (or <code>COMMAND_INT</code>) as a normalized outbound message for a downstream <b>MAVLink AI Out</b> node — or, with <b>Await ack</b> enabled, sends it on the selected connection and runs the full command protocol: retransmit on timeout (incrementing <code>confirmation</code> for <code>COMMAND_LONG</code>; <code>COMMAND_INT</code> has no confirmation field and is resent unchanged), then output the <code>COMMAND_ACK</code> result (<code>command/ack</code> with <code>result</code>/<code>result_name</code>, or a <code>mavlink/error</code> on rejection/timeout). <code>MAV_RESULT_IN_PROGRESS</code> keeps the wait alive and shows progress on the status badge. Failures are delivered once, as a <code>mavlink/error</code> message on the output — they do not also trigger <b>Catch</b> nodes.</p>
  <p><b>Presets</b> are grouped by workflow: <i>Basic Flight</i> (arm, disarm, set mode, takeoff, land, RTL), <i>Guided / Autonomy</i> (go to/reposition, change speed, condition yaw, spin/rotate), <i>Mission</i> (start, pause, resume — pause/resume use <code>MAV_CMD_DO_PAUSE_CONTINUE</code> and need firmware support; the ACK tells you), <i>Camera</i> (take photo, start/stop video — cameras are often separate components, so set <code>msg.payload.target_component</code> when needed), and <i>Telemetry / System</i>. Each preset shows friendly fields (mode dropdown, altitude, rate Hz, ...); <code>msg.payload</code> values override the static editor values at runtime. Presets keep their safety-critical params fixed (e.g. arm/disarm <code>param1</code>, mission pause/resume <code>param1</code>), and <i>Reboot Autopilot</i> refuses to build unless confirmed (editor checkbox or <code>msg.payload.confirm = true</code>).</p>
  <p><b>Advanced / Raw MAV_CMD</b> is the escape hatch, not a normal preset: pick any command from the dialect enum and see its MAVLink description and per-parameter help. Each parameter now renders the best control its metadata supports instead of a bare number: an <b>enum dropdown</b> for enum-backed params, a <b>flag checklist</b> for bitmask params (the combined value is persisted), a <b>checkbox</b> for boolean params, a <b>constrained numeric</b> input when min/max/increment metadata is present, and a <b>profile-aware dropdown</b> for context-specific values (e.g. <code>DO_SET_MODE</code> custom mode, resolved from the profile firmware + vehicle type — <code>GUIDED</code> is 4 on ArduCopter but 15 on ArduPlane). A badge marks whether a choice list is generic MAVLink metadata or firmware/profile/component-specific. Every dropdown keeps a <b>Custom value…</b> option for raw numeric entry (new/unsupported firmware values), unknown values already stored in a flow are preserved, and a param with no reliable metadata stays a plain numeric input. Changing the profile — or, for component-addressed commands, the target component — refreshes the available choices.</p>
  <p><b>Set mode by name</b>: the editor offers a mode dropdown resolved from the profile's firmware and vehicle type (ArduPilot copter/plane/rover/boat/sub/antenna-tracker or PX4), or pass <code>msg.payload.mode</code> (e.g. <code>"GUIDED"</code>, <code>"POSITION"</code>) at runtime. Raw numeric <code>custom_mode</code> values are firmware/vehicle-specific (GUIDED is 4 on ArduCopter but 15 on ArduPlane); numeric <code>custom_mode</code>/<code>base_mode</code> keep working as before. Stunts like flips are <i>modes</i>, not commands, on ArduCopter (FLIP mode via set mode) — there is no generic cross-firmware flip command.</p>
  <p><b>COMMAND_INT</b>: choose "Send as COMMAND_INT" (or set <code>msg.payload.command_int</code>) for commands that require it (DO_SET_ROI_LOCATION, DO_REPOSITION, …). The <i>Go To / Reposition</i> preset uses COMMAND_INT automatically. Give <code>lat</code>/<code>lon</code> in float degrees (converted to degE7 automatically) or raw <code>x</code>/<code>y</code>, plus <code>z</code>/<code>alt</code> and an optional <code>frame</code> (default <code>MAV_FRAME_GLOBAL</code>). Coordinates are <b>required</b> for <i>Go To</i> — omitting them is an error, never a silent reposition to 0,0. The message presets (<i>Request Message</i>, <i>Set/Stop Message Interval</i>) likewise require a message id. Raw <code>MAV_CMD_*</code> mode stays permissive.</p>
</script>
