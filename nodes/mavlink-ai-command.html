<script type="text/javascript">
  RED.nodes.registerType('mavlink-ai-command', {
    category: 'MAVLink AI',
    color: '#FFE6B3',
    defaults: {
      name: { value: '' },
      profile: { value: '', type: 'mavlink-ai-profile', required: true },
      connection: { value: '', type: 'mavlink-ai-connection', required: false },
      command: { value: 'arm', required: true },
      sendAs: { value: 'long' },
      awaitAck: { value: false },
      timeoutMs: { value: 3000, validate: RED.validators.number() },
      maxRetries: { value: 3, validate: RED.validators.number() },
      fields: { value: '' }
    },
    inputs: 1,
    outputs: 1,
    icon: 'font-awesome/fa-bolt',
    label: function () {
      return this.name || (this.command ? 'cmd ' + this.command : 'mavlink ai command');
    },
    oneditprepare: function () {
      const node = this;
      const PRESETS = [
        ['arm', 'Arm'],
        ['disarm', 'Disarm'],
        ['set_mode', 'Set Mode'],
        ['takeoff', 'Takeoff'],
        ['land', 'Land'],
        ['rtl', 'RTL'],
        ['reboot', 'Reboot Autopilot'],
        ['request_message', 'Request Message'],
        ['set_message_interval', 'Set Message Interval'],
        ['stop_message_interval', 'Stop Message Interval']
      ];
      const $command = $('#node-input-command');
      const $params = $('#mav-cmd-params');
      const $cmdDesc = $('#mav-cmd-desc');
      let commands = {}; // MAV_CMD_NAME -> { description, params:[{index,name,description,units}] }
      let mavCmdByName = {}; // MAV_CMD_NAME -> { value, description } (enum table)

      let savedParams = {};
      try {
        savedParams = node.fields ? JSON.parse(node.fields) : {};
      } catch (e) {
        savedParams = {};
      }

      // Metadata query for the selected profile; a custom-XML profile forwards
      // its path so the runtime-compiled dialect's metadata is served too.
      function currentDialect() {
        const p = RED.nodes.node($('#node-input-profile').val());
        const query = { dialect: (p && p.dialect) || 'ardupilotmega' };
        if (query.dialect === 'custom' && p && p.customDialectPath) {
          query.customDialectPath = p.customDialectPath;
        }
        return query;
      }

      function isRaw(value) {
        return /^MAV_CMD_/.test(value);
      }

      // Render one input per param for a raw MAV_CMD selection. When the dialect
      // metadata knows the command (e.g. NAV_WAYPOINT), show its named params
      // (hold, acceptRadius, latitude, …) with units and a visible help box
      // under each input (issue #45); otherwise fall back to generic param1..7.
      // Values are always stored as paramN.
      function paramRow(key, labelText, tipText) {
        const $row = $('<div class="form-row" style="margin-bottom:4px;"></div>');
        $('<label></label>').css({ width: '140px' }).text(labelText).attr('title', tipText || '').appendTo($row);
        $('<input type="number" step="any">')
          .attr('id', 'mav-cmd-' + key)
          .attr('data-param', key)
          .attr('placeholder', 'float')
          .css({ width: '55%' })
          .val(savedParams[key] !== undefined ? savedParams[key] : '')
          .appendTo($row);
        if (tipText) {
          $('<div class="form-tips" style="margin:2px 0 6px 140px; width:55%; box-sizing:border-box;"></div>')
            .text(tipText)
            .appendTo($row);
        }
        return $row;
      }

      // Visible command-level description (metadata command doc, falling back
      // to the MAV_CMD enum entry's description).
      function renderCommandDescription(selected) {
        $cmdDesc.empty().hide();
        if (!isRaw(selected)) {
          return;
        }
        const def = commands[selected];
        const description = (def && def.description) || (mavCmdByName[selected] && mavCmdByName[selected].description);
        if (description) {
          $cmdDesc.text(description).show();
        }
      }

      function renderParams() {
        $params.empty();
        const selected = $command.val();
        renderCommandDescription(selected);
        if (!isRaw(selected)) {
          return;
        }
        const def = commands[selected];
        if (def && def.params && def.params.length) {
          $('<div style="color:#888;margin:4px 0;">Parameters (leave blank for 0):</div>').appendTo($params);
          def.params.forEach(function (p) {
            const label = p.name + (p.units ? ' (' + p.units + ')' : '');
            const tipParts = ['param' + p.index];
            if (p.units) {
              tipParts.push('Units: ' + p.units);
            }
            if (p.description) {
              tipParts.push(p.description);
            }
            paramRow('param' + p.index, label, tipParts.join(' | ')).appendTo($params);
          });
        } else {
          // Only fall back to raw param1..7 when the dialect metadata genuinely
          // has no named params for this command — and say so, so it's clear the
          // labels aren't just missing (#7).
          const reason = Object.keys(commands).length
            ? 'No parameter metadata for this command in the selected dialect'
            : 'Command metadata unavailable';
          $('<div style="color:#888;margin:4px 0;"></div>')
            .text(reason + ' — using raw param1–7 (leave blank for 0):')
            .appendTo($params);
          for (let i = 1; i <= 7; i += 1) {
            paramRow('param' + i, 'param' + i, '').appendTo($params);
          }
        }
      }

      function buildOptions(mavCmds) {
        mavCmdByName = {};
        (mavCmds || []).forEach(function (e) {
          mavCmdByName[e.name] = e;
        });
        // Preserve an in-progress selection across metadata reloads (e.g. a
        // profile change) instead of snapping back to the saved value.
        const selected = $command.val() || node.command || 'arm';
        $command.empty();
        const $presets = $('<optgroup label="Presets"></optgroup>');
        PRESETS.forEach(function (p) {
          $('<option></option>').val(p[0]).text(p[1]).appendTo($presets);
        });
        $presets.appendTo($command);
        if (mavCmds && mavCmds.length) {
          const $adv = $('<optgroup label="MAV_CMD (advanced)"></optgroup>');
          mavCmds.forEach(function (e) {
            $('<option></option>').val(e.name).text(e.name + ' (' + e.value + ')').appendTo($adv);
          });
          $adv.appendTo($command);
        }
        // Preserve the current value even if it's a MAV_CMD not in the list.
        if (
          selected &&
          $command.find('option').filter(function () { return this.value === selected; }).length === 0
        ) {
          $('<option></option>').val(selected).text(selected).appendTo($command);
        }
        $command.val(selected);
        renderParams();
      }

      let metadataRequestId = 0;
      function loadDialect() {
        const requestId = ++metadataRequestId;
        $.getJSON('mavlink-ai/metadata', currentDialect())
          .done(function (data) {
            if (requestId !== metadataRequestId) {
              return; // a newer request superseded this response
            }
            commands = (data && data.commands) || {};
            buildOptions((data && data.enums && data.enums.MAV_CMD) || []);
          })
          .fail(function () {
            if (requestId !== metadataRequestId) {
              return;
            }
            commands = {};
            buildOptions([]); // presets only if metadata unavailable
          });
      }

      $command.on('change', renderParams);
      $('#node-input-profile').on('change', loadDialect);
      loadDialect();

      // Await-ack needs a connection to send on; show the timing rows only
      // when it's enabled.
      function refreshAckRows() {
        const on = $('#node-input-awaitAck').is(':checked');
        $('.mav-cmd-ack').toggle(on);
      }
      $('#node-input-awaitAck').on('change', refreshAckRows);
      refreshAckRows();

      this._collectParams = function () {
        if (!isRaw($command.val())) {
          return '';
        }
        const out = {};
        $params.find('[data-param]').each(function () {
          const v = $(this).val();
          if (v !== '' && v !== null && v !== undefined && !isNaN(Number(v))) {
            out[$(this).attr('data-param')] = Number(v);
          }
        });
        return JSON.stringify(out);
      };
    },
    oneditsave: function () {
      if (typeof this._collectParams === 'function') {
        $('#node-input-fields').val(this._collectParams());
      }
    }
  });
</script>

<script type="text/html" data-template-name="mavlink-ai-command">
  <div class="form-row">
    <label for="node-input-name"><i class="fa fa-tag"></i> Name</label>
    <input type="text" id="node-input-name" placeholder="MAVLink Command">
  </div>
  <div class="form-row">
    <label for="node-input-profile">Profile</label>
    <input type="text" id="node-input-profile">
  </div>
  <div class="form-row">
    <label for="node-input-command">Command</label>
    <select id="node-input-command" style="width:70%;"></select>
  </div>
  <div id="mav-cmd-desc" class="form-tips" style="display:none; margin:4px 0;"></div>
  <div class="form-row">
    <label for="node-input-sendAs">Send as</label>
    <select id="node-input-sendAs" style="width:70%;">
      <option value="long">COMMAND_LONG (default)</option>
      <option value="int">COMMAND_INT (position commands, x/y in degE7)</option>
    </select>
  </div>
  <div class="form-row">
    <label for="node-input-awaitAck">Await ack</label>
    <input type="checkbox" id="node-input-awaitAck" style="width:auto; vertical-align:middle;">
    <span style="color:#888;">send via the connection and wait for COMMAND_ACK</span>
  </div>
  <div class="form-row mav-cmd-ack">
    <label for="node-input-connection">Connection</label>
    <input type="text" id="node-input-connection">
  </div>
  <div class="form-row mav-cmd-ack">
    <label for="node-input-timeoutMs">Timeout ms</label>
    <input type="number" id="node-input-timeoutMs">
  </div>
  <div class="form-row mav-cmd-ack">
    <label for="node-input-maxRetries">Retries</label>
    <input type="number" id="node-input-maxRetries">
  </div>
  <div id="mav-cmd-params" style="border-top:1px solid #eee; padding-top:6px;"></div>
  <input type="hidden" id="node-input-fields">
</script>

<script type="text/html" data-help-name="mavlink-ai-command">
  <p>Builds a MAVLink <code>COMMAND_LONG</code> (or <code>COMMAND_INT</code>) as a normalized outbound message for a downstream <b>MAVLink AI Out</b> node — or, with <b>Await ack</b> enabled, sends it on the selected connection and runs the full command protocol: retransmit on timeout (incrementing <code>confirmation</code> for <code>COMMAND_LONG</code>; <code>COMMAND_INT</code> has no confirmation field and is resent unchanged), then output the <code>COMMAND_ACK</code> result (<code>command/ack</code> with <code>result</code>/<code>result_name</code>, or a <code>mavlink/error</code> on rejection/timeout). <code>MAV_RESULT_IN_PROGRESS</code> keeps the wait alive and shows progress on the status badge.</p>
  <p>Pick a friendly <b>Preset</b> (arm, set mode, takeoff, …) or any <b>MAV_CMD</b> from the advanced list. A raw MAV_CMD shows the command's MAVLink description and one labeled input per defined parameter, each with a visible help box (param index, units, description — where a parameter expects an enum, the description names it). You can fill <code>param1</code>–<code>param7</code>; <code>msg.payload</code> may override params at runtime (presets keep their safety-critical params fixed, e.g. arm/disarm <code>param1</code>).</p>
  <p><b>Set mode by name</b>: <code>msg.payload.mode</code> (e.g. <code>"GUIDED"</code>, <code>"POSITION"</code>) is resolved using the profile's firmware and vehicle type — set the profile firmware to <code>ardupilot</code> or <code>px4</code> and the profile type to the vehicle (copter/plane/rover/…), or pass <code>msg.payload.vehicle_type</code>. Numeric <code>custom_mode</code>/<code>base_mode</code> keep working as before.</p>
  <p><b>COMMAND_INT</b>: choose "Send as COMMAND_INT" (or set <code>msg.payload.command_int</code>) for commands that require it (DO_SET_ROI_LOCATION, DO_REPOSITION, …). Give <code>lat</code>/<code>lon</code> in float degrees (converted to degE7 automatically) or raw <code>x</code>/<code>y</code>, plus <code>z</code>/<code>alt</code> and an optional <code>frame</code> (default <code>MAV_FRAME_GLOBAL</code>).</p>
</script>
