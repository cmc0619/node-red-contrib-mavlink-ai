<script type="text/javascript">
  /**
   * Setpoint presets mapped to the field groups they drive, so the editor can
   * show only the relevant inputs. Mirrors PRESETS in lib/move/setpoint.js.
   * 'custom' exposes every group plus the raw type_mask input.
   */
  const MAV_MOVE_PRESETS = {
    position: { position: true },
    position_yaw: { position: true, yaw: true },
    velocity: { velocity: true },
    velocity_yaw_rate: { velocity: true, yawRate: true },
    position_velocity: { position: true, velocity: true },
    acceleration: { accel: true },
    acceleration_yaw: { accel: true, yaw: true },
    force: { accel: true },
    force_yaw: { accel: true, yaw: true },
    yaw: { yaw: true },
    yaw_rate: { yawRate: true },
    custom: { position: true, velocity: true, accel: true, yaw: true, yawRate: true, custom: true }
  };

  /** Frame options offered per coordinate kind: [value, label]. */
  const MAV_MOVE_FRAMES = {
    local: [
      ['LOCAL_NED', 'Local NED (world)'],
      ['LOCAL_OFFSET_NED', 'Offset from current (NED)'],
      ['BODY_OFFSET_NED', 'Body offset (ArduPilot)'],
      ['BODY_NED', 'Body NED (PX4)']
    ],
    global: [
      ['GLOBAL_RELATIVE_ALT_INT', 'Global, relative altitude'],
      ['GLOBAL_INT', 'Global, absolute (MSL)'],
      ['GLOBAL_TERRAIN_ALT_INT', 'Global, terrain altitude']
    ]
  };

  RED.nodes.registerType('mavlink-ai-move', {
    category: 'MAVLink AI',
    paletteLabel: 'MAVLink Move',
    color: '#FFE6B3',
    defaults: {
      name: { value: '' },
      profile: { value: '', type: 'mavlink-ai-vehicle', required: true },
      connection: { value: '', type: 'mavlink-ai-connection', required: false },
      coordinate: { value: 'local', required: true },
      preset: { value: 'position', required: true },
      frame: { value: 'LOCAL_NED' },
      /** Raw 0..65535 mask, only used (and validated) for the 'custom' preset. */
      typeMask: {
        value: '',
        validate: function (v) {
          const preset = $('#node-input-preset').length ? $('#node-input-preset').val() : this.preset;
          if (preset !== 'custom') {
            return true;
          }
          const n = Number(String(v == null ? '' : v).trim());
          return Number.isInteger(n) && n >= 0 && n <= 65535;
        }
      },
      north: { value: '' },
      east: { value: '' },
      altitude: { value: '' },
      lat: { value: '' },
      lon: { value: '' },
      velNorth: { value: '' },
      velEast: { value: '' },
      climb: { value: '' },
      accelNorth: { value: '' },
      accelEast: { value: '' },
      accelUp: { value: '' },
      yaw: { value: '' },
      yawRate: { value: '' },
      /** Optional continuous streaming (#128); rate only matters when streaming. */
      stream: { value: false },
      /** Stream TTL (#216): stop this many seconds after the last input; 0 =
       * unlimited, blank = default. Non-numeric/negative input is outlined. */
      maxStreamSeconds: {
        value: 300,
        validate: function (v) {
          /** A hidden field must not block deploy: the TTL only applies while
           * streaming is enabled, like the stream-rate validator below. */
          if (!$('#node-input-stream').is(':checked')) {
            return true;
          }
          if (v === '' || v == null) {
            return true;
          }
          const n = Number(v);
          return Number.isFinite(n) && n >= 0;
        }
      },
      streamRateHz: {
        value: 5,
        validate: function (v) {
          if (!$('#node-input-stream').is(':checked')) {
            return true;
          }
          const n = Number(String(v == null ? '' : v).trim());
          return Number.isFinite(n) && n > 0 && n <= 50;
        }
      }
    },
    inputs: 1,
    outputs: 1,
    icon: 'font-awesome/fa-location-arrow',
    label: function () {
      return this.name || 'move ' + (this.coordinate === 'global' ? 'global' : 'local');
    },
    oneditprepare: function () {
      const $coordinate = $('#node-input-coordinate');
      const $preset = $('#node-input-preset');
      const $frame = $('#node-input-frame');
      const savedFrame = this.frame;

      /**
       * Rebuild the frame dropdown for the selected coordinate, preserving the
       * saved value when it still belongs to that coordinate.
       */
      function refreshFrames() {
        const coordinate = $coordinate.val();
        const options = MAV_MOVE_FRAMES[coordinate] || MAV_MOVE_FRAMES.local;
        const current = $frame.val();
        $frame.empty();
        options.forEach(function (opt) {
          $('<option></option>').val(opt[0]).text(opt[1]).appendTo($frame);
        });
        const keep = [savedFrame, current].find(function (f) {
          return options.some(function (opt) { return opt[0] === f; });
        });
        $frame.val(keep || options[0][0]);
      }

      /**
       * Show only the input rows the current coordinate + preset drive, and
       * swap the position labels between local (North/East) and global
       * (Lat/Lon). Re-runs the type_mask validator so its check tracks the
       * preset.
       */
      function refresh() {
        const coordinate = $coordinate.val();
        const groups = MAV_MOVE_PRESETS[$preset.val()] || {};
        const isGlobal = coordinate === 'global';

        $('.mav-move-local-pos').toggle(!!groups.position && !isGlobal);
        $('.mav-move-global-pos').toggle(!!groups.position && isGlobal);
        $('.mav-move-velocity').toggle(!!groups.velocity);
        $('.mav-move-accel').toggle(!!groups.accel);
        $('.mav-move-yaw').toggle(!!groups.yaw);
        $('.mav-move-yawrate').toggle(!!groups.yawRate);
        $('.mav-move-typemask').toggle(!!groups.custom);
        $('#node-input-typeMask').trigger('change');
      }

      /** Show the stream rate only when streaming is enabled. */
      function refreshStream() {
        $('.mav-move-streamrate').toggle($('#node-input-stream').is(':checked'));
        $('#node-input-streamRateHz').trigger('change');
      }

      $coordinate.on('change', function () {
        refreshFrames();
        refresh();
      });
      $preset.on('change', refresh);
      $('#node-input-stream').on('change', refreshStream);
      refreshFrames();
      refresh();
      refreshStream();
    }
  });
</script>

<script type="text/html" data-template-name="mavlink-ai-move">
  <div class="form-row">
    <label for="node-input-name"><i class="fa fa-tag"></i> Name</label>
    <input type="text" id="node-input-name" placeholder="MAVLink Move">
  </div>
  <div class="form-row">
    <label for="node-input-profile">Profile</label>
    <input type="text" id="node-input-profile">
  </div>
  <div class="form-row">
    <label for="node-input-connection">Connection</label>
    <input type="text" id="node-input-connection">
  </div>
  <div class="form-tips" style="margin: -6px 0 8px 105px; width: 70%;">
    Set a Connection to <b>send</b> the setpoint directly; leave it empty to emit a <code>mavlink/send</code> message for a <b>mavlink-ai-out</b> node.
  </div>
  <div class="form-row">
    <label for="node-input-stream" style="width: auto;"><input type="checkbox" id="node-input-stream" style="width: auto; vertical-align: top; margin-right: 6px;"> Stream continuously</label>
  </div>
  <div class="form-row mav-move-streamrate">
    <label for="node-input-streamRateHz">Rate (Hz)</label>
    <input type="number" id="node-input-streamRateHz" min="0.2" max="50" step="any" placeholder="5">
  </div>
  <div class="form-row mav-move-streamrate">
    <label for="node-input-maxStreamSeconds">Max stream (s)</label>
    <input type="number" id="node-input-maxStreamSeconds" min="0" step="any" placeholder="300">
  </div>
  <div class="form-tips mav-move-streamrate" style="margin: -6px 0 8px 105px; width: 70%;">
    Resends the setpoint at this rate until stopped. Needs a Connection. PX4 <b>OFFBOARD</b> requires a setpoint stream (≥ ~2 Hz) <i>before</i> the mode switch. Send <code>msg.payload.stream = false</code> to stop; the stream also stops automatically on redeploy — and expires <b>Max stream</b> seconds after the last input (default 300, <code>0</code> = unlimited), emitting one <code>{ stream: "expired" }</code> message.
  </div>
  <div class="form-row">
    <label for="node-input-coordinate">Coordinate</label>
    <select id="node-input-coordinate">
      <option value="local">Local (NED, metres)</option>
      <option value="global">Global (lat / lon)</option>
    </select>
  </div>
  <div class="form-row">
    <label for="node-input-preset">Setpoint</label>
    <select id="node-input-preset">
      <option value="position">Position</option>
      <option value="position_yaw">Position + Yaw</option>
      <option value="velocity">Velocity</option>
      <option value="velocity_yaw_rate">Velocity + Yaw rate</option>
      <option value="position_velocity">Position + Velocity</option>
      <option value="acceleration">Acceleration</option>
      <option value="acceleration_yaw">Acceleration + Yaw</option>
      <option value="force">Force</option>
      <option value="force_yaw">Force + Yaw</option>
      <option value="yaw">Yaw only</option>
      <option value="yaw_rate">Yaw-rate only</option>
      <option value="custom">Custom (raw type_mask)</option>
    </select>
  </div>
  <div class="form-row">
    <label for="node-input-frame">Frame</label>
    <select id="node-input-frame"></select>
  </div>
  <div class="form-row mav-move-typemask">
    <label for="node-input-typeMask">Type mask</label>
    <input type="number" id="node-input-typeMask" min="0" max="65535" step="1" placeholder="0..65535 (a SET bit means IGNORE)">
  </div>

  <div class="form-row mav-move-local-pos">
    <label for="node-input-north">North (m)</label>
    <input type="number" step="any" id="node-input-north" placeholder="+ forward / north">
  </div>
  <div class="form-row mav-move-local-pos">
    <label for="node-input-east">East (m)</label>
    <input type="number" step="any" id="node-input-east" placeholder="+ right / east">
  </div>
  <div class="form-row mav-move-global-pos">
    <label for="node-input-lat">Latitude (°)</label>
    <input type="number" step="any" id="node-input-lat" placeholder="e.g. 47.397742">
  </div>
  <div class="form-row mav-move-global-pos">
    <label for="node-input-lon">Longitude (°)</label>
    <input type="number" step="any" id="node-input-lon" placeholder="e.g. 8.545594">
  </div>
  <div class="form-row mav-move-local-pos mav-move-global-pos">
    <label for="node-input-altitude">Altitude (m)</label>
    <input type="number" step="any" id="node-input-altitude" placeholder="up-positive (mapped to -z for local)">
  </div>

  <div class="form-row mav-move-velocity">
    <label for="node-input-velNorth">Vel North (m/s)</label>
    <input type="number" step="any" id="node-input-velNorth" placeholder="+ forward / north">
  </div>
  <div class="form-row mav-move-velocity">
    <label for="node-input-velEast">Vel East (m/s)</label>
    <input type="number" step="any" id="node-input-velEast" placeholder="+ right / east">
  </div>
  <div class="form-row mav-move-velocity">
    <label for="node-input-climb">Climb (m/s)</label>
    <input type="number" step="any" id="node-input-climb" placeholder="up-positive (mapped to -vz)">
  </div>

  <div class="form-row mav-move-accel">
    <label for="node-input-accelNorth">Accel North</label>
    <input type="number" step="any" id="node-input-accelNorth" placeholder="+ forward / north (m/s² or N with Force)">
  </div>
  <div class="form-row mav-move-accel">
    <label for="node-input-accelEast">Accel East</label>
    <input type="number" step="any" id="node-input-accelEast" placeholder="+ right / east (m/s² or N with Force)">
  </div>
  <div class="form-row mav-move-accel">
    <label for="node-input-accelUp">Accel Up</label>
    <input type="number" step="any" id="node-input-accelUp" placeholder="up-positive (mapped to -afz)">
  </div>

  <div class="form-row mav-move-yaw">
    <label for="node-input-yaw">Yaw (°)</label>
    <input type="number" step="any" id="node-input-yaw" placeholder="heading in degrees">
  </div>
  <div class="form-row mav-move-yawrate">
    <label for="node-input-yawRate">Yaw rate (°/s)</label>
    <input type="number" step="any" id="node-input-yawRate" placeholder="degrees per second">
  </div>
</script>

<script type="text/html" data-help-name="mavlink-ai-move">
  <p>Sends a position-target <b>setpoint</b> for guided / offboard control —
  <code>SET_POSITION_TARGET_LOCAL_NED</code> or
  <code>SET_POSITION_TARGET_GLOBAL_INT</code> — without the build node. It hides
  the two things that are easy to get wrong by hand: the inverted
  <code>type_mask</code> and NED's down-positive vertical axis.</p>
  <h3>Sending</h3>
  <p>With a <b>Connection</b> the node sends the setpoint directly (fire-and-forget — setpoints carry no ack). Without one it emits a <code>mavlink/send</code> message to wire into a <b>mavlink-ai-out</b> node. A <b>Profile</b> is always required for encoding.</p>
  <h3>Setpoint presets</h3>
  <p>The <b>Setpoint</b> selector builds the correct <code>type_mask</code> for you. Because a set mask bit means <i>ignore</i> that dimension, "Position" is encoded as "ignore everything except position". <b>Acceleration</b> drives the <code>af</code> vector as an acceleration; <b>Force</b> sends the same <code>af</code> inputs but sets the force bit (bit 9) so the autopilot treats them as a force. Pick <b>Custom</b> to enter a raw 0..65535 mask.</p>
  <h3>Frames &amp; axes</h3>
  <p>Frame names use exact generated <code>MavFrame</code> member keys, such as <code>LOCAL_NED</code>. Prefixed alternate spellings and numeric strings are rejected. A numeric frame remains available only as the advanced custom/dialect-external escape hatch.</p>
  <p>Vertical inputs are <b>up-positive</b>. For a <b>Local</b> coordinate the <code>Altitude</code> maps to a negative <code>z</code> and <code>Climb</code> to a negative <code>vz</code> — this holds for every offered local frame, because NED, the OFFSET variants, and body NED are all down-positive on <code>z</code>. For a <b>Global</b> coordinate the altitude is up-positive metres and is sent as-is; latitude/longitude are entered in degrees and converted to <code>1e7</code> integers. Yaw and yaw-rate are entered in degrees and sent in radians.</p>
  <p>Body-relative frames differ per firmware: ArduPilot GUIDED uses <b>Body offset</b> (<code>BODY_OFFSET_NED</code>), PX4 OFFBOARD uses <b>Body NED</b> (<code>BODY_NED</code>). Both are forward / right / down relative to the vehicle's heading. (<code>MAV_FRAME_BODY_FRD</code> is <i>not</i> a valid frame for the position-target message and is deliberately not offered.)</p>
  <h3>Firmware advisories</h3>
  <p>Combinations a firmware won't honor fail <i>silently</i> on the vehicle, so the node raises a Node-RED <b>warning</b> (the setpoint is still sent) when the profile's firmware is ArduPilot or PX4 and the request looks unsupported: <b>Force</b> setpoints (neither firmware honors bit 9), <b>Acceleration</b> on older ArduPilot GUIDED, PX4 with a terrain-altitude target, or PX4 with an OFFSET frame.</p>
  <h3>Streaming</h3>
  <p>Enable <b>Stream continuously</b> to resend the setpoint at a fixed <b>Rate (Hz)</b> until stopped, instead of once per input. This is required for <b>PX4 OFFBOARD</b>, which won't enter (and drops out of) OFFBOARD unless a setpoint stream of ≥ ~2 Hz is already flowing — so start streaming <i>before</i> the mode switch. Each input refreshes the streamed setpoint; <code>msg.payload.stream = true</code>/<code>false</code> starts/stops it per message. Streaming needs a <b>Connection</b> (there is nowhere to stream a build-only message). The stream is torn down automatically on redeploy/close, so a partial deploy can never leave the vehicle flying an orphaned setpoint. It also expires <b>Max stream (s)</b> seconds after the last input (default 300; <code>0</code> = unlimited): the deadman stops an abandoned flow from commanding the vehicle forever, sets the status to <i>stream expired</i>, and emits one <code>{ stream: "expired" }</code> message on the output so the flow can react. Every fresh input pushes the deadline out. Transient send failures are surfaced once and the stream keeps trying.</p>
  <h3>Modes</h3>
  <p>The vehicle must already be in a mode that accepts external setpoints (ArduPilot <b>GUIDED</b>, PX4 <b>OFFBOARD</b>) — switch modes with the <b>mavlink-ai-command</b> node's <i>Set Mode</i>.</p>
  <h3>Inputs</h3>
  <p><code>msg.payload</code> may override any editor value: <code>coordinate</code>, <code>preset</code>, <code>frame</code>, <code>type_mask</code>, <code>north</code>, <code>east</code>, <code>altitude</code>, <code>lat</code>, <code>lon</code>, <code>velNorth</code>, <code>velEast</code>, <code>climb</code>, <code>accelNorth</code>, <code>accelEast</code>, <code>accelUp</code>, <code>yaw</code>, <code>yawRate</code>, <code>target_system</code>, <code>target_component</code>, and <code>time_boot_ms</code>. <code>stream</code> (<code>true</code>/<code>false</code>) starts/stops continuous streaming for that message.</p>
  <h3>Output</h3>
  <p>Without a connection, a <code>mavlink/send</code> message for <b>mavlink-ai-out</b>. Failures are emitted as a structured <code>mavlink/error</code> message on the same output.</p>
</script>
