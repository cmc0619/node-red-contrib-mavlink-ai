<script type="text/javascript">
  RED.nodes.registerType('mavlink-ai-build', {
    category: 'MAVLink AI',
    color: '#D7E8FF',
    defaults: {
      name: { value: '' },
      profile: { value: '', type: 'mavlink-ai-profile', required: true },
      messageName: { value: 'HEARTBEAT', required: true },
      fields: { value: '' },
      applyDefaults: { value: true }
    },
    inputs: 1,
    outputs: 1,
    icon: 'function.svg',
    label: function () {
      return this.name || (this.messageName ? 'build ' + this.messageName : 'mavlink ai build');
    },
    oneditprepare: function () {
      const node = this;
      let metadata = { messages: {}, enums: {} };

      const $message = $('#node-input-messageName');
      const $fieldsHost = $('#mav-fields');
      const $status = $('#mav-fields-status');
      const $msgDesc = $('#mav-msg-desc');

      // Parse the saved field values ({ snake_field: value }).
      let savedFields = {};
      try {
        savedFields = node.fields ? JSON.parse(node.fields) : {};
      } catch (e) {
        savedFields = {};
      }

      // Resolve the metadata query from the selected profile config node. A
      // custom-XML profile forwards its path so the runtime-compiled dialect's
      // metadata can be served too.
      function currentDialect() {
        const p = RED.nodes.node($('#node-input-profile').val());
        const query = { dialect: (p && p.dialect) || 'ardupilotmega' };
        if (query.dialect === 'custom' && p && p.customDialectPath) {
          query.customDialectPath = p.customDialectPath;
        }
        return query;
      }

      function isNumericType(type) {
        return /^(u?int(8|16|32|64)_t|float|double|char)/.test(type);
      }

      // Trim an enum-member description to fit an <option> label.
      function optionLabel(e) {
        let label = e.name + ' (' + e.value + ')';
        if (e.description) {
          const short = e.description.length > 90 ? e.description.slice(0, 87) + '…' : e.description;
          label += ' - ' + short;
        }
        return label;
      }

      // Render one labeled input per field of the selected message, each with a
      // visible Type/Units/description help box (issue #45) like the old
      // mavlink-msg editor.
      function renderFields(msgName, prefill) {
        $fieldsHost.empty();
        $msgDesc.empty().hide();
        // COMMAND_LONG/COMMAND_INT are the low-level command transport; the
        // command node is the normal path for MAV_CMD workflows (#48). Keep
        // them usable here, but say so loudly.
        const $cmdWarn = $('#mav-build-cmd-warning');
        if (msgName === 'COMMAND_LONG' || msgName === 'COMMAND_INT') {
          $cmdWarn
            .text(
              msgName +
                ' is a low-level command message. Use the MAVLink AI Command node for normal vehicle ' +
                'commands, MAV_CMD parameter help, ACK handling, and retries. Continue here only for ' +
                'raw/advanced use, debugging, or custom dialect behavior.'
            )
            .show();
        } else {
          $cmdWarn.empty().hide();
        }
        const def = metadata.messages[msgName];
        if (!def) {
          return;
        }
        if (def.description) {
          $msgDesc.text(def.description).show();
        }
        def.fields.forEach(function (field) {
          if (field.name === 'target_system' || field.name === 'target_component') {
            return; // handled by "Apply defaults" / profile
          }
          const id = 'mav-field-' + field.name;
          const $row = $('<div class="form-row" style="margin-bottom:6px;"></div>');
          const labelText = field.name + (field.units ? ' (' + field.units + ')' : '');
          $('<label></label>')
            .attr('for', id)
            .css({ width: '120px' })
            .text(labelText)
            .attr('title', field.type + (field.enum ? ' [' + field.enum + ']' : ''))
            .appendTo($row);

          const saved = prefill && Object.prototype.hasOwnProperty.call(prefill, field.name) ? prefill[field.name] : undefined;
          let $input;

          if (field.enum && metadata.enums[field.enum]) {
            $input = $('<select></select>').attr('id', id).attr('data-field', field.name);
            $('<option></option>').val('').text('(default)').appendTo($input);
            let matched = false;
            metadata.enums[field.enum].forEach(function (e) {
              const opt = $('<option></option>').val(e.name).text(optionLabel(e));
              if (saved !== undefined && (String(saved) === e.name || Number(saved) === e.value)) {
                opt.prop('selected', true);
                matched = true;
              }
              opt.appendTo($input);
            });
            if (saved !== undefined && !matched) {
              $('<option></option>').val(String(saved)).text(String(saved)).prop('selected', true).appendTo($input);
            }
          } else if (field.array) {
            $input = $('<input type="text">')
              .attr('id', id)
              .attr('data-field', field.name)
              .attr('placeholder', 'comma-separated ' + field.type)
              .val(Array.isArray(saved) ? saved.join(',') : saved !== undefined ? String(saved) : '');
          } else if (isNumericType(field.type)) {
            $input = $('<input type="number" step="any">')
              .attr('id', id)
              .attr('data-field', field.name)
              .attr('placeholder', field.type)
              .val(saved !== undefined ? saved : '');
          } else {
            $input = $('<input type="text">')
              .attr('id', id)
              .attr('data-field', field.name)
              .attr('placeholder', field.type)
              .val(saved !== undefined ? saved : '');
          }
          $input.css({ width: '70%' }).appendTo($row);

          // Visible Type/Units/description help under the input, not hidden in
          // a title tooltip (issue #45).
          const tipParts = [];
          if (field.type) {
            tipParts.push('Type: ' + field.type + (field.enum ? ' [' + field.enum + ']' : ''));
          }
          if (field.units) {
            tipParts.push('Units: ' + field.units);
          }
          if (field.description) {
            tipParts.push(field.description);
          }
          if (tipParts.length) {
            $('<div class="form-tips" style="margin:2px 0 6px 120px; width:70%; box-sizing:border-box;"></div>')
              .text(tipParts.join(' | '))
              .appendTo($row);
          }
          $row.appendTo($fieldsHost);
        });
      }

      function populateMessages(selectName) {
        const names = Object.keys(metadata.messages).sort();
        $message.empty();
        names.forEach(function (n) {
          $('<option></option>').val(n).text(n + ' (' + metadata.messages[n].id + ')').appendTo($message);
        });
        // Keep the saved value even if the metadata failed to include it.
        if (selectName && names.indexOf(selectName) === -1) {
          $('<option></option>').val(selectName).text(selectName).appendTo($message);
        }
        $message.val(selectName || names[0] || '');
      }

      let metadataRequestId = 0;
      function loadDialect(query, selectName, prefill) {
        $status.text('Loading ' + query.dialect + ' definitions...');
        const requestId = ++metadataRequestId;
        $.getJSON('mavlink-ai/metadata', query)
          .done(function (data) {
            if (requestId !== metadataRequestId) {
              return; // a newer request superseded this response
            }
            metadata = data && data.messages ? data : { messages: {}, enums: {} };
            populateMessages(selectName);
            renderFields($message.val(), prefill);
            $status.text('');
          })
          .fail(function () {
            if (requestId !== metadataRequestId) {
              return;
            }
            // Fallback: no admin endpoint (older runtime). Let the user type a
            // message name and edit fields as JSON.
            $status.html(
              'Dynamic field metadata unavailable — enter fields as JSON below.' +
                '<br><textarea id="mav-fields-json" rows="4" style="width:100%;"></textarea>'
            );
            $('#mav-fields-json').val(node.fields || '');
            metadata = { messages: {}, enums: {} };
            // Preserve the saved message name so saving doesn't clear it.
            if (node.messageName && $message.find('option').length === 0) {
              $('<option></option>').val(node.messageName).text(node.messageName).appendTo($message);
              $message.val(node.messageName);
            }
          });
      }

      $message.on('change', function () {
        renderFields($(this).val(), savedFields);
      });
      $('#node-input-profile').on('change', function () {
        loadDialect(currentDialect(), $message.val(), savedFields);
      });

      loadDialect(currentDialect(), node.messageName, savedFields);

      // Expose a collector for oneditsave.
      this._collectFields = function () {
        const jsonBox = $('#mav-fields-json');
        if (jsonBox.length) {
          return jsonBox.val(); // fallback JSON mode
        }
        const out = {};
        $fieldsHost.find('[data-field]').each(function () {
          const name = $(this).attr('data-field');
          let val = $(this).val();
          if (val === '' || val === null || val === undefined) {
            return; // omit blanks so protocol zero-fill applies
          }
          const def = metadata.messages[$message.val()];
          const field = def && def.fields.find(function (f) { return f.name === name; });
          if (field && field.array) {
            out[name] = String(val)
              .split(',')
              .map(function (s) { return s.trim(); })
              .filter(function (s) { return s !== ''; })
              .map(function (s) { return isNaN(Number(s)) ? s : Number(s); });
          } else if (field && !field.enum && /^(u?int|float|double)/.test(field.type) && !isNaN(Number(val))) {
            out[name] = Number(val);
          } else {
            out[name] = val;
          }
        });
        return JSON.stringify(out);
      };
    },
    oneditsave: function () {
      if (typeof this._collectFields === 'function') {
        $('#node-input-fields').val(this._collectFields());
      }
    }
  });
</script>

<script type="text/html" data-template-name="mavlink-ai-build">
  <div class="form-row">
    <label for="node-input-name"><i class="fa fa-tag"></i> Name</label>
    <input type="text" id="node-input-name" placeholder="Build MAVLink Message">
  </div>
  <div class="form-row">
    <label for="node-input-profile">Profile</label>
    <input type="text" id="node-input-profile">
  </div>
  <div class="form-row">
    <label for="node-input-messageName">Message</label>
    <select id="node-input-messageName" style="width:70%;"></select>
  </div>
  <div id="mav-build-cmd-warning" class="form-tips" style="display:none; margin:4px 0; border-color:#b00; color:#b00;"></div>
  <div id="mav-msg-desc" class="form-tips" style="display:none; margin:4px 0;"></div>
  <div class="form-row">
    <label for="node-input-applyDefaults">Apply defaults</label>
    <input type="checkbox" id="node-input-applyDefaults" style="display: inline-block; width: auto; vertical-align: top;">
  </div>
  <div id="mav-fields-status" style="color:#888; margin:4px 0;"></div>
  <div id="mav-fields" style="border-top:1px solid #eee; padding-top:6px;"></div>
  <input type="hidden" id="node-input-fields">
</script>

<script type="text/html" data-help-name="mavlink-ai-build">
  <p>Builds a normalized outbound MAVLink message object (without sending it) for a downstream <b>MAVLink AI Out</b> node.</p>
  <p>Pick a <b>Message</b> and the editor shows the message's MAVLink description plus a labeled input for each of its fields, with the field's wire type as the input placeholder and a visible <i>Type | Units | description</i> help box underneath. Fields backed by a MAVLink enum become dropdowns of readable names, values, and descriptions (e.g. <code>MAV_CMD_COMPONENT_ARM_DISARM</code>). The field list updates when you change the message or the profile's dialect.</p>
  <p>Leave a field blank to let it zero-fill. <code>msg.payload</code> may still override fields at runtime, and enum-name strings are resolved against the profile dialect.</p>
  <p><b>Note</b>: <code>COMMAND_LONG</code> / <code>COMMAND_INT</code> are low-level command transport messages. For normal vehicle commands prefer the <b>MAVLink AI Command</b> node — it adds MAV_CMD parameter help, COMMAND_ACK handling, and retries. Build them here only for raw/advanced use, debugging, or custom dialect behavior.</p>
</script>
