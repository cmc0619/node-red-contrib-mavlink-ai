<script type="text/javascript">
  /**
   * Inclusive [min, max] wire ranges for the fixed-width integer MAV_PARAM_TYPEs,
   * used to reject an editor Value that cannot fit the selected type before it
   * silently overflows on the wire (e.g. UINT8 = 300). REAL32/REAL64 carry no
   * integer constraint and are intentionally absent.
   */
  const MAV_PARAM_TYPE_RANGES = {
    MAV_PARAM_TYPE_UINT8: [0, 255],
    MAV_PARAM_TYPE_INT8: [-128, 127],
    MAV_PARAM_TYPE_UINT16: [0, 65535],
    MAV_PARAM_TYPE_INT16: [-32768, 32767],
    MAV_PARAM_TYPE_UINT32: [0, 4294967295],
    MAV_PARAM_TYPE_INT32: [-2147483648, 2147483647]
  };

  RED.nodes.registerType('mavlink-ai-param', {
    category: 'MAVLink AI',
    paletteLabel: 'MAVLink Param',
    color: '#FFE6B3',
    defaults: {
      name: { value: '' },
      connection: { value: '', type: 'mavlink-ai-connection', required: true },
      profile: { value: '', type: 'mavlink-ai-vehicle', required: false },
      action: { value: 'read', required: true },
      paramId: { value: '' },
      /** Optional read-by-index; used only for "Read one" when Param ID is blank. */
      paramIndex: {
        value: '',
        validate: function (v) {
          const s = String(v == null ? '' : v).trim();
          if (s === '') {
            return true;
          }
          const n = Number(s);
          return Number.isInteger(n) && n >= 0;
        }
      },
      /** 'auto' detects the wire type from the vehicle at runtime (read-before-set). */
      paramType: { value: 'auto' },
      /**
       * Static value for "Set one". Blank means "take it from the flow"
       * (msg.payload.param_value), so pre-existing flows that source the value
       * from a message keep working unchanged. Only validated for the set
       * action; a non-blank value must be numeric and fit the selected integer
       * type. The action and param type are read from the live form controls
       * when the edit tray is open, falling back to the saved node properties
       * for headless validation, so the check reflects in-progress dropdown
       * changes rather than the stale saved values.
       */
      paramValue: {
        value: '',
        validate: function (v) {
          const action = $('#node-input-action').length ? $('#node-input-action').val() : this.action;
          if (action !== 'set') {
            return true;
          }
          const s = String(v == null ? '' : v).trim();
          /** Blank defers the value to msg.payload.param_value at runtime. */
          if (s === '') {
            return true;
          }
          const n = Number(s);
          if (!Number.isFinite(n)) {
            return false;
          }
          const paramType = $('#node-input-paramType').length ? $('#node-input-paramType').val() : this.paramType;
          const range = MAV_PARAM_TYPE_RANGES[paramType];
          if (range) {
            return Number.isInteger(n) && n >= range[0] && n <= range[1];
          }
          /** REAL32/REAL64: any finite number is acceptable. */
          return true;
        }
      },
      /**
       * Positive timeout and non-negative integer retries. The runtime already
       * clamps out-of-range values to the defaults (param-workflow.js), so
       * reject them here too rather than showing a value the node won't use.
       * Blank/whitespace is rejected up front because Number('') is 0, which
       * would otherwise slip a cleared field past the numeric checks.
       */
      timeoutMs: {
        value: 3000,
        validate: function (v) {
          const s = String(v == null ? '' : v).trim();
          if (s === '') {
            return false;
          }
          const n = Number(s);
          return Number.isFinite(n) && n >= 1;
        }
      },
      maxRetries: {
        value: 3,
        validate: function (v) {
          const s = String(v == null ? '' : v).trim();
          if (s === '') {
            return false;
          }
          const n = Number(s);
          return Number.isFinite(n) && n >= 0 && Number.isInteger(n);
        }
      }
    },
    inputs: 1,
    outputs: 3,
    outputLabels: ['result', 'progress', 'error'],
    icon: 'font-awesome/fa-sliders',
    label: function () {
      return this.name || (this.action ? 'param ' + this.action : 'mavlink ai param');
    },
    oneditprepare: function () {
      /**
       * Resolve the firmware/vehicle that decide which parameter-definition
       * catalog applies (issue #125): the node's own Profile override if set,
       * otherwise the profile the selected Connection carries. Returns empty
       * strings when neither is resolvable, which the catalog treats as
       * "no source" and the editor keeps its free-text/numeric behavior.
       *
       * @returns {{firmware: string, vehicleType: string}}
       */
      function paramContext() {
        let profileId = $('#node-input-profile').val();
        if (!profileId) {
          const conn = $('#node-input-connection').val();
          const connNode = conn ? RED.nodes.node(conn) : null;
          profileId = connNode ? connNode.profile : '';
        }
        const profileNode = profileId ? RED.nodes.node(profileId) : null;
        return {
          firmware: profileNode && profileNode.firmware ? profileNode.firmware : '',
          vehicleType: profileNode && (profileNode.vehicleFamily || profileNode.profileType) ? (profileNode.vehicleFamily || profileNode.profileType) : ''
        };
      }

      /**
       * Re-run the Value field's validator so its range check reflects the
       * current Action / Param type, which those cross-field validators read
       * from the live form controls.
       */
      function revalidateValue() {
        $('#node-input-paramValue').trigger('change');
      }

      /** Monotonic guard so a superseded param-detail response can't overwrite a newer one. */
      let detailRequestId = 0;
      /**
       * Generation bumped on every Connection/Profile/Action change. The catalog
       * status and download callbacks capture it and ignore their response if the
       * context has moved on, so a delayed reply can't restore a stale source's
       * URL row or status for a profile the user already switched away from.
       */
      let ctxRequestId = 0;

      /**
       * Render the value control for one parameter definition. Enumerated
       * `values` become a pulldown; a `bitmask` becomes a checklist that ORs the
       * checked bits; both keep a "Custom value…" escape hatch. Anything else
       * (or no catalog) leaves the plain numeric input. Every control writes into
       * the persisted #node-input-paramValue, so imported flows and unlisted
       * params keep working unchanged.
       *
       * @param {?object} def  the ParamDef, or null for the plain numeric fallback
       * @returns {void}
       */
      function renderValueControl(def) {
        const $choices = $('#mav-param-value-choices').empty();
        const $value = $('#node-input-paramValue');
        const current = String($value.val() == null ? '' : $value.val()).trim();

        /** Show the raw numeric input and stop (the default / fallback path). */
        function useNumeric() {
          $value.show();
        }

        if (!def || (def.values.length === 0 && def.bitmask.length === 0)) {
          useNumeric();
          return;
        }

        if (def.values.length > 0) {
          const $sel = $('<select class="mav-pv-select" style="width:70%;"></select>');
          def.values.forEach(function (choice) {
            $('<option>')
              .val(String(choice.value))
              .text(choice.label ? choice.label + ' (' + choice.value + ')' : String(choice.value))
              .appendTo($sel);
          });
          $('<option>').val('__custom__').text('Custom value…').appendTo($sel);
          const known = def.values.some((c) => String(c.value) === current);
          $sel.val(known ? current : '__custom__');
          $choices.append($sel);

          function syncSelect() {
            if ($sel.val() === '__custom__') {
              $value.show().focus();
            } else {
              $value.val($sel.val()).hide();
            }
            revalidateValue();
          }
          $sel.on('change', syncSelect);
          if (known) {
            $value.hide();
          } else {
            $value.show();
          }
          revalidateValue();
          return;
        }

        /**
         * Bitmask: a checklist that sums the selected bits, with a custom escape
         * for unknown bits. Uses 2**bit arithmetic, not signed 32-bit bitwise
         * shifts — `1 << 31` would go negative, so bit 31 (and a full UINT32
         * mask up to 4294967295) must round-trip through plain arithmetic.
         */
        const numeric = current === '' ? NaN : Number(current);
        const knownBits = new Set(def.bitmask.map((b) => b.bit));
        const bitIsSet = (value, bit) => Math.floor(value / Math.pow(2, bit)) % 2 === 1;
        let representable = Number.isInteger(numeric) && numeric >= 0 && numeric <= 4294967295;
        if (representable) {
          for (let bit = 0; bit <= 31; bit += 1) {
            if (bitIsSet(numeric, bit) && !knownBits.has(bit)) {
              representable = false;
              break;
            }
          }
        }
        const $box = $('<div class="mav-pv-bitmask"></div>');
        def.bitmask.forEach(function (flag) {
          const $lbl = $('<label style="display:block; font-weight:normal; margin:0;"></label>');
          $('<input type="checkbox" style="width:auto; margin-right:6px;">')
            .attr('data-bit', flag.bit)
            .prop('checked', representable && bitIsSet(numeric, flag.bit))
            .appendTo($lbl);
          $lbl.append(document.createTextNode(flag.label ? flag.label + ' (bit ' + flag.bit + ')' : 'bit ' + flag.bit));
          $box.append($lbl);
        });
        const $custom = $('<label style="display:block; font-weight:normal; margin:4px 0 0 0;"></label>');
        /**
         * Custom mode whenever the current value isn't a clean combination of
         * known bits — including a blank value. A blank must land in custom mode
         * (visible, empty input) rather than an all-unchecked checklist that
         * looks like 0 but persists blank: blank means "defer to
         * msg.payload.param_value", and an unchecked checklist hiding a blank
         * input would silently drop that intent.
         */
        const $customCb = $('<input type="checkbox" style="width:auto; margin-right:6px;">').prop('checked', !representable);
        $custom.append($customCb).append(document.createTextNode('Custom value…'));
        $box.append($custom);
        $choices.append($box);

        function syncBitmask() {
          if ($customCb.is(':checked')) {
            $box.find('input[data-bit]').prop('disabled', true);
            $value.show().focus();
          } else {
            $box.find('input[data-bit]').prop('disabled', false);
            let mask = 0;
            $box.find('input[data-bit]:checked').each(function () {
              mask += Math.pow(2, Number($(this).attr('data-bit')));
            });
            $value.val(String(mask)).hide();
          }
          revalidateValue();
        }
        $box.find('input[data-bit]').on('change', syncBitmask);
        $customCb.on('change', syncBitmask);
        if (!representable) {
          $box.find('input[data-bit]').prop('disabled', true);
          $value.show();
        } else {
          $value.hide();
        }
        revalidateValue();
      }

      /**
       * Fetch the selected parameter's choice metadata and render its value
       * control. No-op for actions other than "set". Falls back to numeric on
       * any error or when the param isn't in the cached catalog.
       *
       * @returns {void}
       */
      function loadParamDetail() {
        /** Invalidate any in-flight detail request first, before the early
         * returns, so clearing the Param ID or leaving the Set action can't be
         * overwritten by an older response arriving late. */
        const rid = ++detailRequestId;
        if ($('#node-input-action').val() !== 'set') {
          return;
        }
        const paramId = String($('#node-input-paramId').val() || '').trim();
        if (paramId === '') {
          renderValueControl(null);
          return;
        }
        const ctx = paramContext();
        $.getJSON('mavlink-ai/param-catalog/param', { firmware: ctx.firmware, vehicleType: ctx.vehicleType, paramId: paramId })
          .done(function (resp) {
            if (rid !== detailRequestId) {
              return;
            }
            renderValueControl(resp && resp.found ? resp.param : null);
          })
          .fail(function () {
            if (rid !== detailRequestId) {
              return;
            }
            renderValueControl(null);
          });
      }

      /** Monotonic guard for the param-list (picker) population. */
      let listRequestId = 0;

      /**
       * Populate the Param ID datalist from the cached catalog for the current
       * firmware/vehicle, giving the free-text field a searchable dropdown. Stays
       * empty (plain free text) when nothing is cached.
       *
       * @returns {void}
       */
      function loadParamList() {
        const ctx = paramContext();
        const $list = $('#node-input-paramId-list').empty();
        const rid = ++listRequestId;
        $.getJSON('mavlink-ai/param-catalog/params', { firmware: ctx.firmware, vehicleType: ctx.vehicleType })
          .done(function (resp) {
            if (rid !== listRequestId || !resp || !Array.isArray(resp.params)) {
              return;
            }
            resp.params.forEach(function (p) {
              $('<option>').val(p.paramId).text(p.description || '').appendTo($list);
            });
          });
      }

      /**
       * Refresh the catalog-source status line and the "Load parameters" button
       * visibility for the current firmware/vehicle.
       *
       * @returns {void}
       */
      function loadCatalogStatus() {
        const ctx = paramContext();
        const gen = ctxRequestId;
        const $status = $('#mav-param-catalog-status');
        const $btn = $('#mav-param-catalog-load');
        const $urlRow = $('#mav-param-catalog-url-row');
        $.getJSON('mavlink-ai/param-catalog', { firmware: ctx.firmware, vehicleType: ctx.vehicleType })
          .done(function (resp) {
            if (gen !== ctxRequestId) {
              return;
            }
            if (!resp || !resp.source) {
              $status.text('No parameter catalog for this profile — enter the Param ID by hand.');
              $btn.hide();
              $urlRow.hide();
              return;
            }
            $btn.show();
            $urlRow.toggle(!!resp.source.urlRequired);
            /** Clear a URL carried over from a previous (PX4) source so it can't
             * silently override a source that supplies its own default URL. */
            if (!resp.source.urlRequired) {
              $('#mav-param-catalog-url').val('');
            }
            if (resp.cached) {
              $status.text('Catalog: ' + resp.cached.count + ' parameters cached (' + resp.source.sourceKey + ').');
            } else {
              $status.text('No catalog cached yet for ' + resp.source.sourceKey + ' — click Load parameters.');
            }
          })
          .fail(function () {
            if (gen !== ctxRequestId) {
              return;
            }
            $status.text('');
            $btn.hide();
            $urlRow.hide();
          });
      }

      /** Download/refresh the catalog for the current firmware/vehicle. */
      function loadCatalog() {
        const ctx = paramContext();
        const gen = ctxRequestId;
        /** Only forward the URL when its row is active (PX4). A source with its
         * own default URL (ArduPilot) must not be overridden by a value left in
         * the hidden field from an earlier PX4 selection. */
        const url = $('#mav-param-catalog-url-row').is(':visible')
          ? String($('#mav-param-catalog-url').val() || '').trim()
          : '';
        const $status = $('#mav-param-catalog-status');
        $status.text('Downloading parameter catalog…');
        $.ajax({
          url: 'mavlink-ai/param-catalog/update',
          method: 'POST',
          contentType: 'application/json',
          data: JSON.stringify({ firmware: ctx.firmware, vehicleType: ctx.vehicleType, url: url || undefined })
        })
          .done(function (resp) {
            if (gen !== ctxRequestId) {
              return;
            }
            $status.text('Loaded ' + resp.count + ' parameters (' + resp.sourceKey + ').');
            loadParamList();
            loadParamDetail();
          })
          .fail(function (xhr) {
            if (gen !== ctxRequestId) {
              return;
            }
            const err = xhr && xhr.responseJSON ? xhr.responseJSON.error : 'download failed';
            $status.text('Catalog download failed: ' + err);
          });
      }

      /**
       * Show the param id / type / value rows only for the actions that use
       * them (list needs neither; read needs no value/type).
       */
      function refresh() {
        const action = $('#node-input-action').val();
        $('.mav-param-id').toggle(action === 'read' || action === 'set');
        $('.mav-param-index').toggle(action === 'read');
        $('.mav-param-type').toggle(action === 'set');
        $('.mav-param-value').toggle(action === 'set');
        $('.mav-param-catalog').toggle(action === 'read' || action === 'set');
        if (action === 'set') {
          loadParamDetail();
        }
        revalidateValue();
      }

      $('#node-input-action').on('change', function () {
        ctxRequestId += 1;
        refresh();
      });
      $('#node-input-paramType').on('change', revalidateValue);
      $('#node-input-paramId').on('change', loadParamDetail);
      /**
       * A Connection/Profile change moves the whole context to a new
       * firmware/vehicle: refresh the status, the picker list, and — via
       * loadParamDetail (which also bumps detailRequestId, dropping any in-flight
       * response) — the value control, so a stale enum/bitmask from the old
       * firmware can't keep writing into paramValue for the new profile.
       */
      function onContextChange() {
        ctxRequestId += 1;
        loadCatalogStatus();
        loadParamList();
        loadParamDetail();
      }
      $('#node-input-connection').on('change', onContextChange);
      $('#node-input-profile').on('change', onContextChange);
      $('#mav-param-catalog-load').on('click', loadCatalog);

      /**
       * Fold the optional Profile override under an Advanced disclosure so the
       * common case (the Connection carries a default profile) stays uncluttered
       * (#127). Expand it automatically when a profile is already set, so an
       * existing override is never hidden.
       *
       * The section is NOT hidden in the markup: Node-RED builds the config-node
       * picker (replacing the Profile input with a select) before oneditprepare,
       * sizing it from the input's width — inside a display:none parent that
       * width is 0 and the picker renders unusably narrow. So it starts visible
       * and this initial call hides it after the picker is built (#127).
       */
      function toggleAdvanced(show) {
        $('.mav-advanced').toggle(show);
        $('#node-mav-advanced-toggle i').toggleClass('fa-caret-right', !show).toggleClass('fa-caret-down', show);
      }
      $('#node-mav-advanced-toggle').on('click', function (e) {
        e.preventDefault();
        toggleAdvanced(!$('.mav-advanced').is(':visible'));
      });
      toggleAdvanced(!!$('#node-input-profile').val());

      loadCatalogStatus();
      loadParamList();
      refresh();
    }
  });
</script>

<script type="text/html" data-template-name="mavlink-ai-param">
  <div class="form-row">
    <label for="node-input-name"><i class="fa fa-tag"></i> Name</label>
    <input type="text" id="node-input-name" placeholder="MAVLink Param">
  </div>
  <div class="form-row">
    <label for="node-input-connection">Connection</label>
    <input type="text" id="node-input-connection">
  </div>
  <div class="form-row">
    <a href="#" id="node-mav-advanced-toggle" style="color: inherit;"><i class="fa fa-caret-right"></i> Advanced</a>
  </div>
  <div class="mav-advanced">
    <div class="form-row">
      <label for="node-input-profile">Profile</label>
      <input type="text" id="node-input-profile">
    </div>
    <div class="form-tips" style="margin: -6px 0 8px 105px; width: 70%;">
      Optional — <b>overrides</b> the connection's profile. Leave blank to use the target's routed profile, falling back to the connection's own profile.
    </div>
  </div>
  <div class="form-row">
    <label for="node-input-action">Action</label>
    <select id="node-input-action">
      <option value="read">Read one</option>
      <option value="set">Set one</option>
      <option value="list">Request list</option>
    </select>
  </div>
  <div class="form-row mav-param-id">
    <label for="node-input-paramId">Param ID</label>
    <input type="text" id="node-input-paramId" list="node-input-paramId-list" placeholder="e.g. RC1_MIN">
    <datalist id="node-input-paramId-list"></datalist>
  </div>
  <div class="form-row mav-param-index">
    <label for="node-input-paramIndex">Param index</label>
    <input type="number" id="node-input-paramIndex" min="0" step="1" placeholder="read by index when Param ID is blank">
  </div>
  <div class="form-row mav-param-type">
    <label for="node-input-paramType">Param type</label>
    <select id="node-input-paramType">
      <option value="auto">Auto (detect from vehicle)</option>
      <option value="MAV_PARAM_TYPE_REAL32">REAL32 (float)</option>
      <option value="MAV_PARAM_TYPE_UINT8">UINT8</option>
      <option value="MAV_PARAM_TYPE_INT8">INT8</option>
      <option value="MAV_PARAM_TYPE_UINT16">UINT16</option>
      <option value="MAV_PARAM_TYPE_INT16">INT16</option>
      <option value="MAV_PARAM_TYPE_UINT32">UINT32</option>
      <option value="MAV_PARAM_TYPE_INT32">INT32</option>
      <option value="MAV_PARAM_TYPE_REAL64">REAL64 (double)</option>
    </select>
  </div>
  <div class="form-row mav-param-value">
    <label for="node-input-paramValue">Value</label>
    <input type="text" id="node-input-paramValue" placeholder="e.g. 1100 — leave blank to use msg.payload.param_value">
    <div id="mav-param-value-choices" style="margin-top: 6px;"></div>
  </div>
  <div class="form-row mav-param-catalog">
    <label>&nbsp;</label>
    <a id="mav-param-catalog-load" class="editor-button" style="display:none;"><i class="fa fa-download"></i> Load parameters</a>
    <span id="mav-param-catalog-status" style="margin-left: 8px; color: #888;"></span>
  </div>
  <div class="form-row mav-param-catalog" id="mav-param-catalog-url-row" style="display:none;">
    <label for="mav-param-catalog-url">Catalog URL</label>
    <input type="text" id="mav-param-catalog-url" placeholder="PX4 parameters.json URL (release asset or self-hosted)">
  </div>
  <div class="form-row">
    <label for="node-input-timeoutMs">Timeout ms</label>
    <input type="number" id="node-input-timeoutMs">
  </div>
  <div class="form-row">
    <label for="node-input-maxRetries">Retries</label>
    <input type="number" id="node-input-maxRetries">
  </div>
</script>

<script type="text/html" data-help-name="mavlink-ai-param">
  <p>Runs the MAVLink <b>PARAM</b> protocol against the vehicle on a shared <b>MAVLink AI Connection</b>. Only one param workflow runs per connection/profile/target at a time (it is locked); a second concurrent request fails clearly.</p>
  <h3>Actions</h3>
  <ul>
    <li><b>Read one</b> — read a single parameter by <code>Param ID</code>, or by <code>Param index</code> / <code>msg.payload.param_index</code> when Param ID is blank (Param ID takes precedence).</li>
    <li><b>Set one</b> — set <code>Param ID</code> to the editor <code>Value</code> (or <code>msg.payload.param_value</code> when <code>Value</code> is left blank), then confirm via the echoed <code>PARAM_VALUE</code>. <code>Param type</code> defaults to <b>Auto</b>, which reads the parameter first to detect its wire type before setting — so you don't have to know whether it is INT8/UINT8/REAL32 (this matters on PX4). Pick an explicit type to skip the detour read.</li>
    <li><b>Request list</b> — request the full parameter list and assemble it; missing items are re-requested on a lossy link.</li>
  </ul>
  <h3>Parameter catalog</h3>
  <p>When the effective profile's firmware publishes machine-readable parameter metadata (ArduPilot per vehicle; PX4 via a supplied <code>parameters.json</code> URL), click <b>Load parameters</b> to cache it. The <code>Param ID</code> field then offers a searchable list, and for parameters that define named choices the <code>Value</code> field becomes a pulldown (enumerations) or a bit checklist (bitmasks), each with a <b>Custom value…</b> escape hatch. Everything stays optional: free-text Param IDs and raw numeric values always work, so offline flow-building and unlisted parameters are unaffected. Generic/custom firmwares have no catalog and keep the plain inputs.</p>
  <h3>Profile</h3>
  <p><b>Profile</b> (optional) pins the workflow to a specific profile: its dialect, firmware behavior, source identity, signing, and target defaults are used, and every outbound message is encoded with it. Left empty, the target system/component is resolved through the connection's route table (the same resolution inbound packets get) and falls back to the connection's default profile. <code>msg.payload.profile</code> overrides per message. On routed connections with component-specific routes, set an explicit profile — target defaults can make route resolution ambiguous.</p>
  <h3>Inputs</h3>
  <p><code>msg.payload</code> may set <code>target_system</code>, <code>target_component</code>, <code>action</code>, <code>profile</code>, <code>param_id</code>, <code>param_index</code>, <code>param_value</code>, and <code>param_type</code>, overriding the editor values. For <b>Set one</b>, <code>msg.payload.param_value</code> takes precedence over the editor <code>Value</code>, so a static default can still be overridden per message.</p>
  <h3>Details</h3>
  <p>Param IDs are matched case-insensitively (<code>rc1_min</code> works). When the effective profile's firmware is <b>px4</b>, integer-typed parameter values are encoded/decoded using the PX4 byte-union convention automatically; other firmwares use the plain cast convention.</p>
  <h3>Outputs</h3>
  <ol class="node-ports">
    <li><b>result</b> — <code>param/value</code> (read), <code>param/set</code> (set, includes <code>applied</code>), or <code>param/list</code> (<code>{ count, params }</code>).</li>
    <li><b>progress</b> — <code>param/progress</code> events (list shows <code>received</code>/<code>count</code>).</li>
    <li><b>error</b> — structured error/timeout payloads.</li>
  </ol>
  <p>Failures are delivered once, on the error output — they do not also trigger <b>Catch</b> nodes. Wire it to handle errors.</p>
</script>
