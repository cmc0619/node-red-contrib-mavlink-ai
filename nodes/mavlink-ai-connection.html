<script type="text/javascript">
  (function () {
    // Transport field spec, mirrored from lib/transport/transport-fields.js so
    // the editor shows only the settings a protocol uses and flags an
    // undeployable field combination before deploy (#103, condensed in #243).
    // Keep the presence rules in sync with validateConnectionConfig.
    var TRANSPORT_VISIBLE = {
      udp: ['bindAddress', 'bindPort', 'remoteHost', 'remotePort'],
      serial: ['serialPath', 'serialBaud', 'reconnect'],
      tcp: ['bindAddress', 'bindPort', 'remoteHost', 'remotePort', 'reconnect']
    };
    // Statically required fields (serial only): udp/tcp deployability depends
    // on field *combinations*, judged by presenceProblemFields below.
    var TRANSPORT_REQUIRED = {
      udp: [],
      serial: ['serialPath', 'serialBaud'],
      tcp: []
    };
    var TRANSPORT_FIELD_KEYS = ['bindAddress', 'bindPort', 'remoteHost', 'remotePort', 'serialPath', 'serialBaud', 'reconnect'];

    /**
     * Current transport being edited. Reads the live select first (it may have
     * changed since the node was saved), falling back to the node's stored value
     * when the form isn't rendered yet (validation can run before oneditprepare).
     *
     * @param {object} node  the node config being validated
     * @returns {string}
     */
    function currentTransport(node) {
      var el = document.getElementById('node-config-input-transport');
      if (el && el.value) {
        return el.value;
      }
      return (node && node.transport) || 'udp';
    }

    /**
     * Live form value for a field, falling back to the stored node value when
     * the form isn't rendered (validation can run before oneditprepare).
     *
     * @param {object} node
     * @param {string} field
     * @returns {*}
     */
    function formValue(node, field) {
      var el = document.getElementById('node-config-input-' + field);
      if (el) {
        return el.value;
      }
      return node ? node[field] : undefined;
    }

    /**
     * True when a form value counts as blank (unset or whitespace-only).
     *
     * @param {*} v
     * @returns {boolean}
     */
    function isBlank(v) {
      return v === undefined || v === null || String(v).trim() === '';
    }

    /**
     * Mirror of the runtime presence rules (#243): the set of field names
     * implicated in a violated rule for the currently edited values.
     *
     *   udp: remote pair all-or-nothing; blank bind + no remote is undeployable.
     *   tcp: remote pair all-or-nothing; exactly one of remote-pair / bind port.
     *   serial: handled by the static required list.
     *
     * @param {object} node
     * @returns {Object<string, boolean>} implicated field -> true
     */
    function presenceProblemFields(node) {
      var t = currentTransport(node);
      var bad = {};
      if (t !== 'udp' && t !== 'tcp') {
        return bad;
      }
      var hasHost = !isBlank(formValue(node, 'remoteHost'));
      var hasPort = !isBlank(formValue(node, 'remotePort'));
      var hasBind = !isBlank(formValue(node, 'bindPort'));
      if (hasHost && !hasPort) {
        bad.remotePort = true;
      }
      if (hasPort && !hasHost) {
        bad.remoteHost = true;
      }
      var hasRemote = hasHost && hasPort;
      if (t === 'udp' && !hasBind && !hasRemote && !bad.remoteHost && !bad.remotePort) {
        bad.bindPort = true;
      }
      if (t === 'tcp' && !bad.remoteHost && !bad.remotePort) {
        if (hasRemote && hasBind) {
          bad.bindPort = true;
        } else if (!hasRemote && !hasBind) {
          bad.remoteHost = true;
        }
      }
      return bad;
    }

    /**
     * True if `field` is statically required for the selected transport.
     *
     * @param {object} node
     * @param {string} field
     * @returns {boolean}
     */
    function isRequired(node, field) {
      var list = TRANSPORT_REQUIRED[currentTransport(node)] || [];
      return list.indexOf(field) !== -1;
    }

    /**
     * Validator for a text field: fails when statically required and blank, or
     * when the field is implicated in a violated presence rule.
     *
     * @param {string} field
     * @returns {function(*): boolean}
     */
    function requiredTextValidator(field) {
      return function (v) {
        if (isRequired(this, field) && isBlank(v)) {
          return false;
        }
        return !presenceProblemFields(this)[field];
      };
    }

    /**
     * Validator for a numeric field: presence rules and static required-ness as
     * above, plus a present value must be numeric.
     *
     * @param {string} field
     * @returns {function(*): boolean}
     */
    function requiredNumberValidator(field) {
      var num = RED.validators.number();
      return function (v) {
        if (isBlank(v)) {
          return !isRequired(this, field) && !presenceProblemFields(this)[field];
        }
        if (!num.call(this, v)) {
          return false;
        }
        return !presenceProblemFields(this)[field];
      };
    }

    /**
     * Human-readable statement of what the current field combination will do —
     * the role is derived, so show the derivation live (#243).
     *
     * @returns {string}
     */
    function describeDerivedRole() {
      var t = $('#node-config-input-transport').val();
      var bind = $('#node-config-input-bindPort').val();
      var host = $('#node-config-input-remoteHost').val();
      var port = $('#node-config-input-remotePort').val();
      var hasRemote = !isBlank(host) && !isBlank(port);
      var hasBind = !isBlank(bind);
      if (t === 'udp') {
        if (hasBind && hasRemote) {
          return 'Peer on :' + bind + ', sending to ' + host + ':' + port + '.';
        }
        if (hasBind) {
          return 'Peer on :' + bind + ' — learns and replies to validated senders.';
        }
        if (hasRemote) {
          return 'Send-first (ephemeral bind) to ' + host + ':' + port + '; replies are learned.';
        }
        return 'Fill a bind port to listen, a remote host/port to send, or both.';
      }
      if (t === 'tcp') {
        if (hasRemote && hasBind) {
          return 'Pick one role: remote host/port to connect out, OR bind port to accept.';
        }
        if (hasRemote) {
          return 'Client: connects out to ' + host + ':' + port + '.';
        }
        if (hasBind) {
          return 'Server: accepts inbound connections on :' + bind + '.';
        }
        return 'Fill remote host/port to connect out, or a bind port to accept inbound.';
      }
      return '';
    }

    /**
     * Show only the settings the selected protocol uses, toggle the per-field
     * required markers, swap the explanatory hint, and restate the derived
     * role. Hidden inputs keep their stored values, so switching protocols
     * never drops a compatible saved value.
     *
     * @returns {void}
     */
    function updateTransportFields() {
      var t = $('#node-config-input-transport').val();
      var visible = TRANSPORT_VISIBLE[t] || [];
      var required = TRANSPORT_REQUIRED[t] || [];
      TRANSPORT_FIELD_KEYS.forEach(function (f) {
        $('#row-' + f).toggle(visible.indexOf(f) !== -1);
        $('#req-' + f).toggle(required.indexOf(f) !== -1);
      });
      $('.transport-hint').hide();
      $('#transport-hint-' + t).show();
      $('#transport-derived-role').text(describeDerivedRole());
    }

    RED.nodes.registerType('mavlink-ai-connection', {
      category: 'config',
      defaults: {
        name: { value: '' },
        profile: { value: '', type: 'mavlink-ai-vehicle', required: true },
        // Who this Node-RED runtime is on this link (#228). Required: every
        // transmitted message must resolve to exactly one permitted identity.
        localIdentity: { value: '', type: 'mavlink-ai-local-identity', required: true },
        // Advanced multi-identity transmission (#228): explicit opt-in plus an
        // explicit binding list, both disabled/empty by default.
        allowMultipleIdentities: { value: false },
        additionalIdentities: {
          value: '',
          /**
           * Structural check: empty, or a JSON array whose entries each name an
           * identity. Reference resolution is validated by the runtime at deploy.
           *
           * @param {string} v  the stored bindings JSON
           * @returns {boolean}
           */
          validate: function (v) {
            if (!v) {
              return true;
            }
            try {
              const arr = JSON.parse(v);
              return Array.isArray(arr) && arr.every(function (r) {
                return r && typeof r === 'object' && r.identity;
              });
            } catch (e) {
              return false;
            }
          }
        },
        // Connection-owned signing link id (#192): link ids identify channels,
        // so one identity/credential reused on two links gets distinct link ids.
        signingLinkId: {
          value: 0,
          validate: function (v) {
            if (v === undefined || v === null || v === '') {
              return true;
            }
            const n = Number(v);
            return (Number.isInteger(n) && n >= 0 && n <= 255) || 'must be an integer between 0 and 255';
          }
        },
        /** MAVLink 2 signing policy — a link has one shared key, so it lives here. */
        signOutbound: { value: false },
        verifyInbound: { value: false },
        requireSignature: { value: false },
        transport: { value: 'udp', required: true },
        routingMode: { value: 'single-profile', required: true },
        bindAddress: { value: '0.0.0.0' },
        bindPort: { value: 14550, validate: requiredNumberValidator('bindPort') },
        remoteHost: { value: '', validate: requiredTextValidator('remoteHost') },
        remotePort: { value: '', validate: requiredNumberValidator('remotePort') },
        serialPath: { value: '', validate: requiredTextValidator('serialPath') },
        serialBaud: { value: 57600, validate: requiredNumberValidator('serialBaud') },
        reconnect: { value: true },
        heartbeat: { value: false },
        heartbeatIntervalMs: { value: 1000, validate: RED.validators.number() },
        acceptedSysids: { value: '' },
        acceptedCompids: { value: '' },
        unmatchedPolicy: { value: 'default' },
        routeTable: {
          value: '',
          /**
           * Structural check: empty, or a JSON array whose entries each name a
           * profile. Reference resolution is validated by the runtime at deploy.
           *
           * @param {string} v  the stored route table JSON
           * @returns {boolean}
           */
          validate: function (v) {
            if (!v) {
              return true;
            }
            /**
             * Mirror the runtime's normalizeId rules (route-table.js): blank /
             * '*' / 'any' / 'all' are wildcards, anything else must be an
             * integer 0..255. Without this a one-character typo in a route id
             * passes the dialog and then fails the WHOLE connection at deploy
             * (ROUTE_TABLE_INVALID).
             *
             * @param {*} id  a route row's sysid/compid value
             * @returns {boolean}
             */
            const idOk = function (id) {
              if (id === undefined || id === null) {
                return true;
              }
              const s = String(id).trim().toLowerCase();
              if (s === '' || s === '*' || s === 'any' || s === 'all') {
                return true;
              }
              const n = Number(s);
              return Number.isInteger(n) && n >= 0 && n <= 255;
            };
            try {
              const arr = JSON.parse(v);
              return Array.isArray(arr) && arr.every(function (r) {
                return r && typeof r === 'object' && r.profile && idOk(r.sysid) && idOk(r.compid);
              });
            } catch (e) {
              return false;
            }
          }
        },
        outboundQueue: { value: true }
      },
      credentials: {
        /** Shared signing key: a credential so it is never in exported flow JSON. */
        signingPassphrase: { type: 'password' }
      },
      label: function () {
        return this.name || 'MAVLink AI Connection';
      },
      /**
       * Build the route-table editor: an editable list of sysid/compid inputs
       * plus a profile picker (a dropdown of profile config nodes, stored by
       * id), and wire routed-only/single-profile-only row visibility to the
       * routing mode.
       *
       * @returns {void}
       */
      oneditprepare: function () {
        /**
         * Signing detail rows (passphrase, link id) only matter once signing or
         * verification is enabled; Require signature only once verify is on.
         */
        function refreshSigning() {
          /**
           * Require-signature is meaningless without verify and the runtime
           * treats it as implying verify, so clear it whenever Verify inbound is
           * off — otherwise a hidden-but-checked value would silently keep
           * verification on after the user visually disabled it.
           */
          if (!$('#node-config-input-verifyInbound').is(':checked')) {
            $('#node-config-input-requireSignature').prop('checked', false);
          }
          const verify = $('#node-config-input-verifyInbound').is(':checked');
          const anySigning = $('#node-config-input-signOutbound').is(':checked') || verify;
          $('.mav-signing-detail').toggle(anySigning);
          $('.mav-signing-require').toggle(verify);
        }
        $('#node-config-input-signOutbound').on('change', refreshSigning);
        $('#node-config-input-verifyInbound').on('change', refreshSigning);
        refreshSigning();

        // Profile config nodes available as route targets. Routes store the
        // config-node id (canonical); the picker shows the display name.
        const profiles = [];
        // Local Identity config nodes available as additional bindings (#228).
        const identities = [];
        RED.nodes.eachConfig(function (n) {
          if (n.type === 'mavlink-ai-vehicle') {
            profiles.push({ id: n.id, name: n.name || n.id });
          }
          if (n.type === 'mavlink-ai-local-identity') {
            const ids =
              n.sourceSystemId !== undefined && n.sourceComponentId !== undefined
                ? ' (' + n.sourceSystemId + '/' + n.sourceComponentId + ')'
                : '';
            identities.push({ id: n.id, name: (n.name || n.id) + ids });
          }
          return true;
        });

        // --- additional Local Identity bindings (#228) --------------------
        let bindings = [];
        try {
          const rawBindings = this.additionalIdentities;
          if (Array.isArray(rawBindings)) {
            bindings = rawBindings;
          } else if (typeof rawBindings === 'string' && rawBindings.trim()) {
            const parsedBindings = JSON.parse(rawBindings);
            if (Array.isArray(parsedBindings)) {
              bindings = parsedBindings;
            }
          }
        } catch (e) {
          // Malformed legacy JSON: start empty; the old value is preserved
          // until the user saves, and the validator flags it.
        }

        $('#node-config-identity-list').editableList({
          addButton: 'add identity',
          removable: true,
          sortable: true,
          height: 140,
          header: $('<div>').css({ 'padding-left': '32px', color: 'var(--red-ui-secondary-text-color, #888)' })
            .append('<span style="display:inline-block;width:40%">Identity</span>')
            .append('<span style="display:inline-block;width:90px">Outbound</span>')
            .append('<span style="display:inline-block;width:90px">Heartbeat</span>')
            .append('<span>HB ms</span>'),
          /**
           * Render one binding row (identity picker, allow-outbound, heartbeat
           * opt-in, heartbeat interval) into the list.
           *
           * @param {jQuery} container  the row container provided by editableList
           * @param {number} index  row index
           * @param {object} data  the binding ({ identity, allowOutbound, heartbeat, heartbeatIntervalMs })
           * @returns {void}
           */
          addItem: function (container, index, data) {
            const row = $(container);
            row.css({ display: 'flex', 'align-items': 'center', gap: '6px' });
            const select = $('<select/>', { class: 'binding-identity' }).css({ width: '40%', 'flex-shrink': 0 }).appendTo(row);
            identities.forEach(function (p) {
              $('<option/>').val(p.id).text(p.name).appendTo(select);
            });
            let ref = data && data.identity;
            if (ref && !identities.some(function (p) { return p.id === ref; })) {
              $('<option/>').val(ref).text(ref + ' (unknown identity)').appendTo(select);
            }
            if (ref) {
              select.val(ref);
            }
            const outbound = $('<input/>', { type: 'checkbox', class: 'binding-outbound' })
              .css({ width: '90px', 'flex-shrink': 0, margin: 0 })
              .prop('checked', !data || data.allowOutbound !== false)
              .appendTo(row);
            const heartbeat = $('<input/>', { type: 'checkbox', class: 'binding-heartbeat' })
              .css({ width: '90px', 'flex-shrink': 0, margin: 0 })
              .prop('checked', !!(data && data.heartbeat))
              .appendTo(row);
            $('<input/>', { type: 'number', class: 'binding-hbms', placeholder: '1000' })
              .css({ flex: 1, width: 'auto' })
              .val(data && data.heartbeatIntervalMs ? data.heartbeatIntervalMs : 1000)
              .appendTo(row);
            void outbound;
            void heartbeat;
          }
        });
        const identityList = $('#node-config-identity-list');
        bindings.forEach(function (b) {
          identityList.editableList('addItem', b || {});
        });

        // The binding list is only meaningful once multi-identity is enabled.
        $('#node-config-input-allowMultipleIdentities')
          .on('change', function () {
            $('.multi-identity-only').toggle($(this).is(':checked'));
          })
          .trigger('change');

        let routes = [];
        try {
          const raw = this.routeTable;
          if (Array.isArray(raw)) {
            routes = raw;
          } else if (typeof raw === 'string' && raw.trim()) {
            const parsed = JSON.parse(raw);
            if (Array.isArray(parsed)) {
              routes = parsed;
            }
          }
        } catch (e) {
          // Malformed legacy JSON: start empty; the old value is preserved until
          // the user saves, and the validator flags it.
        }

        $('#node-config-route-list').editableList({
          addButton: 'add route',
          removable: true,
          sortable: true,
          height: 160,
          header: $('<div>').css({ 'padding-left': '32px', color: 'var(--red-ui-secondary-text-color, #888)' })
            .append('<span style="display:inline-block;width:70px">SysID</span>')
            .append('<span style="display:inline-block;width:70px">CompID</span>')
            .append('<span>Profile</span>'),
          /**
           * Render one route row (sysid, compid, profile picker) into the list.
           *
           * @param {jQuery} container  the row container provided by editableList
           * @param {number} index  row index
           * @param {object} data  the route entry ({ sysid, compid, profile })
           * @returns {void}
           */
          addItem: function (container, index, data) {
            const row = $(container);
            row.css({ display: 'flex', 'align-items': 'center', gap: '6px' });
            const sysid = $('<input/>', { type: 'text', class: 'route-sysid', placeholder: '*' })
              .css({ width: '64px', 'flex-shrink': 0 })
              .appendTo(row);
            const compid = $('<input/>', { type: 'text', class: 'route-compid', placeholder: '*' })
              .css({ width: '64px', 'flex-shrink': 0 })
              .appendTo(row);
            const select = $('<select/>', { class: 'route-profile' }).css({ flex: 1, width: 'auto' }).appendTo(row);
            profiles.forEach(function (p) {
              $('<option/>').val(p.id).text(p.name).appendTo(select);
            });

            let ref = data && data.profile;
            if (ref && !profiles.some(function (p) { return p.id === ref; })) {
              $('<option/>').val(ref).text(ref + ' (unknown profile)').appendTo(select);
            }
            if (ref) {
              select.val(ref);
            }
            if (data && data.sysid !== undefined && data.sysid !== '*') {
              sysid.val(data.sysid);
            }
            if (data && data.compid !== undefined && data.compid !== '*') {
              compid.val(data.compid);
            }
          }
        });
        const list = $('#node-config-route-list');
        routes.forEach(function (r) {
          list.editableList('addItem', r || {});
        });

        // Routed-only vs single-profile-only rows.
        let lastRoutingMode = $('#node-config-input-routingMode').val();
        $('#node-config-input-routingMode')
          .on('change', function () {
            const routed = $(this).val() === 'routed';
            $('.routed-only').toggle(routed);
            $('.single-profile-only').toggle(!routed);
            /**
             * Fail-closed nudge: switching INTO routed mode pre-selects Reject
             * for unmatched packets, matching the documented routed-mode
             * default the runtime applies when the property is absent. Only on
             * a real user switch (never on dialog open — the initial
             * .trigger('change') sees lastRoutingMode === current), and only
             * when the policy still sits on the generic default, so a
             * deliberate "Use default profile" choice is never overridden.
             */
            if (routed && lastRoutingMode !== 'routed' && $('#node-config-input-unmatchedPolicy').val() === 'default') {
              $('#node-config-input-unmatchedPolicy').val('reject');
            }
            lastRoutingMode = $(this).val();
          })
          .trigger('change');

        // Transport-aware fields: show only the settings the selected transport
        // uses and refresh required markers whenever the transport changes.
        $('#node-config-input-transport').on('change', updateTransportFields);
        $('#node-config-input-bindPort, #node-config-input-remoteHost, #node-config-input-remotePort').on('input', updateTransportFields);
        updateTransportFields();
      },
      /**
       * Serialize the route list back into the routeTable JSON string. Blank
       * sysid/compid mean wildcard; rows without a profile are dropped.
       *
       * @returns {void}
       */
      oneditsave: function () {
        // Serialize the additional-identity bindings back into JSON. Rows
        // without an identity are dropped; defaults are stored explicitly so
        // imported flow JSON reads unambiguously.
        const bindingsOut = [];
        $('#node-config-identity-list')
          .editableList('items')
          .each(function () {
            const row = $(this);
            const identity = row.find('.binding-identity').val();
            if (!identity) {
              return;
            }
            const hbms = Number(row.find('.binding-hbms').val());
            bindingsOut.push({
              identity: identity,
              allowOutbound: row.find('.binding-outbound').is(':checked'),
              heartbeat: row.find('.binding-heartbeat').is(':checked'),
              heartbeatIntervalMs: Number.isFinite(hbms) && hbms > 0 ? hbms : 1000
            });
          });
        $('#node-config-input-additionalIdentities').val(bindingsOut.length ? JSON.stringify(bindingsOut) : '');

        const routes = [];
        $('#node-config-route-list')
          .editableList('items')
          .each(function () {
            const row = $(this);
            const sysid = (row.find('.route-sysid').val() || '').trim();
            const compid = (row.find('.route-compid').val() || '').trim();
            const profile = row.find('.route-profile').val();
            if (!profile) {
              return;
            }
            routes.push({
              sysid: sysid === '' ? '*' : sysid,
              compid: compid === '' ? '*' : compid,
              profile: profile
            });
          });
        $('#node-config-input-routeTable').val(routes.length ? JSON.stringify(routes) : '');
      }
    });
  })();
</script>

<script type="text/html" data-template-name="mavlink-ai-connection">
  <div class="form-row">
    <label for="node-config-input-name"><i class="fa fa-tag"></i> Name</label>
    <input type="text" id="node-config-input-name" placeholder="Copter UDP 14550">
  </div>
  <div class="form-row">
    <label for="node-config-input-profile">Vehicle</label>
    <input type="text" id="node-config-input-profile">
  </div>
  <div class="form-row">
    <label for="node-config-input-localIdentity">Identity</label>
    <input type="text" id="node-config-input-localIdentity">
  </div>
  <div class="form-tips" style="margin-bottom: 8px;">
    <b>Local Identity</b> is who this Node-RED runtime is when it transmits on this link (source
    SysID/CompID, heartbeat identity, signing). If none exists, create a GCS, Companion, or Custom
    Local Identity first. The <b>Vehicle</b> profile describes what is being addressed and never
    changes the local identity.
  </div>
  <div class="form-row">
    <label for="node-config-input-transport">Transport</label>
    <select id="node-config-input-transport">
      <option value="udp">UDP</option>
      <option value="serial">Serial</option>
      <option value="tcp">TCP</option>
    </select>
  </div>
  <div class="form-tips" style="margin-bottom: 8px;">
    <span id="transport-derived-role"></span>
  </div>
  <div class="form-tips transport-hint" id="transport-hint-udp" style="margin-bottom: 8px; display: none;">
    <b>UDP</b> is always a peer: it listens on the bind port (or an ephemeral
    one when blank), learns validated senders, and sends to the fixed remote
    when one is set — otherwise to learned peers. Fill a bind port, a remote
    host/port, or both.
  </div>
  <div class="form-tips transport-hint" id="transport-hint-serial" style="margin-bottom: 8px; display: none;">
    <b>Serial</b> connects to a local device path. Serial support requires the
    optional <code>serialport</code> dependency.
  </div>
  <div class="form-tips transport-hint" id="transport-hint-tcp" style="margin-bottom: 8px; display: none;">
    <b>TCP</b> takes exactly one role: fill <b>Remote Host/Port</b> to connect
    out (client), or <b>Bind Port</b> to accept inbound connections (server) —
    not both.
  </div>
  <div class="form-row">
    <label for="node-config-input-routingMode">Routing</label>
    <select id="node-config-input-routingMode">
      <option value="single-profile">Single profile</option>
      <option value="routed">Routed by sysid/compid</option>

  </div>
  <div class="form-row" id="row-bindAddress">

  <div class="form-row" id="row-remoteHost">

    <input type="text" id="node-config-input-remoteHost">
  </div>
  <div class="form-row" id="row-remotePort">
    <label for="node-config-input-remotePort">Remote Port<span class="req-marker" id="req-remotePort" style="color: var(--red-ui-text-color-error, #c0392b);"> *</span></label>
    <input type="number" id="node-config-input-remotePort">

  <div class="form-row" id="row-serialPath">

  <div class="form-row" id="row-serialBaud">

  <h4 style="margin:6px 0;">MAVLink 2 Signing</h4>
  <div class="form-tips" style="margin-bottom: 8px;">
    A MAVLink link has one shared signing key, so signing is configured here — not on the identity.
    Leave everything off for an unsigned link. Every identity that transmits on this connection signs
    with this key.
  </div>
  <div class="form-row">
    <label for="node-config-input-signOutbound" title="Sign every frame sent on this connection (forces MAVLink 2)">Sign outbound</label>
    <input type="checkbox" id="node-config-input-signOutbound" style="display: inline-block; width: auto; vertical-align: top;">
  </div>
  <div class="form-row">
    <label for="node-config-input-verifyInbound" title="Check signatures and anti-replay on received frames">Verify inbound</label>
    <input type="checkbox" id="node-config-input-verifyInbound" style="display: inline-block; width: auto; vertical-align: top;">
  </div>
  <div class="form-row mav-signing-require">
    <label for="node-config-input-requireSignature" title="Reject unsigned inbound frames">Require signature</label>
    <input type="checkbox" id="node-config-input-requireSignature" style="display: inline-block; width: auto; vertical-align: top;">
  </div>
  <div class="form-row mav-signing-detail">
    <label for="node-config-input-signingPassphrase">Passphrase</label>
    <input type="password" id="node-config-input-signingPassphrase" placeholder="shared secret (stored as a credential)">
  </div>
  <div class="form-row mav-signing-detail">
    <label for="node-config-input-signingLinkId">Link ID</label>
    <input type="number" id="node-config-input-signingLinkId" min="0" max="255" placeholder="0">
  </div>
  <div class="form-tips mav-signing-detail" style="margin-bottom: 8px;">
    The passphrase is SHA-256 derived (matching Mission Planner / QGroundControl), stored as an
    encrypted credential — never in exported flow JSON. The <b>link ID</b> (0–255) is written into
    signed frames; give two connections that share a key different link ids. Verifying also enforces
    <b>anti-replay</b> — a signed frame is dropped if its timestamp is older than the last on its
    <code>(sysid, compid, link&nbsp;id)</code> stream, or over a minute behind the clock.
  </div>

  <hr>
  <h4 style="margin:6px 0;">Advanced: Additional Local Identities</h4>
  <div class="form-row">
    <label for="node-config-input-allowMultipleIdentities" style="width: auto; margin-right: 8px;">
      <input type="checkbox" id="node-config-input-allowMultipleIdentities" style="display: inline-block; width: auto; vertical-align: top; margin-right: 6px;">
      Allow this connection to transmit as multiple local identities
    </label>
  </div>
  <div class="form-tips" style="margin-bottom: 8px;">
    Off by default. Enable only if this Node-RED runtime is <em>intentionally</em> acting as more
    than one MAVLink participant on this link (e.g. a GCS <code>255/190</code> and a companion
    <code>1/191</code> sharing one UDP or serial link). Messages select an added identity with
    <code>msg.payload.localIdentity</code>; everything else uses the default identity above.
  </div>
  <div class="form-row multi-identity-only" style="margin-bottom: 0;">
    <label>Identities</label>
    <input type="hidden" id="node-config-input-additionalIdentities">
  </div>
  <div class="form-row multi-identity-only">
    <ol id="node-config-identity-list"></ol>
  </div>
  <div class="form-tips multi-identity-only" style="margin-bottom: 8px;">
    Each binding grants one extra identity: <b>Outbound</b> permits sends requesting it;
    <b>Heartbeat</b> opts into a periodic HEARTBEAT as that identity (off by default) at
    <b>HB&nbsp;ms</b> (min 1000). Two attached identities must not share a SysID/CompID pair — the
    connection fails closed on such a collision.
  </div>

<script type="text/html" data-help-name="mavlink-ai-connection">
  <p>Shared MAVLink transport/session config. This owns UDP, TCP, or serial connection runtime and
  references a <b>Vehicle Profile</b> (what is being addressed: dialect, targets, vehicle metadata)
  and a required default <b>Local Identity</b> (who this Node-RED runtime is on this link: source
  SysID/CompID, heartbeat identity, signing policy).</p>
  <p>Every transmitted message resolves to exactly one permitted Local Identity: the connection
  default, or — with <b>Advanced &gt; Allow multiple local identities</b> enabled — an explicitly
  bound additional identity requested via <code>msg.payload.localIdentity</code>. A Vehicle Profile
  never determines the local identity, an invalid explicit request never falls back to the default,
  and missing/unattached identity configuration fails closed with an actionable error
  (<code>LOCAL_IDENTITY_REQUIRED</code>, <code>LOCAL_IDENTITY_NOT_ATTACHED</code>,
  <code>LOCAL_IDENTITY_COLLISION</code>,
  <code>MULTI_IDENTITY_DISABLED</code>).</p>
  <p>The connection also owns all per-link protocol state: outbound sequence numbers per identity,
  monotonic signing timestamps per <code>(sysid, compid, link id)</code>, the signing <b>link ID</b>,
  and inbound anti-replay memory — this state survives profile edits and is shared across routed
  profiles, per the MAVLink signing and packet-loss rules.</p>
  <p>The editor shows only the settings the selected transport uses, and the field combination is validated before deploy so an unusable connection (for example <code>tcp</code> with both a remote and a bind port, or <code>serial</code> with no device path) can't be saved.</p>
  <p><b>udp</b> is always a peer. It binds the configured port (an ephemeral one when blank) and tracks a reply endpoint per source sysid, so with multiple vehicles on one port an outbound message addressed to a specific <code>target_system</code> goes to that vehicle's endpoint. Broadcast/untargeted sends fan out to learned peers; a fixed remote host/port is the default destination when set, and blank remote uses the learn-first workflow (reply to peers as they are heard).</p>
  <p><b>tcp</b> derives its role from the fields: a filled remote host/port connects out (client); a filled bind port accepts inbound connections (server). Exactly one of the two must be set.</p>
  <p>When the profile version is <b>auto</b>, outbound framing follows the peer: packets are MAVLink v2 until inbound traffic shows a v1 peer, then v1 (messages with ids above 255 always stay v2 — v1 framing cannot carry them).</p>
  <p><b>Heartbeat</b> emits a periodic HEARTBEAT so peers see this node as present. <b>HB ms</b> is the interval in milliseconds; HEARTBEAT is a low-rate presence message, so the minimum is <b>1000 ms</b> (the default). Lower values are clamped to 1000 ms and a warning is logged.</p>
  <p><b>Routes</b> (routed mode) map a packet's sysid/compid to the profile that decodes it. Each route references a profile config node by id (the picker handles this); leaving SysID/CompID blank means <code>*</code> (any). A route whose profile no longer exists rejects its packets and raises an error — it never silently falls back to the default profile. Flows edited as JSON may reference a profile by name only if exactly one profile has that name.</p>
  <p><b>Unmatched</b> (routed mode) decides what happens to a packet no route matches: <b>Reject</b> drops it (fail-closed, recommended — selecting routed mode pre-selects this), <b>Use default profile</b> decodes it with the connection's default profile instead.</p>
  <p><b>Queue</b> enables the outbound send queue: sends are serialized through one writer with priority bands (emergency commands cut ahead; the heartbeat is coalesced so it can't pile up behind a slow link) and are buffered while the transport is briefly busy. Disabling it writes every send straight to the transport with no ordering or backpressure protection — leave it on unless you are debugging the transport itself.</p>
</script>
