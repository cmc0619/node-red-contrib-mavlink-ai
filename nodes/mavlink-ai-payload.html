<script type="text/javascript">
  /**
   * Payload actions mapped to the input rows they use, so the editor shows only
   * the relevant fields. Keys match the BUILDERS in lib/payload/payload.js.
   */
  const MAV_PAYLOAD_FIELDS = {
    camera_photo: ['interval', 'count', 'sequence'],
    camera_video_start: ['streamId', 'statusFrequency'],
    camera_video_stop: ['streamId'],
    camera_mode: ['cameraMode'],
    camera_zoom: ['zoomType', 'zoomValue'],
    camera_focus: ['focusType', 'focusValue'],
    cam_trigger_distance: ['distance', 'triggerNow'],
    gimbal_aim: ['pitch', 'roll', 'yaw'],
    gimbal_manager_aim: ['pitch', 'yaw', 'gimbalDeviceId', 'yawLock'],
    gimbal_manager_attitude: ['pitch', 'roll', 'yaw', 'gimbalDeviceId', 'yawLock'],
    servo: ['instance', 'pwm'],
    relay: ['instance', 'on'],
    repeat_servo: ['instance', 'pwm', 'count', 'period'],
    repeat_relay: ['instance', 'count', 'period'],
    winch: ['instance', 'winchAction', 'length', 'rate'],
    parachute: ['parachuteAction'],
    gripper: ['instance', 'gripAction']
  };

  /**
   * Verbs sent as a dedicated MAVLink **message** rather than a `COMMAND_LONG`.
   * These carry no `COMMAND_ACK`, so the await-ack controls don't apply to them.
   */
  const MAV_PAYLOAD_MESSAGE_VERBS = ['gimbal_manager_aim', 'gimbal_manager_attitude'];

  /**
   * Verbs that address a camera or a gimbal/mount, used to show a device-aware
   * Component hint. The runtime source of truth for the well-known component ids
   * is lib/payload/components.js (MAV_COMP_ID); mirrored here for the editor.
   */
  const MAV_PAYLOAD_CAMERA_VERBS = [
    'camera_photo', 'camera_video_start', 'camera_video_stop', 'camera_mode',
    'camera_zoom', 'camera_focus', 'cam_trigger_distance'
  ];
  const MAV_PAYLOAD_GIMBAL_VERBS = ['gimbal_aim', 'gimbal_manager_aim', 'gimbal_manager_attitude'];

  RED.nodes.registerType('mavlink-ai-payload', {
    category: 'MAVLink AI',
    paletteLabel: 'MAVLink Payload',
    color: '#FFE6B3',
    defaults: {
      name: { value: '' },
      profile: { value: '', type: 'mavlink-ai-profile', required: true },
      connection: { value: '', type: 'mavlink-ai-connection', required: false },
      action: { value: 'camera_photo', required: true },
      /** Blank => the profile's default component; set it for a camera/gimbal on its own component id. */
      targetComponent: { value: '' },
      interval: { value: '' },
      count: { value: '' },
      sequence: { value: '' },
      streamId: { value: '' },
      statusFrequency: { value: '' },
      pitch: { value: '' },
      roll: { value: '' },
      yaw: { value: '' },
      instance: { value: '' },
      /** Required (numeric) only for the servo / repeat-servo actions. */
      pwm: {
        value: '',
        validate: function (v) {
          const action = $('#node-input-action').length ? $('#node-input-action').val() : this.action;
          if (action !== 'servo' && action !== 'repeat_servo') {
            return true;
          }
          return Number.isFinite(Number(String(v == null ? '' : v).trim()));
        }
      },
      on: { value: false },
      gripAction: { value: 'release' },
      gimbalDeviceId: { value: '' },
      yawLock: { value: false },
      cameraMode: { value: 'image' },
      zoomType: { value: 'range' },
      zoomValue: { value: '' },
      focusType: { value: 'range' },
      focusValue: { value: '' },
      winchAction: { value: 'relax' },
      length: { value: '' },
      rate: { value: '' },
      /** Default to the non-destructive 'disable'; the operator must consciously pick 'release'. */
      parachuteAction: { value: 'disable' },
      period: { value: '' },
      /** Optional COMMAND_ACK wait for the command-type verbs (#129). */
      awaitAck: { value: false },
      timeoutMs: { value: '' },
      maxRetries: { value: '' },
      /** Required (non-negative) only for the trigger-by-distance action. */
      distance: {
        value: '',
        validate: function (v) {
          const action = $('#node-input-action').length ? $('#node-input-action').val() : this.action;
          if (action !== 'cam_trigger_distance') {
            return true;
          }
          const n = Number(String(v == null ? '' : v).trim());
          return Number.isFinite(n) && n >= 0;
        }
      },
      triggerNow: { value: false }
    },
    inputs: 1,
    outputs: 1,
    icon: 'font-awesome/fa-camera',
    label: function () {
      return this.name || 'payload ' + (this.action || '').replace(/_/g, ' ');
    },
    oneditprepare: function () {
      const $action = $('#node-input-action');

      /** Show only the input rows the selected action uses. */
      function refresh() {
        const action = $action.val();
        const fields = MAV_PAYLOAD_FIELDS[action] || [];
        $('.mav-payload-field').each(function () {
          const key = $(this).attr('data-field');
          $(this).toggle(fields.indexOf(key) !== -1);
        });

        /**
         * Await-ack only applies to COMMAND_LONG verbs — message verbs carry no
         * COMMAND_ACK — so hide the whole section for those, and reveal the
         * timeout/retry rows only when the wait is enabled.
         */
        const isCommandVerb = MAV_PAYLOAD_MESSAGE_VERBS.indexOf(action) === -1;
        $('.mav-payload-ack').toggle(isCommandVerb);
        const showAckOpts = isCommandVerb && $('#node-input-awaitAck').is(':checked');
        $('.mav-payload-ack-opts').toggle(showAckOpts);

        /**
         * Device-aware Component hint: make the addressing choice deliberate.
         * Blank uses the profile default (the autopilot component, which
         * ArduPilot's onboard camera/gimbal driver answers) — a standalone
         * MAVLink camera is 100, a gimbal 154, and must be set explicitly (#155).
         */
        let hint = 'Blank uses the profile default component.';
        if (MAV_PAYLOAD_CAMERA_VERBS.indexOf(action) !== -1) {
          hint = 'Camera command. Blank = profile default (autopilot 1, which ArduPilot\'s onboard camera driver answers); a standalone MAVLink camera is <b>100</b> (MAV_COMP_ID_CAMERA).';
        } else if (MAV_PAYLOAD_GIMBAL_VERBS.indexOf(action) !== -1) {
          hint = 'Gimbal/mount command. Blank = profile default (autopilot 1, which ArduPilot\'s onboard mount answers); a standalone MAVLink gimbal is <b>154</b> (MAV_COMP_ID_GIMBAL).';
        }
        $('#mav-payload-component-hint').html(hint);

        $('#node-input-pwm').trigger('change');
      }

      $action.on('change', refresh);
      $('#node-input-awaitAck').on('change', refresh);
      refresh();
    }
  });
</script>

<script type="text/html" data-template-name="mavlink-ai-payload">
  <div class="form-row">
    <label for="node-input-name"><i class="fa fa-tag"></i> Name</label>
    <input type="text" id="node-input-name" placeholder="MAVLink Payload">
  </div>
  <div class="form-row">
    <label for="node-input-profile">Profile</label>
    <input type="text" id="node-input-profile">
  </div>
  <div class="form-row">
    <label for="node-input-connection">Connection</label>
    <input type="text" id="node-input-connection">
  </div>
  <div class="form-tips" style="margin: -6px 0 8px 105px; width: 70%;">
    Set a Connection to <b>send</b> directly; leave it empty to emit a <code>mavlink/send</code> message for a <b>mavlink-ai-out</b> node.
  </div>
  <div class="form-row">
    <label for="node-input-action">Action</label>
    <select id="node-input-action">
      <optgroup label="Camera">
        <option value="camera_photo">Take Photo</option>
        <option value="camera_video_start">Start Video</option>
        <option value="camera_video_stop">Stop Video</option>
        <option value="camera_mode">Set Mode (image / video / survey)</option>
        <option value="camera_zoom">Set Zoom</option>
        <option value="camera_focus">Set Focus</option>
        <option value="cam_trigger_distance">Trigger by Distance</option>
      </optgroup>
      <optgroup label="Gimbal / Mount">
        <option value="gimbal_aim">Aim — mount control (legacy)</option>
        <option value="gimbal_manager_aim">Aim — gimbal manager (pitch/yaw)</option>
        <option value="gimbal_manager_attitude">Aim — gimbal manager (attitude)</option>
      </optgroup>
      <optgroup label="Servo / Relay">
        <option value="servo">Set Servo (PWM)</option>
        <option value="relay">Set Relay (on / off)</option>
        <option value="repeat_servo">Repeat Servo (pulse)</option>
        <option value="repeat_relay">Repeat Relay (pulse)</option>
      </optgroup>
      <optgroup label="Gripper / Winch / Parachute">
        <option value="gripper">Grab / Release</option>
        <option value="winch">Winch (relax / length / rate)</option>
        <option value="parachute">Parachute (enable / disable / release)</option>
      </optgroup>
    </select>
  </div>
  <div class="form-row">
    <label for="node-input-targetComponent">Component</label>
    <input type="number" id="node-input-targetComponent" min="0" max="255" step="1" list="mav-payload-components" placeholder="blank = autopilot 1; 100 camera; 154 gimbal">
    <datalist id="mav-payload-components">
      <option value="1">Autopilot (MAV_COMP_ID_AUTOPILOT1)</option>
      <option value="100">Camera (MAV_COMP_ID_CAMERA)</option>
      <option value="154">Gimbal (MAV_COMP_ID_GIMBAL)</option>
    </datalist>
  </div>
  <div class="form-tips" id="mav-payload-component-hint" style="margin: -6px 0 8px 105px; width: 70%;"></div>

  <div class="form-row mav-payload-field" data-field="interval">
    <label for="node-input-interval">Interval (s)</label>
    <input type="number" step="any" id="node-input-interval" placeholder="0 = single shot">
  </div>
  <div class="form-row mav-payload-field" data-field="count">
    <label for="node-input-count">Count</label>
    <input type="number" step="1" id="node-input-count" placeholder="1">
  </div>
  <div class="form-row mav-payload-field" data-field="sequence">
    <label for="node-input-sequence">Sequence</label>
    <input type="number" step="1" id="node-input-sequence" placeholder="0">
  </div>
  <div class="form-row mav-payload-field" data-field="streamId">
    <label for="node-input-streamId">Stream ID</label>
    <input type="number" step="1" id="node-input-streamId" placeholder="0 = all streams">
  </div>
  <div class="form-row mav-payload-field" data-field="statusFrequency">
    <label for="node-input-statusFrequency">Status Hz</label>
    <input type="number" step="any" id="node-input-statusFrequency" placeholder="0">
  </div>

  <div class="form-row mav-payload-field" data-field="pitch">
    <label for="node-input-pitch">Pitch (°)</label>
    <input type="number" step="any" id="node-input-pitch" placeholder="+ up / - down">
  </div>
  <div class="form-row mav-payload-field" data-field="roll">
    <label for="node-input-roll">Roll (°)</label>
    <input type="number" step="any" id="node-input-roll" placeholder="0">
  </div>
  <div class="form-row mav-payload-field" data-field="yaw">
    <label for="node-input-yaw">Yaw (°)</label>
    <input type="number" step="any" id="node-input-yaw" placeholder="relative to vehicle">
  </div>

  <div class="form-row mav-payload-field" data-field="instance">
    <label for="node-input-instance">Instance</label>
    <input type="number" step="1" id="node-input-instance" placeholder="servo / relay / gripper number">
  </div>
  <div class="form-row mav-payload-field" data-field="pwm">
    <label for="node-input-pwm">PWM (µs)</label>
    <input type="number" step="1" id="node-input-pwm" placeholder="typically 1000–2000">
  </div>
  <div class="form-row mav-payload-field" data-field="on">
    <label for="node-input-on">Relay on</label>
    <input type="checkbox" id="node-input-on" style="width:auto; vertical-align:middle;">
  </div>
  <div class="form-row mav-payload-field" data-field="gripAction">
    <label for="node-input-gripAction">Gripper</label>
    <select id="node-input-gripAction">
      <option value="release">Release</option>
      <option value="grab">Grab</option>
    </select>
  </div>
  <div class="form-row mav-payload-field" data-field="gimbalDeviceId">
    <label for="node-input-gimbalDeviceId">Gimbal ID</label>
    <input type="number" step="1" min="0" max="255" id="node-input-gimbalDeviceId" placeholder="0 = all gimbals">
  </div>
  <div class="form-row mav-payload-field" data-field="yawLock">
    <label for="node-input-yawLock" title="Earth-frame yaw (else follow vehicle)">Yaw lock</label>
    <input type="checkbox" id="node-input-yawLock" title="Earth-frame yaw (else follow vehicle)" style="width:auto; vertical-align:middle;">
  </div>
  <div class="form-row mav-payload-field" data-field="cameraMode">
    <label for="node-input-cameraMode">Camera mode</label>
    <select id="node-input-cameraMode">
      <option value="image">Image</option>
      <option value="video">Video</option>
      <option value="survey">Survey</option>
    </select>
  </div>
  <div class="form-row mav-payload-field" data-field="distance">
    <label for="node-input-distance">Distance (m)</label>
    <input type="number" step="any" min="0" id="node-input-distance" placeholder="0 = disable trigger-by-distance">
  </div>
  <div class="form-row mav-payload-field" data-field="triggerNow">
    <label for="node-input-triggerNow" title="Also shoot one frame immediately">Trigger now</label>
    <input type="checkbox" id="node-input-triggerNow" title="Also shoot one frame immediately" style="width:auto; vertical-align:middle;">
  </div>
  <div class="form-row mav-payload-field" data-field="zoomType">
    <label for="node-input-zoomType">Zoom type</label>
    <select id="node-input-zoomType">
      <option value="range">Range (0–100 %)</option>
      <option value="step">Step (in / out)</option>
      <option value="continuous">Continuous (rate)</option>
      <option value="focal">Focal length (mm)</option>
    </select>
  </div>
  <div class="form-row mav-payload-field" data-field="zoomValue">
    <label for="node-input-zoomValue">Zoom value</label>
    <input type="number" step="any" id="node-input-zoomValue" placeholder="0–100 for range; ±1 for step; -1..1 for continuous">
  </div>
  <div class="form-row mav-payload-field" data-field="focusType">
    <label for="node-input-focusType">Focus type</label>
    <select id="node-input-focusType">
      <option value="range">Range (0–100 %)</option>
      <option value="step">Step (near / far)</option>
      <option value="continuous">Continuous (rate)</option>
      <option value="meters">Metres</option>
      <option value="auto">Auto</option>
      <option value="auto-single">Auto (single)</option>
      <option value="auto-continuous">Auto (continuous)</option>
    </select>
  </div>
  <div class="form-row mav-payload-field" data-field="focusValue">
    <label for="node-input-focusValue">Focus value</label>
    <input type="number" step="any" id="node-input-focusValue" placeholder="0–100 for range; metres for metres; ignored for auto">
  </div>
  <div class="form-row mav-payload-field" data-field="winchAction">
    <label for="node-input-winchAction">Winch action</label>
    <select id="node-input-winchAction">
      <option value="relax">Relax (free-spool)</option>
      <option value="length">Relative length (m)</option>
      <option value="rate">Rate (m/s)</option>
    </select>
  </div>
  <div class="form-row mav-payload-field" data-field="length">
    <label for="node-input-length">Length (m)</label>
    <input type="number" step="any" id="node-input-length" placeholder="+ pay out / - reel in">
  </div>
  <div class="form-row mav-payload-field" data-field="rate">
    <label for="node-input-rate">Rate (m/s)</label>
    <input type="number" step="any" id="node-input-rate" placeholder="0">
  </div>
  <div class="form-row mav-payload-field" data-field="parachuteAction">
    <label for="node-input-parachuteAction">Parachute</label>
    <select id="node-input-parachuteAction">
      <option value="disable">Disable</option>
      <option value="enable">Enable</option>
      <option value="release">Release (deploys chute + kills motors)</option>
    </select>
  </div>
  <div class="form-row mav-payload-field" data-field="period">
    <label for="node-input-period">Period (s)</label>
    <input type="number" step="any" min="0" id="node-input-period" placeholder="seconds between pulses">
  </div>

  <hr class="mav-payload-ack">
  <div class="form-row mav-payload-ack">
    <label for="node-input-awaitAck" title="Wait for COMMAND_ACK and confirm the device accepted the command">Await ack</label>
    <input type="checkbox" id="node-input-awaitAck" title="Wait for COMMAND_ACK and confirm the device accepted the command" style="width:auto; vertical-align:middle;">
  </div>
  <div class="form-row mav-payload-ack-opts">
    <label for="node-input-timeoutMs">Timeout (ms)</label>
    <input type="number" step="1" min="1" id="node-input-timeoutMs" placeholder="3000">
  </div>
  <div class="form-row mav-payload-ack-opts">
    <label for="node-input-maxRetries">Max retries</label>
    <input type="number" step="1" min="0" id="node-input-maxRetries" placeholder="3">
  </div>
</script>

<script type="text/html" data-help-name="mavlink-ai-payload">
  <p>Controls onboard <b>payloads and peripherals</b> — camera, gimbal/mount, servo, relay, gripper — building the right <code>COMMAND_LONG</code> without the build node. These verbs are not drone-specific: servos, relays and grippers are just as useful on rovers, boats and submarines (lights, manipulators, sample release) as cameras and gimbals are on copters and survey planes.</p>
  <h3>Sending</h3>
  <p>With a <b>Connection</b> the node sends the command directly; without one it emits a <code>mavlink/send</code> message to wire into a <b>mavlink-ai-out</b> node. A <b>Profile</b> is always required for encoding.</p>
  <h3>Component</h3>
  <p>Payload devices are often separate MAVLink components, so <b>which</b> component a command is addressed to matters. Leaving <b>Component</b> blank uses the profile's default component — the <b>autopilot</b> (<code>MAV_COMP_ID_AUTOPILOT1</code> = <code>1</code>). That is a deliberate default, not an accident: on ArduPilot the camera and gimbal are driven by the flight controller itself, so their commands are answered by the autopilot component.</p>
  <p>A <b>standalone MAVLink camera</b> announces itself on <code>MAV_COMP_ID_CAMERA</code> (<code>100</code>) and a <b>standalone gimbal</b> on <code>MAV_COMP_ID_GIMBAL</code> (<code>154</code>). Commands sent to the autopilot component are silently ignored by such a device, so set <b>Component</b> to its id (the field offers these as suggestions, and shows a hint for camera/gimbal actions). Per message, <code>msg.payload.target_component</code> overrides the editor value.</p>
  <h3>Actions</h3>
  <ul>
    <li><b>Take Photo / Start Video / Stop Video</b> — <code>IMAGE_START_CAPTURE</code> / <code>VIDEO_START_CAPTURE</code> / <code>VIDEO_STOP_CAPTURE</code>.</li>
    <li><b>Set Mode (image / video / survey)</b> — <code>SET_CAMERA_MODE</code>.</li>
    <li><b>Set Zoom</b> — <code>SET_CAMERA_ZOOM</code>. <b>Zoom type</b> chooses the meaning of the value: <i>range</i> is a 0–100 % level, <i>step</i> is ±1 in/out, <i>continuous</i> is a −1..1 rate, <i>focal</i> is a focal length in mm.</li>
    <li><b>Set Focus</b> — <code>SET_CAMERA_FOCUS</code>. <b>Focus type</b> selects range / step / continuous / metres / auto variants; the value is ignored for the auto types.</li>
    <li><b>Trigger by Distance</b> — <code>DO_SET_CAM_TRIGG_DIST</code>: shoot every N metres of travel (the backbone of fixed-wing mapping). <code>0</code> disables it; <b>Trigger now</b> also fires one frame immediately.</li>
    <li><b>Aim — mount control (legacy)</b> — <code>DO_MOUNT_CONTROL</code> in degrees, under MAVLink targeting. Widely supported.</li>
    <li><b>Aim — gimbal manager (pitch/yaw)</b> — <code>GIMBAL_MANAGER_SET_PITCHYAW</code>, the modern gimbal-manager protocol. This is a <b>message</b>, not a command; pitch/yaw are entered in degrees and sent in radians (the angular rates are sent as NaN — the message's "ignore" sentinel — so a static aim isn't misread as "move at 0 rad/s"). <b>Gimbal ID</b> <code>0</code> targets all gimbals; <b>Yaw lock</b> makes yaw earth-frame instead of following the vehicle.</li>
    <li><b>Aim — gimbal manager (attitude)</b> — <code>GIMBAL_MANAGER_SET_ATTITUDE</code>, a <b>message</b> that sends the full roll/pitch/yaw as a quaternion (angular velocities NaN). Use this when roll matters; otherwise pitch/yaw is simpler.</li>
    <li><b>Set Servo (PWM)</b> — <code>DO_SET_SERVO</code> (instance + PWM µs, typically 1000–2000).</li>
    <li><b>Set Relay (on / off)</b> — <code>DO_SET_RELAY</code>.</li>
    <li><b>Repeat Servo / Repeat Relay</b> — <code>DO_REPEAT_SERVO</code> / <code>DO_REPEAT_RELAY</code>: pulse the output <b>Count</b> times, <b>Period</b> seconds apart (repeat-servo toggles to the given PWM).</li>
    <li><b>Grab / Release</b> — <code>DO_GRIPPER</code>.</li>
    <li><b>Winch</b> — <code>DO_WINCH</code>: <i>relax</i> free-spools, <i>length</i> pays out a relative metres amount (negative reels in), <i>rate</i> holds a m/s speed.</li>
    <li><b>Parachute</b> — <code>DO_PARACHUTE</code>: enable, disable, or release.</li>
  </ul>
  <h3>Await ack</h3>
  <p>For the command verbs (everything except the gimbal-manager messages), tick <b>Await ack</b> to wait for the device's <code>COMMAND_ACK</code> and confirm it accepted the command, retransmitting up to <b>Max retries</b> times every <b>Timeout</b> ms. On success the ack rides the output as a <code>command/ack</code> message; a rejection or timeout is emitted as a structured <code>mavlink/error</code>. The gimbal-manager verbs are messages with no ack, so they stay fire-and-forget regardless.</p>
  <h3>Inputs</h3>
  <p><code>msg.payload</code> overrides any editor value: <code>action</code>, <code>target_system</code>, <code>target_component</code>, and the per-action fields (<code>interval</code>, <code>count</code>, <code>sequence</code>, <code>stream_id</code>, <code>status_frequency</code>, <code>camera_mode</code>, <code>zoom_type</code>, <code>zoom_value</code>, <code>focus_type</code>, <code>focus_value</code>, <code>distance</code>, <code>trigger_now</code>, <code>pitch</code>, <code>roll</code>, <code>yaw</code>, <code>gimbal_device_id</code>, <code>yaw_lock</code>, <code>instance</code>, <code>pwm</code>, <code>on</code>, <code>grip_action</code>, <code>winch_action</code>, <code>length</code>, <code>rate</code>, <code>parachute_action</code>, <code>period</code>, <code>timeout_ms</code>, <code>max_retries</code>).</p>
  <h3>Output</h3>
  <p>Without a connection, a <code>mavlink/send</code> message for <b>mavlink-ai-out</b>. Failures are emitted as a structured <code>mavlink/error</code> message on the same output.</p>
</script>
