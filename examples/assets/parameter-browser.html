<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>MAVLink AI Parameters</title>
  <style>body{font:15px system-ui,sans-serif;margin:0;background:#0b1220;color:#e7eefb}main{max-width:1100px;margin:auto;padding:1rem}section{background:#121d31;border:1px solid #263754;border-radius:10px;padding:1rem;margin:1rem 0}form{display:flex;flex-wrap:wrap;gap:.6rem}input,select,button{font:inherit;padding:.55rem;border-radius:6px;border:1px solid #496080;background:#0e1829;color:#e7eefb}button{background:#2269a8;cursor:pointer}table{border-collapse:collapse;width:100%}th,td{text-align:left;border-bottom:1px solid #263754;padding:.45rem}.muted{color:#91a4c3}.bad{color:#ff6b6b}#params{overflow:auto;max-height:55vh}</style>
</head>
<body><main><h1>MAVLink AI Parameter Browser</h1><p class="muted">List and read are safe queries. Setting a value requires the literal confirmation <strong>SET</strong>.</p>
  <section><form id="actions"><select name="action"><option>list</option><option>read</option><option>set</option></select><input name="param_id" placeholder="PARAM_ID"><input name="param_value" type="number" step="any" placeholder="value"><select name="param_type"><option>MAV_PARAM_TYPE_REAL32</option><option>MAV_PARAM_TYPE_INT32</option><option>MAV_PARAM_TYPE_UINT32</option></select><input name="confirm" placeholder="type SET to confirm"><button>Run</button></form><p id="message" class="muted"></p></section>
  <section><h2>Parameters</h2><div id="params">No parameter list received yet.</div></section>
  <script>
    const message=document.getElementById('message'),params=document.getElementById('params');
    const esc=v=>String(v??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
    document.getElementById('actions').addEventListener('submit',async event=>{event.preventDefault();const body=Object.fromEntries(new FormData(event.target));if(body.param_value!=='')body.param_value=Number(body.param_value);const response=await fetch('./parameters/action',{method:'POST',headers:{'content-type':'application/json'},body:JSON.stringify(body)});const result=await response.json();message.textContent=result.message||JSON.stringify(result);message.className=response.ok?'muted':'bad';});
    async function refresh(){try{const data=await (await fetch('./parameters.json',{cache:'no-store'})).json();message.textContent=data.progress||data.message||'';const list=data.params||[];params.innerHTML=list.length?`<table><thead><tr><th>ID</th><th>Value</th><th>Type</th><th>Index</th></tr></thead><tbody>${list.map(p=>`<tr><td>${esc(p.param_id)}</td><td>${esc(p.param_value)}</td><td>${esc(p.param_type)}</td><td>${esc(p.param_index)}</td></tr>`).join('')}</tbody></table>`:'No parameter list received yet.';}catch(e){message.textContent='Parameter API unavailable';message.className='bad'}}
    refresh();setInterval(refresh,1500);
  </script>
</main></body></html>
