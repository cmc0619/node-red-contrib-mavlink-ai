name: CI

on:
  push:
    branches: [main]
  pull_request:

# Read-only: this workflow only builds and tests.
permissions:
  contents: read

# Supersede in-progress runs for the same ref cleanly instead of leaving stale
# jobs that end up "cancelled".
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        # Exercise the package suite at the supported Node.js floor and current.
        node-version: ['22.x', '24.x']
    name: test (node ${{ matrix.node-version }})
    steps:
      - uses: actions/checkout@v7
        with:
          # Don't leave GITHUB_TOKEN in .git/config for later steps (npm ci
          # runs third-party install scripts).
          persist-credentials: false
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
      # Install without optional deps: serialport is optional and lazy-loaded,
      # so the suite must pass without it. This run also proves that contract.
      - run: npm ci --omit=optional
      # Minimal lint gate (#286): unused variables/imports and unreachable
      # code only — see eslint.config.js for why the rule set stays small.
      - run: npm run lint
      - run: npm test

  node-red-compatibility:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        # Every Node.js/Node-RED pairing claimed in README "Compatibility" is
        # exercised without repeating the Node-RED-independent package suite.
        node-version: ['22.x', '24.x']
        node-red-version: ['4', '5']
    name: node-red (node ${{ matrix.node-version }}, node-red ${{ matrix.node-red-version }})
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
      - run: npm ci --omit=optional
      # Prove the package registers and instantiates in a real Node-RED runtime
      # at the matrix Node-RED version (issue #102). Installed unsaved so the
      # lockfile stays lean and each matrix cell pins its own Node-RED major.
      - name: Load nodes under Node-RED ${{ matrix.node-red-version }}
        run: |
          npm install --no-save --omit=optional \
            "node-red@${{ matrix.node-red-version }}" node-red-node-test-helper
          npm run test:node-red
