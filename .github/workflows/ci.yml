name: CI

on:
  push:
    branches: [main]
  pull_request:

# Read-only: this workflow only builds and tests.
permissions:
  contents: read

# Supersede in-progress runs for the same ref cleanly instead of leaving stale
# jobs that end up "cancelled".
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # Test the minimum supported Node version plus current/latest.
        # Node 20 can be tested manually or re-added later if needed.
        node-version: [18.x, 22.x]
    name: test (node ${{ matrix.node-version }})
    steps:
      - uses: actions/checkout@v4
        with:
          # Don't leave GITHUB_TOKEN in .git/config for later steps (npm ci
          # runs third-party install scripts).
          persist-credentials: false
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
      # Install without optional deps: serialport is optional and lazy-loaded,
      # so the suite must pass without it. This run also proves that contract.
      - run: npm ci --omit=optional
      - run: npm test
