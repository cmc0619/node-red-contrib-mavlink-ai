<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>MAVLink AI Vehicle Status</title>
  <style>
    :root { color-scheme: dark; --bg:#0b1220; --panel:#121d31; --line:#263754; --text:#e7eefb; --muted:#91a4c3; --ok:#48d597; --warn:#ffc857; --bad:#ff6b6b; --accent:#64b5ff; }
    * { box-sizing: border-box; }
    body { margin:0; font:15px/1.45 system-ui,sans-serif; background:var(--bg); color:var(--text); }
    header { display:flex; gap:1rem; align-items:center; justify-content:space-between; padding:1rem 1.25rem; border-bottom:1px solid var(--line); background:#0e1829; position:sticky; top:0; z-index:2; }
    h1,h2,p { margin:0; }
    h1 { font-size:1.25rem; }
    .muted { color:var(--muted); }
    main { padding:1rem; max-width:1500px; margin:auto; }
    #vehicles { display:grid; grid-template-columns:repeat(auto-fit,minmax(330px,1fr)); gap:1rem; }
    .card { background:var(--panel); border:1px solid var(--line); border-radius:12px; overflow:hidden; }
    .card-head { display:flex; justify-content:space-between; align-items:center; padding:.85rem 1rem; border-bottom:1px solid var(--line); }
    .body { padding:1rem; display:grid; gap:.9rem; }
    .metrics { display:grid; grid-template-columns:repeat(3,1fr); gap:.55rem; }
    .metric { background:#0e1829; border-radius:8px; padding:.6rem; min-height:64px; }
    .metric span { display:block; color:var(--muted); font-size:.75rem; }
    .metric strong { font-size:1rem; }
    .pill { padding:.2rem .55rem; border-radius:999px; font-size:.75rem; font-weight:700; background:#263754; }
    .ok { color:var(--ok); } .warn { color:var(--warn); } .bad { color:var(--bad); }
    .alerts { display:grid; gap:.35rem; }
    .alert { border-left:4px solid var(--warn); background:#2a2316; padding:.45rem .6rem; border-radius:4px; }
    .alert.critical { border-color:var(--bad); background:#2b171d; }
    canvas { width:100%; height:250px; background:#09101c; border:1px solid var(--line); border-radius:8px; }
    .empty { text-align:center; color:var(--muted); padding:4rem 1rem; border:1px dashed var(--line); border-radius:12px; }
    footer { padding:1rem; color:var(--muted); text-align:center; }
    @media (max-width:550px) { .metrics { grid-template-columns:repeat(2,1fr); } }
  </style>
</head>
<body>
  <header><div><h1>MAVLink AI Vehicle Status</h1><p class="muted">Profile-aware telemetry, safety, and local geofence view</p></div><div id="connection" class="pill">waiting</div></header>
  <main><section id="vehicles"><div class="empty">Waiting for MAVLink telemetry…</div></section></main>
  <footer>Read-only display. Safety alerts are advisory and never command the vehicle.</footer>
  <script>
    const root = document.getElementById('vehicles');
    const connection = document.getElementById('connection');
    const fmt = (value, digits = 1, suffix = '') => Number.isFinite(Number(value)) ? Number(value).toFixed(digits) + suffix : '—';
    const esc = value => String(value ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
    function metric(label, value) { return `<div class="metric"><span>${label}</span><strong>${value}</strong></div>`; }
    function drawMap(canvas, vehicle) {
      const ctx = canvas.getContext('2d');
      const dpr = window.devicePixelRatio || 1;
      const width = canvas.clientWidth;
      const height = canvas.clientHeight;
      canvas.width = width * dpr; canvas.height = height * dpr; ctx.scale(dpr,dpr);
      ctx.clearRect(0,0,width,height); ctx.strokeStyle='#263754'; ctx.fillStyle='#91a4c3'; ctx.font='12px system-ui';
      const home=vehicle.home, pos=vehicle.position, fence=vehicle.geofenceMeters || 500;
      if (!home || !pos) { ctx.fillText('Position/home not available',16,28); return; }
      const latScale=111320, lonScale=111320*Math.cos(home.lat*Math.PI/180);
      const east=(pos.lon-home.lon)*lonScale, north=(pos.lat-home.lat)*latScale;
      const span=Math.max(fence*1.25,Math.abs(east)*1.25,Math.abs(north)*1.25,50);
      const scale=Math.min(width,height)/(span*2); const cx=width/2, cy=height/2;
      ctx.setLineDash([5,5]); ctx.strokeStyle='#ff6b6b'; ctx.beginPath(); ctx.arc(cx,cy,fence*scale,0,Math.PI*2); ctx.stroke(); ctx.setLineDash([]);
      ctx.strokeStyle='#263754'; ctx.beginPath(); ctx.moveTo(cx,0);ctx.lineTo(cx,height);ctx.moveTo(0,cy);ctx.lineTo(width,cy);ctx.stroke();
      ctx.fillStyle='#64b5ff'; ctx.beginPath();ctx.arc(cx,cy,6,0,Math.PI*2);ctx.fill();ctx.fillText('Home',cx+9,cy+4);
      const x=cx+east*scale,y=cy-north*scale;ctx.fillStyle=vehicle.geofenceBreach?'#ff6b6b':'#48d597';ctx.beginPath();ctx.arc(x,y,7,0,Math.PI*2);ctx.fill();ctx.fillText(`${Math.round(vehicle.distanceFromHome || 0)} m`,x+10,y+4);
    }
    function card(vehicle,index) {
      const level=vehicle.alertLevel || 'ok';
      const alerts=(vehicle.alerts||[]).map(a=>`<div class="alert ${a.level==='critical'?'critical':''}">${esc(a.message)}</div>`).join('');
      const p=vehicle.position||{}, b=vehicle.battery||{}, g=vehicle.gps||{}, f=vehicle.flight||{}, a=vehicle.attitude||{};
      return `<article class="card"><div class="card-head"><div><h2>System ${esc(vehicle.sysid)} / Component ${esc(vehicle.compid)}</h2><div class="muted">${esc(vehicle.profile_name || vehicle.profile_id || 'default profile')}</div></div><div class="pill ${level==='critical'?'bad':level==='warning'?'warn':'ok'}">${level.toUpperCase()}</div></div><div class="body"><div class="metrics">${metric('Armed',vehicle.armed?'YES':'NO')}${metric('Mode',esc(vehicle.mode ?? vehicle.custom_mode ?? '—'))}${metric('Last seen',fmt(vehicle.ageMs/1000,1,' s'))}${metric('Battery',fmt(b.remaining,0,'%'))}${metric('Voltage',fmt(b.voltage,2,' V'))}${metric('GPS',`${esc(g.fixLabel || g.fix_type || '—')} · ${esc(g.satellites ?? '—')} sats`)}${metric('Altitude',fmt(p.relative_alt,1,' m AGL'))}${metric('Ground speed',fmt(f.groundspeed,1,' m/s'))}${metric('Heading',fmt(f.heading ?? p.heading,0,'°'))}${metric('Climb',fmt(f.climb,1,' m/s'))}${metric('Roll',fmt(a.roll,1,'°'))}${metric('Pitch',fmt(a.pitch,1,'°'))}</div><canvas id="map-${index}"></canvas><div class="alerts">${alerts || '<div class="muted">No active alerts</div>'}</div></div></article>`;
    }
    async function refresh() {
      try {
        const response=await fetch('./status.json',{cache:'no-store'}); if(!response.ok) throw new Error(String(response.status));
        const data=await response.json(); const vehicles=data.vehicles||[];
        connection.textContent=`${vehicles.length} vehicle${vehicles.length===1?'':'s'} · ${new Date(data.generatedAt).toLocaleTimeString()}`; connection.className='pill ok';
        root.innerHTML=vehicles.length?vehicles.map(card).join(''):'<div class="empty">Waiting for MAVLink telemetry…</div>';
        vehicles.forEach((v,i)=>drawMap(document.getElementById(`map-${i}`),v));
      } catch (error) { connection.textContent='dashboard API unavailable'; connection.className='pill bad'; }
    }
    refresh(); setInterval(refresh,1000); addEventListener('resize',refresh);
  </script>
</body>
</html>
